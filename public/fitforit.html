<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FitforIt — My Closet</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800;900&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Space Grotesk',sans-serif;min-height:100vh;transition:background 0.5s,color 0.5s;overflow-x:hidden;}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background:radial-gradient(ellipse at 20% 0%,rgba(128,128,128,0.04) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(128,128,128,0.04) 0%,transparent 50%),radial-gradient(circle,rgba(128,128,128,0.015) 1px,transparent 1px);background-size:100% 100%,100% 100%,24px 24px;}
    .bc{font-family:'Barlow Condensed',sans-serif;font-weight:900;text-transform:uppercase;letter-spacing:1px;}

    /* ── ANIMATIONS ── */
    @keyframes fadeSlideIn{from{opacity:0;transform:translateY(16px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}
    @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
    @keyframes floatUp{0%{transform:translateY(0) scale(1);opacity:0.08;}50%{opacity:0.15;}100%{transform:translateY(-100vh) scale(0.5);opacity:0;}}
    @keyframes glowPulse{0%,100%{box-shadow:0 4px 20px rgba(0,0,0,0.06),0 0 0 0 rgba(128,128,128,0);}50%{box-shadow:0 8px 30px rgba(0,0,0,0.1),0 0 30px 2px rgba(128,128,128,0.06);}}
    @keyframes titleGradient{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
    @keyframes cardHover{0%{transform:translateY(0);}100%{transform:translateY(-6px);}}
    @keyframes sparkle{0%,100%{opacity:0;transform:scale(0.3);}50%{opacity:1;transform:scale(1);}}

    .closet-item{animation:fadeSlideIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both;}
    .closet-item:nth-child(1){animation-delay:0s;}
    .closet-item:nth-child(2){animation-delay:0.06s;}
    .closet-item:nth-child(3){animation-delay:0.12s;}
    .closet-item:nth-child(4){animation-delay:0.18s;}
    .closet-item:nth-child(5){animation-delay:0.24s;}
    .closet-item:nth-child(6){animation-delay:0.3s;}
    .closet-item:nth-child(7){animation-delay:0.36s;}
    .closet-item:nth-child(8){animation-delay:0.42s;}
    .closet-item:hover{transform:translateY(-8px) scale(1.02) !important;box-shadow:0 16px 40px rgba(0,0,0,0.12);}
    .closet-item::before{content:'';position:absolute;bottom:0;left:0;right:0;height:45%;border-radius:0 0 16px 16px;background:linear-gradient(to top,rgba(0,0,0,0.25) 0%,rgba(0,0,0,0.08) 40%,transparent 100%);z-index:1;pointer-events:none;}
    .closet-item .closet-item-info{position:relative;z-index:2;}
    .closet-item::after{content:'';position:absolute;inset:0;border-radius:12px;opacity:0;transition:opacity 0.3s;background:linear-gradient(135deg,rgba(255,255,255,0.1),transparent);z-index:3;pointer-events:none;}
    .closet-item:hover::after{opacity:1;}
    .builder-item{transition:transform 0.25s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.25s,border-color 0.2s;}
    .builder-item:hover{transform:translateY(-4px) scale(1.04);box-shadow:0 12px 28px rgba(0,0,0,0.1);}
    .builder-preview{animation:glowPulse 4s ease-in-out infinite;backdrop-filter:blur(8px);}

    /* Floating decorations */
    .float-deco{position:fixed;pointer-events:none;z-index:0;animation:floatUp linear infinite;}

    /* Sparkle cursor */
    .cursor-sparkle{position:fixed;pointer-events:none;z-index:999;width:5px;height:5px;border-radius:50%;transition:all 0.5s ease;}

    nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 40px;backdrop-filter:blur(20px) saturate(1.3);border-bottom:1px solid rgba(128,128,128,0.06);box-shadow:0 1px 20px rgba(0,0,0,0.03);}
    .nav-logo{font-size:1.6rem;letter-spacing:4px;text-decoration:none;}
    .nav-links{display:flex;gap:8px;}
    .nav-btn{font-size:0.75rem;letter-spacing:2px;text-decoration:none;padding:8px 16px;border-radius:4px;border:1.5px solid rgba(128,128,128,0.2);font-family:'Barlow Condensed',sans-serif;font-weight:900;text-transform:uppercase;transition:opacity 0.2s;background:transparent;color:inherit;}
    .nav-btn:hover{opacity:0.6;}

    /* TABS */
    .tabs{display:flex;padding:12px 40px;gap:6px;}
    .tab{padding:10px 24px;font-size:0.72rem;letter-spacing:3px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;font-weight:900;cursor:pointer;border:1.5px solid rgba(128,128,128,0.12);border-radius:24px;opacity:0.4;transition:all 0.25s;background:transparent;color:inherit;}
    .tab.on{opacity:1;border-color:currentColor;}

    /* CLOSET VIEW */
    .closet{padding:20px 40px 60px;}
    .closet-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
    .closet-title{font-size:0.62rem;letter-spacing:5px;text-transform:uppercase;opacity:0.3;font-family:'Barlow Condensed',sans-serif;font-weight:900;}
    .closet-add{padding:8px 20px;border:none;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.75rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:opacity 0.2s;}
    .closet-add{transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 4px 16px rgba(0,0,0,0.12);border-radius:12px;padding:10px 24px;}
    .closet-add:hover{opacity:0.9;transform:translateY(-2px) scale(1.03);box-shadow:0 8px 24px rgba(0,0,0,0.16);}
    .closet-banner{text-align:center;padding:36px 20px 24px;position:relative;overflow:hidden;}
    .closet-banner::before{content:'';position:absolute;inset:0;opacity:0.04;
      background:repeating-linear-gradient(45deg,transparent,transparent 20px,currentColor 20px,currentColor 21px);}
    .closet-banner-title{font-size:clamp(2.4rem,6vw,3.8rem);letter-spacing:-1px;font-weight:700;margin-bottom:6px;
      background:linear-gradient(90deg,currentColor 0%,currentColor 40%,rgba(128,128,128,0.5) 50%,currentColor 60%,currentColor 100%);
      background-size:200% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
      animation:titleGradient 6s ease infinite;}
    .closet-banner-sub{font-size:0.85rem;opacity:0.4;line-height:1.7;letter-spacing:0.3px;}
    .closet-cats{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
    .closet-cat{padding:6px 14px;border-radius:16px;font-size:0.65rem;letter-spacing:1.5px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;font-weight:900;cursor:pointer;border:1.5px solid rgba(128,128,128,0.12);color:inherit;transition:all 0.3s ease, background-color 0.35s ease, box-shadow 0.3s ease, border-color 0.3s ease;opacity:0.45;background-color:transparent;}
    .closet-cat.on{opacity:1;background-color:rgba(128,128,128,0.1);border-color:currentColor;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
    .closet-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
    .closet-item{border-radius:16px;overflow:hidden;position:relative;cursor:pointer;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.3s;box-shadow:0 4px 16px rgba(0,0,0,0.06);backdrop-filter:blur(4px);}
    .closet-item img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;background:rgba(128,128,128,0.06);transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1),filter 0.3s;}
    .closet-item:hover img{transform:scale(1.06);filter:brightness(1.05) saturate(1.1);}
    .closet-item-info{padding:10px 12px;}
    .closet-item-name{font-size:0.82rem;font-weight:600;line-height:1.3;}
    .closet-item-cat{font-size:0.6rem;opacity:0.35;letter-spacing:1.5px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;font-weight:900;margin-top:2px;}
    .closet-item-del{position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,0.5);color:white;border:none;cursor:pointer;font-size:0.7rem;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.15s;}
    .closet-item:hover .closet-item-del{opacity:1;}
    .closet-item.selected{outline:3px solid;outline-offset:2px;border-radius:14px;}
    .closet-empty{grid-column:1/-1;text-align:center;padding:60px 20px;opacity:0.3;font-style:normal;font-size:1.15rem;font-weight:300;letter-spacing:0.3px;line-height:1.7;}

    /* OUTFIT BUILDER */
    .builder{padding:20px 40px 60px;display:none;}
    .builder.active{display:block;}
    .builder-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
    .builder-preview{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:24px;min-height:140px;padding:24px;border-radius:20px;border:2px dashed rgba(128,128,128,0.08);background:rgba(128,128,128,0.02);}
    .builder-slot{width:100px;text-align:center;}
    .builder-slot img{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:10px;background:rgba(128,128,128,0.06);}
    @keyframes slotPulse{
      0%,100%{border-color:rgba(128,128,128,0.15);box-shadow:0 0 0 0 rgba(128,128,128,0);}
      50%{border-color:rgba(128,128,128,0.3);box-shadow:0 0 12px 2px rgba(128,128,128,0.06);}
    }
    .builder-slot-empty{width:100%;aspect-ratio:3/4;border-radius:10px;border:2px dashed rgba(128,128,128,0.15);display:flex;align-items:center;justify-content:center;font-size:0.6rem;opacity:0.3;letter-spacing:1px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;font-weight:900;animation:slotPulse 2.5s ease-in-out infinite;}
    .builder-slot-label{font-size:0.58rem;opacity:0.35;letter-spacing:1.5px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;font-weight:900;margin-top:6px;}
    .builder-pick-label{font-size:0.62rem;letter-spacing:4px;text-transform:uppercase;opacity:0.3;font-family:'Barlow Condensed',sans-serif;font-weight:900;margin-bottom:12px;}
    .builder-items{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
    .builder-item{border-radius:10px;overflow:hidden;cursor:pointer;transition:transform 0.15s;border:2px solid transparent;}
    .builder-item:hover{transform:translateY(-2px);}
    .builder-item.picked{border-style:solid;}
    .builder-item img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;}
    .builder-btns{display:flex;gap:10px;justify-content:center;margin-top:20px;}
    .builder-btn{padding:12px 32px;border:none;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.85rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:opacity 0.2s;}
    .builder-btn:hover{opacity:0.8;}
    .builder-btn.outline{background:transparent;border:1.5px solid rgba(128,128,128,0.2);}

    /* AI SUGGEST */
    .suggest-result{margin-top:20px;padding:26px 28px;border-radius:20px;font-size:0.92rem;line-height:1.7;display:none;animation:fadeSlideIn 0.4s ease both;backdrop-filter:blur(12px);border:1.5px solid rgba(128,128,128,0.1);box-shadow:0 8px 32px rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.03), inset 0 1px 0 rgba(255,255,255,0.08);background-image:linear-gradient(135deg,rgba(255,255,255,0.04) 0%,transparent 100%);}
    .suggest-result.visible{display:block;}
    .closet-empty{grid-column:1/-1;text-align:center;padding:80px 20px;opacity:0.3;font-style:normal;font-size:1.15rem;font-weight:300;letter-spacing:0.3px;line-height:1.7;}

    /* ADD MODAL */
    .modal-bg{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.4);align-items:center;justify-content:center;}
    .modal-bg.open{display:flex;}
    .modal-box{padding:28px;border-radius:16px;width:90%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.2);animation:modalPop 0.25s cubic-bezier(0.34,1.56,0.64,1) both;}
    @keyframes modalPop{from{opacity:0;transform:scale(0.9);}to{opacity:1;transform:scale(1);}}
    .modal-box h3{font-size:1.2rem;margin-bottom:16px;}
    .modal-box input{width:100%;padding:12px 14px;border:1.5px solid rgba(128,128,128,0.15);border-radius:10px;font-family:'Space Grotesk',sans-serif;font-size:0.88rem;color:inherit;outline:none;background:transparent;margin-bottom:10px;}
    .modal-box select{width:100%;padding:12px 14px;border:1.5px solid rgba(128,128,128,0.15);border-radius:10px;font-family:'Space Grotesk',sans-serif;font-size:0.88rem;color:inherit;outline:none;background:transparent;margin-bottom:10px;-webkit-appearance:none;}
    .modal-preview{width:100%;max-height:200px;object-fit:cover;border-radius:10px;margin-bottom:10px;display:none;}
    .modal-err{font-size:0.78rem;min-height:18px;margin-bottom:8px;}
    .modal-btns{display:flex;gap:8px;}
    .modal-btns button{padding:10px 24px;border:none;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.82rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;}

    /* ── HAMBURGER ── */
    .nav-toggle{display:none;background:none;border:none;cursor:pointer;padding:8px;color:inherit;}
    .nav-toggle svg{width:22px;height:22px;display:block;}

    @media(max-width:768px){
      nav{padding:13px 20px;}
      .nav-links{display:none;position:absolute;top:100%;left:0;right:0;flex-direction:column;gap:0;backdrop-filter:blur(16px);border-bottom:1px solid rgba(128,128,128,0.1);padding:8px 0;}
      .nav-links.open{display:flex;}
      .nav-btn{display:block;padding:12px 20px;border:none;border-radius:0;border-bottom:1px solid rgba(128,128,128,0.06);}
      .nav-toggle{display:block;}
      .closet,.builder{padding:16px 20px 40px;}
      .closet-grid{grid-template-columns:repeat(2,1fr);}
      .builder-items{grid-template-columns:repeat(3,1fr);}
      .builder-preview{gap:8px;padding:14px;}
      .builder-slot{width:72px;}
      .tabs{padding:10px 20px;gap:4px;}
      .tab{padding:8px 16px;font-size:0.68rem;letter-spacing:2px;}
      .closet-banner-title{font-size:clamp(1.8rem,5vw,2.8rem);}
      .modal-box{width:calc(100vw - 32px);max-width:420px;padding:24px 20px;}
    }
    @media(max-width:420px){
      .closet-grid{grid-template-columns:repeat(2,1fr);gap:10px;}
      .builder-items{grid-template-columns:repeat(2,1fr);}
      .builder-slot{width:60px;}
      .builder-btn{padding:10px 20px;font-size:0.78rem;}
    }
  </style>
</head>
<body>

<nav id="mainNav">
  <a class="nav-logo bc" href="lifestyle.html">Stuflover</a>
  <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="Menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
  <div class="nav-links">
    <a class="nav-btn bc" href="lifestyle.html">My Page</a>
    <a class="nav-btn bc" href="index.html">Home</a>
  </div>
</nav>

<div class="tabs" id="mainTabs">
  <button class="tab bc on" id="tabCloset" onclick="switchTab('closet')">My Closet</button>
  <button class="tab bc" id="tabBuilder" onclick="switchTab('builder')">Build Outfit</button>
</div>

<!-- CLOSET VIEW -->
<div class="closet" id="closetView">
  <div class="closet-banner" id="closetBanner">
    <div class="closet-banner-title" id="bannerTitle">My Closet</div>
    <div class="closet-banner-sub">add your clothes, build outfits, let your flovee style you</div>
  </div>
  <div class="closet-header">
    <div class="closet-title bc" id="closetCount">0 items</div>
    <button class="closet-add bc" id="addItemBtn" onclick="openAddModal()">Add Item</button>
  </div>
  <div class="closet-cats" id="closetCats"></div>
  <div class="closet-grid" id="closetGrid"></div>
</div>

<!-- OUTFIT BUILDER -->
<div class="builder" id="builderView">
  <div class="builder-header">
    <div class="closet-title bc">Your Outfit</div>
    <button class="builder-btn outline bc" onclick="clearOutfit()">Clear</button>
  </div>
  <div class="builder-preview" id="builderPreview"></div>
  <div class="builder-btns">
    <button class="builder-btn bc" id="suggestBtn" onclick="aiSuggest()">AI Suggest Outfit</button>
  </div>
  <div class="suggest-result" id="suggestResult"></div>
  <div class="builder-pick-label" id="pickLabel">Pick items from your closet</div>
  <div class="closet-cats" id="builderCats"></div>
  <div class="builder-items" id="builderItems"></div>
</div>

<!-- ADD MODAL -->
<div class="modal-bg" id="addModal">
  <div class="modal-box" id="addModalBox">
    <h3>Add to Closet</h3>
    <!-- Camera / Photo upload -->
    <div style="display:flex;gap:8px;margin-bottom:10px;">
      <label style="flex:1;padding:14px;border-radius:10px;border:2px dashed rgba(128,128,128,0.2);text-align:center;cursor:pointer;font-size:0.82rem;font-weight:600;transition:all 0.2s;" id="cameraLabel">
        <svg width="20" height="20" viewBox="0 0 24 24" style="display:block;margin:0 auto 6px;"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="13" r="4" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
        Take Photo
        <input type="file" accept="image/*" capture="environment" id="cameraInput" onchange="handlePhoto(this)" style="display:none;"/>
      </label>
      <label style="flex:1;padding:14px;border-radius:10px;border:2px dashed rgba(128,128,128,0.2);text-align:center;cursor:pointer;font-size:0.82rem;font-weight:600;transition:all 0.2s;" id="galleryLabel">
        <svg width="20" height="20" viewBox="0 0 24 24" style="display:block;margin:0 auto 6px;"><rect x="3" y="3" width="18" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor" opacity="0.5"/><path d="M21 15l-5-5L5 21" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
        From Gallery
        <input type="file" accept="image/*" id="galleryInput" onchange="handlePhoto(this)" style="display:none;"/>
      </label>
    </div>
    <div style="text-align:center;font-size:0.7rem;opacity:0.3;margin-bottom:8px;">or paste a URL</div>
    <input id="addUrl" placeholder="Paste an image URL..." oninput="previewAdd()" style="font-size:0.82rem;"/>
    <img class="modal-preview" id="addPreview"/>
    <input id="addName" placeholder="What is it? (e.g. black crop top)"/>
    <select id="addCat">
      <option value="">Pick a category...</option>
      <option value="tops">Tops</option>
      <option value="bottoms">Bottoms</option>
      <option value="dresses">Dresses</option>
      <option value="outerwear">Outerwear</option>
      <option value="shoes">Shoes</option>
      <option value="bags">Bags</option>
      <option value="accessories">Accessories</option>
    </select>
    <div class="modal-err" id="addErr"></div>
    <div class="modal-btns">
      <button id="addSubmit" onclick="addItem()">Add to Closet</button>
      <button onclick="closeAddModal()" style="background:transparent;border:1.5px solid rgba(128,128,128,0.2);color:inherit;">Cancel</button>
    </div>
    <div style="margin-top:12px;font-size:0.72rem;opacity:0.35;text-align:center;">Or let AI identify it:</div>
    <button id="aiIdentify" onclick="aiIdentifyItem()" style="width:100%;margin-top:6px;padding:10px;border:1.5px dashed rgba(128,128,128,0.15);border-radius:8px;background:transparent;color:inherit;font-family:'Space Grotesk',sans-serif;font-size:0.82rem;cursor:pointer;transition:opacity 0.15s;">Auto-detect item from photo</button>
  </div>
</div>

<script src="/stuflover-config.js"></script>
<script src="/stuflover-backend.js"></script>
<script>
var profile = (function(){try{return JSON.parse(localStorage.getItem('stuflover_profile')||'null');}catch(e){return null;}})();

function resolvePalette(){
  var fc=profile&&profile.faveColour;var ae=(profile&&profile.aesthetics)||{};
  var top=Object.entries(ae).sort(function(a,b){return b[1]-a[1];})[0];
  top=top?top[0]:'softgirl';
  function toHex(v){var h=Math.round(Math.max(0,Math.min(255,v))).toString(16);return h.length<2?'0'+h:h;}
  function lighten(hex,a){try{var c=hex.slice(1).match(/.{2}/g).map(function(x){return parseInt(x,16);});return'#'+toHex(c[0]+(255-c[0])*a)+toHex(c[1]+(255-c[1])*a)+toHex(c[2]+(255-c[2])*a);}catch(e){return hex;}}
  function darken(hex,a){try{var c=hex.slice(1).match(/.{2}/g).map(function(x){return parseInt(x,16);});return'#'+toHex(c[0]*(1-a))+toHex(c[1]*(1-a))+toHex(c[2]*(1-a));}catch(e){return hex;}}
  if(fc&&!fc.dark)return{bg:lighten(fc.hex,0.92),tx:darken(fc.hex,0.6),ac:fc.hex};
  if(fc&&fc.dark)return{bg:darken(fc.hex,0.45),tx:lighten(fc.hex,0.8),ac:fc.hex};
  var m={kawaii:{bg:'#fdf0f5',tx:'#3d0020',ac:'#ff80ab'},softgirl:{bg:'#fce4ec',tx:'#2d0814',ac:'#e8829a'},cleangirl:{bg:'#f5f0ea',tx:'#1a1408',ac:'#8a7a5a'},coquette:{bg:'#fdf0f5',tx:'#280010',ac:'#e06080'},goth:{bg:'#0e060e',tx:'#e8d0f0',ac:'#9040c0'},darkacad:{bg:'#100e08',tx:'#e8d8a8',ac:'#c4a438'},grunge:{bg:'#1a1008',tx:'#f0d4a0',ac:'#c4943a'},y2k:{bg:'#f0c8ec',tx:'#1a0028',ac:'#c03ab0'},street:{bg:'#111111',tx:'#f4c8a0',ac:'#e08040'},cottage:{bg:'#d8ecc4',tx:'#0e2008',ac:'#4a8a2a'},hippie:{bg:'#d8cc88',tx:'#1a1400',ac:'#8a7000'},oldmoney:{bg:'#e8e0d0',tx:'#1a140a',ac:'#7a6840'},preppy:{bg:'#e8f0fc',tx:'#0a1840',ac:'#3060c0'},tomato:{bg:'#e8c498',tx:'#1e0800',ac:'#c46418'},indie:{bg:'#1a1030',tx:'#d8ccf8',ac:'#9070e0'},emo:{bg:'#0a0810',tx:'#e0d0f8',ac:'#7858d0'}};
  return m[top]||{bg:'#f9c4c4',tx:'#1e0c06',ac:'#c4522a'};
}
var PAL = resolvePalette();

// ─── CLOSET DATA ─────────────────────────────────────────
function getCloset(){
  try{return JSON.parse(localStorage.getItem('stuflover_closet')||'[]');}catch(e){return[];}
}
function saveCloset(items){localStorage.setItem('stuflover_closet',JSON.stringify(items));}

var currentCat = 'all';
var currentTab = 'closet';
var outfitPicks = {tops:null,bottoms:null,dresses:null,outerwear:null,shoes:null,bags:null,accessories:null};
var builderCat = 'tops';
var CATS = ['all','tops','bottoms','dresses','outerwear','shoes','bags','accessories'];

// ─── STYLES ──────────────────────────────────────────────
function applyStyles(){
  document.body.style.background=PAL.bg;document.body.style.color=PAL.tx;
  var nav=document.getElementById('mainNav');nav.style.background=PAL.bg+'f0';nav.style.borderColor=PAL.tx+'10';
  document.querySelectorAll('.nav-logo,.nav-btn').forEach(function(e){e.style.color=PAL.tx;e.style.borderColor=PAL.tx+'22';});
  document.getElementById('bannerTitle').style.color=PAL.tx;
  document.getElementById('addItemBtn').style.background=PAL.ac;document.getElementById('addItemBtn').style.color=PAL.bg;
  document.getElementById('addSubmit').style.background=PAL.ac;document.getElementById('addSubmit').style.color=PAL.bg;
  document.getElementById('suggestBtn').style.background=PAL.ac;document.getElementById('suggestBtn').style.color=PAL.bg;
  document.getElementById('addModalBox').style.background=PAL.bg;document.getElementById('addModalBox').style.color=PAL.tx;
  document.querySelectorAll('.tab').forEach(function(t){t.style.color=PAL.tx;});
}

// ─── TABS ────────────────────────────────────────────────
function switchTab(tab){
  currentTab=tab;
  document.getElementById('tabCloset').classList.toggle('on',tab==='closet');
  document.getElementById('tabBuilder').classList.toggle('on',tab==='builder');
  document.getElementById('tabCloset').style.borderBottomColor=tab==='closet'?PAL.ac:'transparent';
  document.getElementById('tabBuilder').style.borderBottomColor=tab==='builder'?PAL.ac:'transparent';
  document.getElementById('closetView').style.display=tab==='closet'?'block':'none';
  document.getElementById('builderView').classList.toggle('active',tab==='builder');
  if(tab==='builder')renderBuilder();
}

// ─── CLOSET ──────────────────────────────────────────────
function renderCloset(){
  var items=getCloset();
  var filtered=currentCat==='all'?items:items.filter(function(i){return i.cat===currentCat;});
  document.getElementById('closetCount').textContent=items.length+' item'+(items.length!==1?'s':'');

  // Cat filters
  var catsHtml='';
  CATS.forEach(function(c){
    var on=c===currentCat?' on':'';
    var style='color:'+PAL.tx+';border-color:'+(c===currentCat?PAL.ac:'rgba(128,128,128,0.12)');
    catsHtml+='<button class="closet-cat'+on+' bc" style="'+style+'" onclick="filterCat(\''+c+'\')">'+c+'</button>';
  });
  document.getElementById('closetCats').innerHTML=catsHtml;

  var grid=document.getElementById('closetGrid');
  if(filtered.length===0){
    grid.innerHTML='<div class="closet-empty">'+
      (items.length===0?'Your closet is empty — add items to get started!':'No items in this category')+
    '</div>';
    return;
  }
  grid.innerHTML='';
  filtered.forEach(function(item,i){
    var idx=items.indexOf(item);
    var card=document.createElement('div');
    card.className='closet-item';
    card.style.background=PAL.tx+'06';
    card.innerHTML=
      '<img src="'+escHtml(item.url)+'" alt="" onerror="this.style.background=\'rgba(128,128,128,0.1)\'"/>'+
      '<div class="closet-item-info" style="color:'+PAL.tx+'">'+
        '<div class="closet-item-name">'+escHtml(item.name)+'</div>'+
        '<div class="closet-item-cat">'+escHtml(item.cat)+'</div>'+
      '</div>'+
      '<button class="closet-item-del" onclick="deleteItem(event,'+idx+')">x</button>';
    grid.appendChild(card);
  });
}

function filterCat(cat){currentCat=cat;renderCloset();}

function deleteItem(e,idx){
  e.stopPropagation();
  var items=getCloset();
  items.splice(idx,1);
  saveCloset(items);
  renderCloset();
}

// ─── ADD ITEM ────────────────────────────────────────────
function openAddModal(){
  photoDataUrl = null;
  document.getElementById('addModal').classList.add('open');
  document.getElementById('addUrl').value='';
  document.getElementById('addName').value='';
  document.getElementById('addCat').value='';
  document.getElementById('addErr').textContent='';
  document.getElementById('addPreview').style.display='none';
  document.getElementById('cameraInput').value='';
  document.getElementById('galleryInput').value='';
}
function closeAddModal(){document.getElementById('addModal').classList.remove('open');}

var photoDataUrl = null; // stores the base64 photo

function handlePhoto(input){
  var file = input.files && input.files[0];
  if(!file) return;
  var err = document.getElementById('addErr');
  err.textContent = 'Processing photo...';
  err.style.color = PAL.ac;

  // Resize to max 400px to save localStorage space
  var reader = new FileReader();
  reader.onload = function(e){
    var img = new Image();
    img.onload = function(){
      var canvas = document.createElement('canvas');
      var maxSize = 400;
      var w = img.width, h = img.height;
      if(w > h){ if(w > maxSize){h = h*(maxSize/w); w = maxSize;} }
      else { if(h > maxSize){w = w*(maxSize/h); h = maxSize;} }
      canvas.width = w; canvas.height = h;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      photoDataUrl = canvas.toDataURL('image/jpeg', 0.7);

      // Show preview
      var preview = document.getElementById('addPreview');
      preview.src = photoDataUrl;
      preview.style.display = 'block';
      document.getElementById('addUrl').value = '';
      err.textContent = 'Photo ready!';
      err.style.color = PAL.ac;
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function previewAdd(){
  var url=document.getElementById('addUrl').value.trim();
  var p=document.getElementById('addPreview');
  if(url&&url.match(/^https?:\/\//)){p.src=url;p.style.display='block';p.onerror=function(){p.style.display='none';};}
  else{p.style.display='none';}
}

function addItem(){
  var url = photoDataUrl || document.getElementById('addUrl').value.trim();
  var name=document.getElementById('addName').value.trim();
  var cat=document.getElementById('addCat').value;
  var err=document.getElementById('addErr');
  if(!url){err.textContent='Take a photo or paste a URL';err.style.color='#c44';return;}
  if(!name){err.textContent='Give it a name';err.style.color='#c44';return;}
  if(!cat){err.textContent='Pick a category';err.style.color='#c44';return;}
  var items=getCloset();
  items.push({url:url,name:name,cat:cat,added:Date.now()});
  try{ saveCloset(items); }catch(e){
    // If localStorage is full (too many photos), warn
    err.textContent='Storage full — try removing some items first';err.style.color='#c44';return;
  }
  closeAddModal();
  renderCloset();
}

async function aiIdentifyItem(){
  var url=document.getElementById('addUrl').value.trim();
  var err=document.getElementById('addErr');
  if(!url){err.textContent='Paste a photo URL first';err.style.color='#c44';return;}
  var btn=document.getElementById('aiIdentify');
  btn.textContent='Identifying...';btn.disabled=true;
  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:150,
        system:'You identify clothing items from image URLs. Return ONLY a JSON object: {name:"item description",cat:"category"} where cat is one of: tops, bottoms, dresses, outerwear, shoes, bags, accessories. Name should be specific like "black cropped cardigan" or "white platform sneakers". No markdown.',
        messages:[{role:'user',content:'Identify this clothing item. The image URL is: '+url+'\n\nBased on the URL and common fashion items, what is this most likely? Return JSON {name, cat}.'}]
      })
    });
    var data=await res.json();
    var text=(data.content&&data.content[0]&&data.content[0].text)||'';
    var match=text.match(/\{[\s\S]*\}/);
    if(match){
      var result=JSON.parse(match[0]);
      if(result.name)document.getElementById('addName').value=result.name;
      if(result.cat)document.getElementById('addCat').value=result.cat;
      err.textContent='Detected! Check and adjust if needed.';err.style.color=PAL.ac;
    }
  }catch(e){err.textContent='Could not identify — enter manually';err.style.color='#c44';}
  btn.textContent='Auto-detect item from photo';btn.disabled=false;
}

// ─── OUTFIT BUILDER ──────────────────────────────────────
function renderBuilder(){
  // Preview slots
  var preview=document.getElementById('builderPreview');
  var slots=['tops','bottoms','shoes','outerwear','accessories'];
  preview.innerHTML='';
  slots.forEach(function(cat){
    var pick=outfitPicks[cat];
    var slot=document.createElement('div');
    slot.className='builder-slot';
    if(pick){
      slot.innerHTML='<img src="'+escHtml(pick.url)+'" alt=""/><div class="builder-slot-label">'+cat+'</div>';
    }else{
      slot.innerHTML='<div class="builder-slot-empty">'+cat+'</div><div class="builder-slot-label">'+cat+'</div>';
    }
    preview.appendChild(slot);
  });

  // Cat filter for picking
  var catsHtml='';
  ['tops','bottoms','dresses','outerwear','shoes','bags','accessories'].forEach(function(c){
    var on=c===builderCat?' on':'';
    var style='color:'+PAL.tx+';border-color:'+(c===builderCat?PAL.ac:'rgba(128,128,128,0.12)');
    catsHtml+='<button class="closet-cat'+on+' bc" style="'+style+'" onclick="pickBuilderCat(\''+c+'\')">'+c+'</button>';
  });
  document.getElementById('builderCats').innerHTML=catsHtml;

  // Items to pick from
  var items=getCloset().filter(function(i){return i.cat===builderCat;});
  var grid=document.getElementById('builderItems');
  grid.innerHTML='';
  if(items.length===0){
    grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:30px;opacity:0.3;font-style:italic;">No '+builderCat+' in your closet</div>';
    return;
  }
  items.forEach(function(item){
    var isPicked=outfitPicks[builderCat]&&outfitPicks[builderCat].url===item.url;
    var card=document.createElement('div');
    card.className='builder-item'+(isPicked?' picked':'');
    card.style.borderColor=isPicked?PAL.ac:'transparent';
    card.style.background=PAL.tx+'06';
    card.innerHTML='<img src="'+escHtml(item.url)+'" alt=""/>';
    card.onclick=function(){
      if(isPicked){outfitPicks[builderCat]=null;}else{outfitPicks[builderCat]=item;}
      renderBuilder();
    };
    grid.appendChild(card);
  });
}

function pickBuilderCat(cat){builderCat=cat;renderBuilder();}

function clearOutfit(){
  for(var k in outfitPicks)outfitPicks[k]=null;
  document.getElementById('suggestResult').style.display='none';
  renderBuilder();
}

async function aiSuggest(){
  var items=getCloset();
  if(items.length<3){alert('Add at least 3 items to your closet first!');return;}
  var btn=document.getElementById('suggestBtn');
  btn.disabled=true;btn.textContent='Thinking...';

  var closetDesc=items.map(function(i){return i.cat+': '+i.name;}).join('\n');
  var aeName=profile?Object.entries(profile.aesthetics||{}).sort(function(a,b){return b[1]-a[1];})[0]:'';
  aeName=aeName?aeName[0]:'casual';

  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:300,
        system:'You are a personal stylist. The user has a '+aeName+' aesthetic. Given their closet items, suggest ONE complete outfit combination. Be specific — name the exact items from their list. Explain why it works in 1-2 sentences. Keep it fun and encouraging.',
        messages:[{role:'user',content:'Here is everything in my closet:\n'+closetDesc+'\n\nSuggest a complete outfit from these items!'}]
      })
    });

    result.style.color=PAL.tx;
  }catch(e){}

  btn.disabled=false;btn.textContent='AI Suggest Outfit';
}

function escHtml(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// Floating hearts/sparkles
function addFloatingDecos(){
  var shapes = [
    '<svg width="12" height="12" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="'+PAL.ac+'"/></svg>',
    '<svg width="10" height="10" viewBox="0 0 24 24"><polygon points="12,2 15,9 22,9 17,14 18,21 12,18 6,21 7,14 2,9 9,9" fill="'+PAL.ac+'"/></svg>',
    '<svg width="8" height="8" viewBox="0 0 16 16"><path d="M8 0 L10 6 L16 8 L10 10 L8 16 L6 10 L0 8 L6 6 Z" fill="'+PAL.ac+'"/></svg>',
  ];
  for(var i=0;i<5;i++){

    d.style.bottom='-20px';
    d.style.animationDuration=(10+Math.random()*10)+'s';
    d.style.animationDelay=(i*3)+'s';
    d.innerHTML=shapes[i%shapes.length];
    document.body.appendChild(d);
  }
}

// Sparkle cursor trail
var sparkles=[];
document.addEventListener('mousemove',function(e){
  if(sparkles.length>10)return;
  var s=document.createElement('div');
  s.className='cursor-sparkle';
  s.style.left=e.clientX+'px';s.style.top=e.clientY+'px';
  s.style.background=PAL.ac;s.style.opacity='0.6';
  document.body.appendChild(s);sparkles.push(s);
  setTimeout(function(){s.style.opacity='0';s.style.transform='scale(0) translateY(-12px)';},30);
  setTimeout(function(){s.remove();sparkles.splice(sparkles.indexOf(s),1);},550);
});

// ─── INIT ────────────────────────────────────────────────
applyStyles();
renderCloset();
addFloatingDecos();
</script>
