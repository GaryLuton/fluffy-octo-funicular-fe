<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Brain Boost — Stuflover</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800;900&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <script src="stuflover-config.js"></script>
  <script src="stuflover-backend.js"></script>
  <style>
    :root{--pink:#faf0f0;--bg:#faf0f0;--pink-mid:#f0ddd6;--terra:#c87860;--ac:#c87860;--terra-dark:#a86050;--ac2:#a86050;--brown:#2a1a14;--tx:#2a1a14;--white:#ffffff;--peach:#e8d5c8;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Space Grotesk',sans-serif;background:var(--pink);color:var(--brown);overflow-x:hidden;
      background-image:radial-gradient(circle at 20px 20px, rgba(30,12,6,0.03) 1px, transparent 1px),
                        radial-gradient(circle at 60px 60px, rgba(30,12,6,0.02) 1px, transparent 1px);
      background-size:80px 80px;
    }
    body::before{content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
      background:linear-gradient(145deg, rgba(247,212,176,0.25) 0%, rgba(249,196,196,0.05) 40%, rgba(245,170,170,0.18) 100%);
    }
    .bc{font-family:'Barlow Condensed',sans-serif;font-weight:900;text-transform:uppercase;letter-spacing:1px;}

    /* MOTIVATIONAL QUOTE */
    .moti-quote{text-align:center;max-width:560px;margin:0 auto;padding:18px 24px 0;font-style:italic;font-size:0.92rem;color:rgba(30,12,6,0.5);line-height:1.6;letter-spacing:0.3px;}

    /* NAV */
    nav{position:fixed;top:0;width:100%;z-index:400;display:flex;align-items:center;justify-content:space-between;padding:14px 40px;background:rgba(250,240,240,0.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(30,12,6,0.07);}
    .logo{font-size:1.7rem;letter-spacing:4px;text-decoration:none;color:var(--brown);}
    .nav-links{display:flex;gap:8px;}
    .nav-toggle{display:none;background:none;border:none;cursor:pointer;padding:8px;color:inherit;}
    .nav-toggle svg{width:22px;height:22px;display:block;}
    .nav-link{font-size:0.78rem;letter-spacing:3px;text-decoration:none;padding:9px 22px;border-radius:4px;border:1.5px solid rgba(30,12,6,0.18);font-family:'Barlow Condensed',sans-serif;font-weight:900;text-transform:uppercase;color:var(--brown);transition:opacity 0.2s;}
    .nav-link:hover{opacity:0.55;}

    /* TABS — pill / capsule design */
    .tabs-bar{display:flex;justify-content:center;gap:8px;margin-top:70px;padding:14px 40px 0;background:transparent;}
    .tab-btn{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.92rem;letter-spacing:3px;text-transform:uppercase;padding:12px 30px;border:none;background:rgba(30,12,6,0.06);color:var(--brown);cursor:pointer;opacity:0.55;border-radius:999px;transition:all 0.35s cubic-bezier(0.4,0,0.2,1);border-bottom:none;}
    .tab-btn.active{opacity:1;background:var(--terra);color:var(--white);box-shadow:0 4px 14px rgba(196,82,42,0.3);}
    .tab-btn:hover:not(.active){opacity:0.8;background:rgba(30,12,6,0.1);}

    /* TAB CONTENT */
    .tab-content{display:none;max-width:760px;margin:0 auto;padding:30px 24px 60px;}
    .tab-content.active{display:block;animation:fadeInTab 0.35s ease;}
    @keyframes fadeInTab{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

    /* HOMEWORK CHAT — cute bubble style */
    .chat-box{background:rgba(255,255,255,0.7);backdrop-filter:blur(6px);border-radius:20px;padding:24px;min-height:380px;max-height:55vh;overflow-y:auto;margin-bottom:16px;border:1px solid rgba(30,12,6,0.06);box-shadow:0 2px 20px rgba(30,12,6,0.04);}
    .chat-msg{margin-bottom:16px;line-height:1.7;font-size:0.95rem;animation:msgPop 0.3s ease;}
    @keyframes msgPop{from{opacity:0;transform:scale(0.95) translateY(6px);}to{opacity:1;transform:scale(1) translateY(0);}}
    .chat-msg.user{text-align:right;}
    .chat-msg.user span{background:var(--terra);color:var(--white);padding:10px 18px;border-radius:20px 20px 6px 20px;display:inline-block;max-width:80%;box-shadow:0 2px 8px rgba(196,82,42,0.2);position:relative;}
    .chat-msg.ai span{background:var(--peach);color:var(--brown);padding:10px 18px;border-radius:20px 20px 20px 6px;display:inline-block;max-width:80%;box-shadow:0 2px 8px rgba(30,12,6,0.06);position:relative;}
    .chat-msg.user span::after{content:'';position:absolute;bottom:-1px;right:6px;width:10px;height:10px;background:var(--terra);border-radius:0 0 10px 0;clip-path:polygon(100% 0, 0 0, 100% 100%);}
    .chat-msg.ai span::after{content:'';position:absolute;bottom:-1px;left:6px;width:10px;height:10px;background:var(--peach);border-radius:0 0 0 10px;clip-path:polygon(0 0, 100% 0, 0 100%);}
    .chat-input-row{display:flex;gap:10px;align-items:center;}
    .chat-input-row input{flex:1;padding:16px 24px;border-radius:999px;border:1.5px solid rgba(30,12,6,0.1);font-family:inherit;font-size:0.95rem;outline:none;background:var(--white);transition:border-color 0.3s, box-shadow 0.3s, background 0.3s;box-shadow:0 2px 8px rgba(30,12,6,0.04);}
    .chat-input-row input:focus{border-color:var(--terra);box-shadow:0 0 0 4px rgba(196,82,42,0.1), 0 2px 12px rgba(30,12,6,0.06);background:rgba(255,255,255,0.95);}
    .send-btn,.action-btn{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.9rem;letter-spacing:2px;text-transform:uppercase;background:var(--terra);color:white;border:none;border-radius:999px;padding:14px 28px;cursor:pointer;transition:all 0.25s cubic-bezier(0.4,0,0.2,1);box-shadow:0 3px 10px rgba(196,82,42,0.2);}
    .send-btn:hover,.action-btn:hover{background:var(--terra-dark);transform:translateY(-1px);box-shadow:0 5px 16px rgba(196,82,42,0.3);}
    .send-btn:active,.action-btn:active{transform:translateY(0);box-shadow:0 2px 6px rgba(196,82,42,0.15);}
    .send-btn:disabled,.action-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none;}

    /* FLASH CARDS — 3D flip */
    .fc-create{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap;}
    .fc-create input{flex:1;min-width:120px;padding:12px 16px;border-radius:999px;border:1.5px solid rgba(30,12,6,0.1);font-family:inherit;font-size:0.95rem;outline:none;transition:border-color 0.2s, box-shadow 0.2s;}
    .fc-create input:focus{border-color:var(--terra);box-shadow:0 0 0 3px rgba(196,82,42,0.1);}
    .card-stage{display:flex;flex-direction:column;align-items:center;gap:20px;}
    .flip-card{width:100%;max-width:440px;height:260px;perspective:1000px;cursor:pointer;}
    .flip-card-inner{position:relative;width:100%;height:100%;transition:transform 0.7s cubic-bezier(0.4,0.2,0.2,1);transform-style:preserve-3d;}
    .flip-card:hover .flip-card-inner{transform:rotateY(8deg);}
    .flip-card.flipped .flip-card-inner{transform:rotateY(180deg);}
    .flip-card.flipped:hover .flip-card-inner{transform:rotateY(172deg);}
    .flip-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:20px;display:flex;align-items:center;justify-content:center;padding:28px;font-size:1.3rem;text-align:center;line-height:1.6;font-weight:500;}
    .flip-front{background:var(--white);border:2px solid rgba(30,12,6,0.08);box-shadow:0 8px 30px rgba(30,12,6,0.08), 0 2px 8px rgba(30,12,6,0.04);transition:box-shadow 0.7s ease;}
    .flip-card.flipped .flip-front{box-shadow:0 2px 8px rgba(30,12,6,0.03);}
    .flip-back{background:linear-gradient(135deg, var(--terra), var(--terra-dark));color:var(--white);transform:rotateY(180deg);box-shadow:0 4px 12px rgba(196,82,42,0.1);transition:box-shadow 0.7s ease;}
    .flip-card.flipped .flip-back{box-shadow:0 12px 40px rgba(196,82,42,0.35), 0 4px 12px rgba(196,82,42,0.2);}
    .fc-controls{display:flex;gap:12px;align-items:center;}
    .fc-nav{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.85rem;letter-spacing:2px;text-transform:uppercase;padding:10px 22px;border-radius:999px;border:1.5px solid var(--terra);background:none;color:var(--terra);cursor:pointer;transition:all 0.25s;}
    .fc-nav:hover{background:var(--terra);color:white;box-shadow:0 3px 10px rgba(196,82,42,0.2);}
    .fc-nav:disabled{opacity:0.3;cursor:not-allowed;box-shadow:none;}
    .fc-counter{font-size:0.85rem;color:rgba(30,12,6,0.45);letter-spacing:1px;}
    .fc-clear{margin-top:10px;font-size:0.75rem;letter-spacing:2px;text-transform:uppercase;background:none;border:none;color:rgba(30,12,6,0.35);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:800;transition:color 0.2s;}
    .fc-clear:hover{color:var(--terra);}
    .fc-empty{text-align:center;color:rgba(30,12,6,0.35);padding:60px 20px;font-size:1rem;}

    /* QUIZ */
    .quiz-topic-row{display:flex;gap:10px;margin-bottom:24px;}
    .quiz-topic-row input{flex:1;padding:14px 18px;border-radius:999px;border:1.5px solid rgba(30,12,6,0.1);font-family:inherit;font-size:0.95rem;outline:none;transition:border-color 0.2s, box-shadow 0.2s;}
    .quiz-topic-row input:focus{border-color:var(--terra);box-shadow:0 0 0 3px rgba(196,82,42,0.1);}
    .quiz-q{background:var(--white);border-radius:16px;padding:28px;margin-bottom:16px;border:1px solid rgba(30,12,6,0.06);box-shadow:0 2px 16px rgba(30,12,6,0.04);}
    .quiz-q h3{font-size:1.15rem;margin-bottom:18px;line-height:1.5;}
    .quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .quiz-opt{padding:14px 16px;border-radius:12px;border:1.5px solid rgba(30,12,6,0.1);background:var(--white);font-family:inherit;font-size:0.95rem;cursor:pointer;text-align:left;transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);line-height:1.5;}
    .quiz-opt:hover:not(:disabled){border-color:var(--terra);background:rgba(196,82,42,0.05);transform:translateY(-4px) scale(1.03);box-shadow:0 6px 18px rgba(196,82,42,0.12);}
    .quiz-opt:active:not(:disabled){transform:translateY(0) scale(0.98);transition-duration:0.1s;}
    .quiz-opt.correct{background:#c8f5c8;border-color:#3a3;animation:correctPulse 0.6s ease;}
    .quiz-opt.wrong{background:#f5c8c8;border-color:#c33;animation:wrongShake 0.5s ease;}
    .quiz-opt:disabled{cursor:default;}
    @keyframes correctPulse{
      0%{box-shadow:0 0 0 0 rgba(51,170,51,0.4);}
      40%{box-shadow:0 0 0 12px rgba(51,170,51,0);}
      100%{box-shadow:none;}
    }
    /* Confetti celebration on correct answer */
    .quiz-opt.correct{position:relative;overflow:visible;}
    .quiz-opt.correct::before,.quiz-opt.correct::after{
      content:'';position:absolute;top:50%;left:50%;width:6px;height:6px;border-radius:50%;pointer-events:none;
      animation:confettiBurst 0.8s ease-out forwards;
    }
    .quiz-opt.correct::before{
      box-shadow:
        -20px -30px 0 #ff6b6b, 15px -35px 0 #ffd93d, 35px -15px 0 #6bcb77,
        -35px -10px 0 #4d96ff, 25px -28px 0 #ff922b, -10px -40px 0 #cc5de8,
        40px -25px 0 #ff6b6b, -30px -35px 0 #ffd93d;
    }
    .quiz-opt.correct::after{
      box-shadow:
        -25px 25px 0 #6bcb77, 20px 30px 0 #4d96ff, 38px 10px 0 #ff922b,
        -38px 15px 0 #cc5de8, 10px 35px 0 #ff6b6b, -15px 32px 0 #ffd93d,
        30px 22px 0 #4d96ff, -32px 28px 0 #6bcb77;
    }
    @keyframes confettiBurst{
      0%{transform:scale(0);opacity:1;}
      50%{transform:scale(1.2);opacity:1;}
      100%{transform:scale(1.8);opacity:0;}
    }
    @keyframes wrongShake{
      0%,100%{transform:translateX(0);}
      15%{transform:translateX(-6px);}
      30%{transform:translateX(5px);}
      45%{transform:translateX(-4px);}
      60%{transform:translateX(3px);}
      75%{transform:translateX(-2px);}
    }
    .quiz-explanation{margin-top:14px;padding:14px;background:var(--peach);border-radius:12px;font-size:0.9rem;line-height:1.7;}
    .quiz-score{font-size:0.85rem;color:rgba(30,12,6,0.5);margin-bottom:16px;letter-spacing:1px;}
    .quiz-next-row{margin-top:16px;display:flex;gap:12px;}
    @media(max-width:768px){
      nav{padding:14px 20px;}
      .nav-links{display:none;position:absolute;top:100%;left:0;right:0;flex-direction:column;gap:0;background:rgba(250,240,240,0.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(30,12,6,0.07);padding:8px 0;}
      .nav-links.open{display:flex;}
      .nav-link{display:block;padding:12px 20px;border:none;border-radius:0;border-bottom:1px solid rgba(30,12,6,0.05);}
      .nav-toggle{display:block;}
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav id="mainNav">
  <a href="lifestyle.html" class="logo bc">Stuflover</a>
  <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="Menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
  <div class="nav-links">
    <a href="lifestyle.html" class="nav-link bc">← Back</a>
    <a href="account.html" class="nav-link bc">Account</a>
    <a href="index.html" class="nav-link bc">Home</a>
  </div>
</nav>

<!-- HEADER -->
<div style="text-align:center;padding:80px 20px 10px;">
  <div style="font-size:0.62rem;letter-spacing:5px;text-transform:uppercase;opacity:0.3;font-family:'Barlow Condensed',sans-serif;font-weight:900;margin-bottom:6px;">Stuflover</div>
  <h1 class="bc" style="font-size:clamp(2.2rem,6vw,3.5rem);letter-spacing:-1px;line-height:0.9;margin-bottom:8px;">Brain Boost</h1>
  <p style="font-size:0.88rem;opacity:0.4;max-width:340px;margin:0 auto;line-height:1.7;">no stress. just learning that actually sticks.</p>
</div>

<!-- TABS -->
<div class="tabs-bar">
  <button class="tab-btn bc active" data-tab="homework">Ask Flovee</button>
  <button class="tab-btn bc" data-tab="flashcards">Flash Cards</button>
  <button class="tab-btn bc" data-tab="quiz">Quiz Me</button>
</div>

<!-- MOTIVATIONAL QUOTE -->
<div class="moti-quote" id="motiQuote"></div>

<!-- HOMEWORK HELP -->
<div id="homework" class="tab-content active">
  <div class="chat-box" id="chatBox"></div>
  <div class="chat-input-row">
    <input type="text" id="chatInput" placeholder="Ask anything — no stupid questions here..." autocomplete="off"/>
    <button class="send-btn bc" id="chatSend">Send</button>
  </div>
</div>

<!-- FLASH CARDS -->
<div id="flashcards" class="tab-content">
  <div style="text-align:center;margin-bottom:16px;">
    <div style="font-size:0.6rem;letter-spacing:4px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;font-weight:900;opacity:0.25;margin-bottom:4px;">Your cards</div>
    <p style="font-size:0.82rem;opacity:0.35;">tap a card to flip it</p>
  </div>
  <div class="fc-create">
    <input type="text" id="fcFront" placeholder="Question or term..."/>
    <input type="text" id="fcBack" placeholder="Answer..."/>
    <button class="action-btn bc" id="fcAdd">Add</button>
  </div>
  <div class="card-stage" id="fcStage">
    <div class="fc-empty" id="fcEmpty">No cards yet — add your first one above</div>
  </div>
</div>

<!-- QUIZ -->
<div id="quiz" class="tab-content">
  <div style="text-align:center;margin-bottom:20px;">
    <div style="font-size:0.6rem;letter-spacing:4px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;font-weight:900;opacity:0.25;margin-bottom:8px;">Test yourself</div>
    <div class="quiz-score bc" id="quizScore" style="font-size:1rem;margin-bottom:12px;"></div>
  </div>
  <div class="quiz-topic-row">
    <input type="text" id="quizTopic" placeholder="What do you want to be quizzed on?"/>
    <button class="action-btn bc" id="quizGen">Go</button>
  </div>
  <div id="quizArea"></div>
</div>

<script>
(function(){
  /* ── Motivational quote ── */
  var studyQuotes=[
    "your brain is literally so powerful rn",
    "main character energy but make it academic",
    "studying hits different when you actually get it",
    "you are not behind. you are on your own timeline.",
    "confused? good. that means you are about to learn something",
    "hot take: you are smarter than you think",
    "this is your sign to trust the process",
    "plot twist: you actually understand this",
    "learning > stressing. always.",
    "you do not need to be perfect. you need to be curious.",
    "one more question and you are literally unstoppable",
    "your future self is so proud of you rn",
    "no because you are actually getting this",
    "the girlies who study casually > the girlies who panic",
    "breathe. you got this. for real."
  ];
  var quoteEl=document.getElementById('motiQuote');
  if(quoteEl){quoteEl.textContent='"'+studyQuotes[Math.floor(Math.random()*studyQuotes.length)]+'"';}

  /* ── Palette from profile ── */
  try{
    var p=JSON.parse(localStorage.getItem('stuflover_profile'));
    if(p&&p.palette){
      var c=p.palette;
      if(c.bg) document.documentElement.style.setProperty('--pink',c.bg);
      if(c.accent) {document.documentElement.style.setProperty('--terra',c.accent);document.documentElement.style.setProperty('--terra-dark',c.accent);}
      if(c.text) document.documentElement.style.setProperty('--brown',c.text);
      if(c.card) document.documentElement.style.setProperty('--peach',c.card);
      if(c.secondary) document.documentElement.style.setProperty('--pink-mid',c.secondary);
      /* nav bg */
      if(c.bg){var nav=document.querySelector('nav');if(nav)nav.style.background=c.bg+'f7';}
    }
  }catch(e){}

  /* ── Tabs ── */
  var tabs=document.querySelectorAll('.tab-btn');
  var panes=document.querySelectorAll('.tab-content');
  tabs.forEach(function(t){
    t.addEventListener('click',function(){
      tabs.forEach(function(b){b.classList.remove('active');});
      panes.forEach(function(p){p.classList.remove('active');});
      t.classList.add('active');
      document.getElementById(t.dataset.tab).classList.add('active');
    });
  });

  /* ════════════════════════════
     HOMEWORK HELP (Chat)
  ════════════════════════════ */
  var chatBox=document.getElementById('chatBox');
  var chatInput=document.getElementById('chatInput');
  var chatSend=document.getElementById('chatSend');
  var chatHistory=[];
  var SYSTEM_PROMPT="You are their Flovee study buddy — fun, encouraging, no stress! Help them understand homework by explaining simply with relatable examples. Never give direct answers — guide them using the Socratic method. Start with encouraging phrases like 'great question!', 'let us break this down!', 'you are so close!', 'no stress we got this!'. Be casual and friendly, not formal. If they get frustrated, remind them that struggling means learning. NEVER help create websites or write code.";

  function addMsg(role,text){
    var d=document.createElement('div');
    d.className='chat-msg '+(role==='user'?'user':'ai');
    d.innerHTML='<span>'+text.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')+'</span>';
    chatBox.appendChild(d);
    chatBox.scrollTop=chatBox.scrollHeight;
  }

  async function sendChat(){
    var msg=chatInput.value.trim();
    if(!msg)return;
    chatInput.value='';
    addMsg('user',msg);
    chatHistory.push({role:'user',content:msg});
    chatSend.disabled=true;
    try{
      var res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:500,
          system:SYSTEM_PROMPT,
          messages:chatHistory
        })
      });
      var data=await res.json();
      var reply=data.content&&data.content[0]?data.content[0].text:'Sorry, something went wrong.';
      chatHistory.push({role:'assistant',content:reply});
      addMsg('ai',reply);
    }catch(e){
      addMsg('ai','Error: '+e.message);
    }
    chatSend.disabled=false;
    chatInput.focus();
  }

  chatSend.addEventListener('click',sendChat);
  chatInput.addEventListener('keydown',function(e){if(e.key==='Enter')sendChat();});

  /* ════════════════════════════
     FLASH CARDS
  ════════════════════════════ */
  var FC_KEY='stuflover_flashcards';
  var cards=JSON.parse(localStorage.getItem(FC_KEY)||'[]');
  var fcIdx=0;
  var fcStage=document.getElementById('fcStage');
  var fcEmpty=document.getElementById('fcEmpty');

  function saveCards(){localStorage.setItem(FC_KEY,JSON.stringify(cards));}

  function renderCard(){
    /* remove old card elements */
    fcStage.querySelectorAll('.flip-card,.fc-controls,.fc-clear').forEach(function(e){e.remove();});
    fcEmpty.style.display=cards.length?'none':'block';
    if(!cards.length)return;
    if(fcIdx>=cards.length)fcIdx=cards.length-1;
    if(fcIdx<0)fcIdx=0;
    var c=cards[fcIdx];

    var fc=document.createElement('div');fc.className='flip-card';
    fc.innerHTML='<div class="flip-card-inner"><div class="flip-face flip-front">'+esc(c.front)+'</div><div class="flip-face flip-back">'+esc(c.back)+'</div></div>';
    fc.addEventListener('click',function(){fc.classList.toggle('flipped');});

    var ctrls=document.createElement('div');ctrls.className='fc-controls';
    var prev=document.createElement('button');prev.className='fc-nav';prev.textContent='Prev';prev.disabled=fcIdx===0;
    prev.addEventListener('click',function(){fcIdx--;renderCard();});
    var counter=document.createElement('span');counter.className='fc-counter';counter.textContent=(fcIdx+1)+' / '+cards.length;
    var next=document.createElement('button');next.className='fc-nav';next.textContent='Next';next.disabled=fcIdx===cards.length-1;
    next.addEventListener('click',function(){fcIdx++;renderCard();});
    ctrls.appendChild(prev);ctrls.appendChild(counter);ctrls.appendChild(next);

    var clr=document.createElement('button');clr.className='fc-clear';clr.textContent='Clear All Cards';
    clr.addEventListener('click',function(){if(confirm('Delete all flash cards?')){cards=[];fcIdx=0;saveCards();renderCard();}});

    fcStage.appendChild(fc);fcStage.appendChild(ctrls);fcStage.appendChild(clr);
  }

  function esc(s){return s.replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  document.getElementById('fcAdd').addEventListener('click',function(){
    var f=document.getElementById('fcFront').value.trim();
    var b=document.getElementById('fcBack').value.trim();
    if(!f||!b)return;
    cards.push({front:f,back:b});
    saveCards();
    document.getElementById('fcFront').value='';
    document.getElementById('fcBack').value='';
    fcIdx=cards.length-1;
    renderCard();
  });

  renderCard();

  /* ════════════════════════════
     QUIZ
  ════════════════════════════ */
  var quizArea=document.getElementById('quizArea');
  var quizScore=document.getElementById('quizScore');
  var quizTopic=document.getElementById('quizTopic');
  var quizGen=document.getElementById('quizGen');
  var score={correct:0,total:0};
  var currentTopic='';

  function updateScore(){
    quizScore.textContent=score.total?'Score: '+score.correct+' / '+score.total:'';
  }

  async function generateQuestion(){
    quizArea.innerHTML='<p style="color:rgba(30,12,6,0.4);text-align:center;padding:40px 0;">Generating question...</p>';
    quizGen.disabled=true;
    try{
      var res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:500,
          system:'Generate exactly 1 multiple-choice question about: '+currentTopic+'. Respond ONLY with valid JSON, no markdown, no extra text. Format: {"question":"...","options":["a","b","c","d"],"correct":0,"explanation":"why"}. The "correct" field is the 0-based index of the right answer.',
          messages:[{role:'user',content:'Generate a question about '+currentTopic+'. Return only JSON.'}]
        })
      });
      var data=await res.json();
      var txt=data.content&&data.content[0]?data.content[0].text:'';
      /* extract JSON from response */
      var match=txt.match(/\{[\s\S]*\}/);
      if(!match)throw new Error('No JSON in response');
      var q=JSON.parse(match[0]);
      showQuestion(q);
    }catch(e){
      quizArea.innerHTML='<p style="color:#c33;text-align:center;">Error: '+e.message+'</p>';
    }
    quizGen.disabled=false;
  }

  function showQuestion(q){
    quizArea.innerHTML='';
    var wrap=document.createElement('div');wrap.className='quiz-q';
    var h=document.createElement('h3');h.textContent=q.question;
    wrap.appendChild(h);

    var opts=document.createElement('div');opts.className='quiz-opts';
    var answered=false;

    q.options.forEach(function(opt,i){
      var btn=document.createElement('button');btn.className='quiz-opt';btn.textContent=opt;
      btn.addEventListener('click',function(){
        if(answered)return;
        answered=true;
        score.total++;
        opts.querySelectorAll('.quiz-opt').forEach(function(b){b.disabled=true;});
        if(i===q.correct){
          btn.classList.add('correct');
          score.correct++;
        }else{
          btn.classList.add('wrong');
          opts.querySelectorAll('.quiz-opt')[q.correct].classList.add('correct');
        }
        updateScore();
        /* explanation */
        if(q.explanation){
          var exp=document.createElement('div');exp.className='quiz-explanation';
          exp.textContent=q.explanation;
          wrap.appendChild(exp);
        }
        /* next button */
        var nrow=document.createElement('div');nrow.className='quiz-next-row';
        var nxt=document.createElement('button');nxt.className='action-btn bc';nxt.textContent='Next Question';
        nxt.addEventListener('click',function(){generateQuestion();});
        nrow.appendChild(nxt);
        wrap.appendChild(nrow);
      });
      opts.appendChild(btn);
    });

    wrap.appendChild(opts);
    quizArea.appendChild(wrap);
  }

  quizGen.addEventListener('click',function(){
    var t=quizTopic.value.trim();
    if(!t)return;
    currentTopic=t;
    score={correct:0,total:0};
    updateScore();
    generateQuestion();
  });

  quizTopic.addEventListener('keydown',function(e){
    if(e.key==='Enter')quizGen.click();
  });
})();
</script>
</body>
</html>
