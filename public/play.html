<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <title>Play — Stuflover</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800;900&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <link rel="preload" href="/stuflover-nav.css" as="style"/>
  <link rel="stylesheet" href="/stuflover-nav.css"/>
  <link rel="preload" href="/stuflover-nav.js" as="script"/>
  <script src="/stuflover-theme-boot.js"></script>
  <link rel="stylesheet" href="stuflover-design-system.css"/>
  <style>
    body{margin:0;font-family:'Space Grotesk',sans-serif;background:var(--bg,#faf0f0);color:var(--tx,#2a1a14);}
    .bc{font-family:'Barlow Condensed',sans-serif;font-weight:900;text-transform:uppercase;letter-spacing:1px;}

    #gamePage{min-height:100vh;display:flex;flex-direction:column;padding-top:60px;}

    /* ── DTI GAME ── */
    /* ── DTI GAME ── */
    #dtiView{display:none;flex:1;flex-direction:column;overflow:hidden;position:relative;}
    #dtiView.active{display:flex;}
    .dti-top{display:flex;flex:1;overflow:hidden;}

    /* Close affordance shared by DTI / card-game / other full-screen overlays */
    .sl-modal-close{position:absolute;top:12px;right:12px;z-index:50;width:36px;height:36px;border-radius:50%;border:1.5px solid rgba(128,128,128,0.22);background:rgba(255,255,255,0.92);font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.2rem;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;color:#2a1a14;transition:transform 0.15s, background 0.15s;}
    .sl-modal-close:hover{transform:scale(1.08);background:#fff;}
    .sl-modal-close:focus-visible{outline:2px solid var(--terracotta,#c87860);outline-offset:2px;}

    /* Avatar panel */
    .dti-avatar-panel{flex:0 0 320px;display:flex;flex-direction:column;align-items:center;padding:16px 12px;position:relative;overflow:hidden;min-height:400px;}
    .dti-avatar-panel::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:12px;border-radius:50%;filter:blur(8px);opacity:0.1;background:currentColor;}
    .dti-figure-wrap{position:relative;width:100%;flex:1 1 auto;min-height:300px;margin:0 auto;}
    .dti-figure-wrap canvas{width:100%!important;height:100%!important;display:block;border-radius:12px;}
    .dti-skin-row{display:flex;gap:6px;justify-content:center;margin-top:10px;}
    .dti-skin-btn{width:24px;height:24px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all 0.15s;padding:0;background:none;}
    .dti-skin-btn:hover{transform:scale(1.15);}
    .dti-skin-btn.on{border-color:rgba(128,128,128,0.5);transform:scale(1.1);}
    .dti-skin-inner{width:100%;height:100%;border-radius:50%;}
    .dti-outfit-label{margin-top:12px;text-align:center;width:100%;}
    .dti-outfit-item{font-size:0.7rem;opacity:0.5;line-height:1.7;display:flex;align-items:center;gap:6px;justify-content:center;}
    .dti-outfit-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .dti-remove-btn{opacity:0;font-size:0.6rem;cursor:pointer;background:transparent;border:none;color:inherit;padding:2px 4px;transition:opacity 0.15s;}
    .dti-outfit-item:hover .dti-remove-btn{opacity:0.5;}

    /* Wardrobe */
    .dti-wardrobe{flex:1;display:flex;flex-direction:column;border-left:1px solid rgba(128,128,128,0.08);overflow:hidden;}
    .dti-theme-bar{padding:14px 24px;text-align:center;border-bottom:1px solid rgba(128,128,128,0.08);position:relative;}
    .dti-theme-label{font-size:0.68rem;letter-spacing:4px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;font-weight:900;opacity:0.6;margin-bottom:4px;}
    .dti-theme-name{font-size:1.4rem;font-weight:700;letter-spacing:-0.3px;}
    .dti-timer-wrap{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px;}
    .dti-timer-bar{flex:1;max-width:200px;height:4px;border-radius:2px;overflow:hidden;}
    .dti-timer-fill{height:100%;border-radius:2px;transition:width 1s linear;}
    .dti-timer-text{font-size:0.72rem;font-family:'Barlow Condensed',sans-serif;font-weight:900;letter-spacing:1px;min-width:36px;}
    .dti-cats{display:flex;border-bottom:1px solid rgba(128,128,128,0.06);padding:0 16px;overflow-x:auto;}
    .dti-cat{padding:10px 16px;font-size:0.65rem;letter-spacing:2px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;font-weight:900;cursor:pointer;border-bottom:2px solid transparent;opacity:0.35;transition:all 0.15s;white-space:nowrap;background:transparent;border-top:none;border-left:none;border-right:none;color:inherit;}
    .dti-cat.on{opacity:1;}
    .dti-cat-count{font-size:0.5rem;opacity:0.5;margin-left:2px;}
    .dti-items{flex:1;overflow-y:auto;padding:14px 16px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;align-content:start;}
    .dti-item{padding:10px 8px;border-radius:10px;cursor:pointer;border:2px solid transparent;transition:all 0.15s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;}
    .dti-item:hover{transform:translateY(-2px);}
    .dti-item.picked{border-style:solid;}
    .dti-item.picked::after{content:'\2713';position:absolute;top:4px;right:6px;font-size:0.6rem;font-weight:900;}
    .dti-item-swatch{width:64px;height:80px;border-radius:8px;border:2px solid rgba(128,128,128,0.08);position:relative;overflow:hidden;background:rgba(128,128,128,0.03);}
    .dti-item-swatch svg{position:absolute;inset:0;width:100%;height:100%;}
    .dti-item-swatch-inner{position:absolute;inset:0;}
    .dti-item-swatch-pattern{position:absolute;inset:0;opacity:0.3;}
    .dti-item-name{font-size:0.72rem;font-weight:600;line-height:1.3;}
    .dti-item-style{font-size:0.56rem;opacity:0.35;letter-spacing:1px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;font-weight:900;}

    .dti-bottom{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-top:1px solid rgba(128,128,128,0.08);gap:12px;}
    .dti-score{font-size:0.85rem;opacity:0.75;font-family:'Barlow Condensed',sans-serif;font-weight:900;letter-spacing:1px;text-transform:uppercase;}
    .dti-xp-bar{width:100px;height:6px;border-radius:3px;overflow:hidden;margin-left:8px;display:inline-block;vertical-align:middle;}
    .dti-xp-fill{height:100%;border-radius:3px;transition:width 0.4s;}
    .dti-submit{padding:12px 36px;border:none;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.9rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;}
    .dti-submit:hover{transform:translateY(-2px);opacity:0.9;}
    .dti-submit:disabled{opacity:0.3;cursor:not-allowed;transform:none;}
    .dti-skip{padding:10px 20px;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.72rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;background:transparent;border:1.5px solid rgba(128,128,128,0.15);color:inherit;transition:opacity 0.2s;}
    .dti-skip:hover{opacity:0.7;}

    /* Runway result */
    .dti-result{display:none;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center;gap:16px;flex:1;}
    .dti-result.active{display:flex;}
    .dti-stars{font-size:2.4rem;letter-spacing:8px;}
    .dti-stars-anim span{display:inline-block;animation:starPop 0.3s cubic-bezier(0.34,1.56,0.64,1) both;}
    @keyframes starPop{from{transform:scale(0) rotate(-20deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
    .dti-result-title{font-size:1.6rem;font-weight:700;}
    .dti-result-msg{font-size:0.88rem;opacity:0.5;max-width:440px;line-height:1.7;}
    .dti-result-outfit{font-size:0.75rem;opacity:0.3;margin-top:4px;line-height:1.6;}
    .dti-next{padding:14px 40px;border:none;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.95rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-top:10px;transition:opacity 0.2s;}
    .dti-next:hover{opacity:0.85;}

    @media(max-width:768px){
      #dtiView{overflow:visible;overflow-y:auto;}
      .dti-top{flex-direction:column;overflow:visible;overflow-y:auto;flex:none;}
      .dti-avatar-panel{flex:none;padding:12px;flex-direction:column;gap:8px;min-height:auto;height:auto;}
      .dti-figure-wrap{width:100%;min-height:320px;height:320px;flex:none;}
      .dti-wardrobe{flex:none;border-left:none;border-top:1px solid rgba(128,128,128,0.08);}
      .dti-items{grid-template-columns:repeat(3,1fr);overflow-y:auto;max-height:260px;}
      .dti-outfit-label{text-align:left;}
      .dti-bottom{position:sticky;bottom:0;z-index:10;}
    }
    /* ── CARD GAME VIEW ── */
    #cardGameView{display:none;flex:1;flex-direction:column;align-items:center;overflow-y:auto;padding:14px 20px 60px;position:relative;}
    #cardGameView.active{display:flex;}
    #cardGameView > *{flex:0 0 auto;}
    .cg-header{text-align:center;margin:8px 0 22px;width:100%;max-width:500px;display:flex;flex-direction:column;align-items:center;gap:6px;}
    .cg-game-name{display:none;}
    .cg-score{font-size:1rem;opacity:0.85;font-family:'Barlow Condensed',sans-serif;font-weight:900;letter-spacing:1.5px;}
    .cg-round{font-size:0.78rem;opacity:0.6;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;}
    .cg-question{text-align:center;font-size:1.15rem;font-weight:600;line-height:1.5;max-width:460px;margin:8px auto 24px;}
    .cg-cards{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;width:100%;max-width:520px;align-items:stretch;position:relative;}
    .cg-card{flex:1;min-width:140px;max-width:240px;border-radius:18px;padding:24px 20px;text-align:center;cursor:pointer;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;border:2.5px solid transparent;position:relative;}
    .cg-card:hover{transform:translateY(-6px) scale(1.03);box-shadow:0 12px 32px rgba(0,0,0,0.1);}
    .cg-card:active{transform:scale(0.97);}
    .cg-card.selected{border-width:3px;transform:scale(1.05);}
    .cg-card.correct{border-color:#4caf50 !important;box-shadow:0 0 20px rgba(76,175,80,0.25);}
    .cg-card.wrong{border-color:#ef5350 !important;animation:shakeCard 0.4s ease;}
    @keyframes shakeCard{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}
    .cg-card-text{font-size:1rem;font-weight:600;line-height:1.4;}
    .cg-card-sub{font-size:0.78rem;opacity:0.65;line-height:1.4;}
    .cg-card-label{font-size:0.7rem;letter-spacing:2px;text-transform:uppercase;opacity:0.6;font-family:'Barlow Condensed',sans-serif;font-weight:900;}
    @keyframes fadeSlideIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
    .cg-feedback{text-align:center;width:100%;max-width:460px;padding:16px 20px;border-radius:14px;font-size:0.88rem;line-height:1.6;margin-top:20px;display:none;position:relative;z-index:2;animation:fadeSlideIn 0.3s ease both;}
    .cg-feedback.visible{display:block;}
    .cg-next{padding:12px 36px;border:none;border-radius:12px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.85rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-top:16px;transition:all 0.2s;}
    .cg-next:hover{transform:translateY(-2px);opacity:0.9;}
    .cg-end{padding:10px 26px;background:transparent;border:1.5px solid currentColor;border-radius:12px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.72rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-top:12px;opacity:0.55;transition:all 0.2s;color:inherit;}
    .cg-end:hover{opacity:1;transform:translateY(-1px);}
    .cg-final{width:100%;max-width:420px;border-radius:20px;padding:32px 24px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px;animation:fadeSlideIn 0.4s ease both;}
    .cg-final-score{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:3.4rem;line-height:1;letter-spacing:1px;}
    .cg-final-sub{font-size:0.7rem;letter-spacing:3px;text-transform:uppercase;opacity:0.55;font-family:'Barlow Condensed',sans-serif;font-weight:900;}
    .cg-final-correct{margin-top:14px;font-size:1.05rem;font-weight:600;opacity:0.85;}
    .cg-final-msg{margin-top:6px;font-size:0.85rem;opacity:0.7;line-height:1.5;}
    .cg-confetti-container{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:9999;overflow:hidden;}
    .cg-confetti-piece{position:absolute;top:-24px;width:10px;height:14px;opacity:0.95;animation:cgConfettiFall linear forwards;}
    @keyframes cgConfettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(108vh) rotate(720deg);opacity:0;}}
    .cg-loading{opacity:0.3;font-style:italic;padding:40px;text-align:center;}
    .cg-rate-card{width:100%;max-width:420px;border-radius:18px;padding:24px 22px;line-height:1.7;font-size:0.92rem;margin-bottom:16px;}
    .cg-rate-stars{display:flex;gap:6px;justify-content:center;margin-top:12px;}
    .cg-star{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;cursor:pointer;border:2px solid rgba(128,128,128,0.12);transition:all 0.2s;background:transparent;color:inherit;}
    .cg-star:hover,.cg-star.on{transform:scale(1.15);}
    .cg-challenge-card{width:100%;max-width:460px;border-radius:18px;padding:28px 24px;text-align:center;margin-bottom:16px;}
    .cg-challenge-title{font-size:1.1rem;font-weight:700;line-height:1.4;margin-bottom:8px;}
    .cg-challenge-diff{font-size:0.6rem;letter-spacing:2px;text-transform:uppercase;opacity:0.4;font-family:'Barlow Condensed',sans-serif;font-weight:900;}
    .cg-input-row{display:flex;gap:8px;width:100%;max-width:460px;margin-top:12px;}
    .cg-input{flex:1;padding:12px 16px;border-radius:12px;border:1.5px solid rgba(128,128,128,0.12);background:rgba(128,128,128,0.03);font-family:'Space Grotesk',sans-serif;font-size:0.88rem;color:inherit;outline:none;resize:none;min-height:80px;}
    .cg-submit{padding:12px 24px;border:none;border-radius:12px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.8rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;}


    @media(max-width:480px){
      .cg-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:100%;width:100%;}
      .cg-card{min-width:0;max-width:none;padding:18px 14px;}
    }
  </style>
</head>

<script>
// ─── Minimal integration layer for the standalone play page ───
// The DTI / card-game engine was lifted out of lifestyle.html so the
// game UI lives on one URL only (/play.html?game=<id>). The helpers
// below fill in the few globals the engine reaches for on lifestyle —
// a colour palette, an aesthetic name, a judge name — using whatever
// is in localStorage (or safe defaults for a new visitor).

// Pull the active palette (bg / text / accent) straight from the CSS vars
// that stuflover-theme-boot.js writes on <html> synchronously before first
// paint. This way the game surfaces match whichever aesthetic the user
// landed on via the quiz (or later picked on the Me page) instead of a
// hardcoded cream/terracotta default.
var searchPal = (function(){
  var def = {bg:'#faf0f0', tx:'#2a1a14', ac:'#c87860', ac2:'#a86050'};
  try {
    var cs = getComputedStyle(document.documentElement);
    var bg = (cs.getPropertyValue('--bg')||'').trim();
    var tx = (cs.getPropertyValue('--tx')||'').trim();
    var ac = (cs.getPropertyValue('--ac')||'').trim();
    var ac2 = (cs.getPropertyValue('--ac2')||'').trim();
    return {bg:bg||def.bg, tx:tx||def.tx, ac:ac||def.ac, ac2:ac2||def.ac2};
  } catch(e){ return def; }
})();

function escHtml(s){ var d=document.createElement('div'); d.textContent=String(s==null?'':s); return d.innerHTML; }

// Stuflover backend patches window.fetch to proxy api.anthropic.com calls
// through /api/chat. Make sure that patch is in place before any game
// code calls fetch('https://api.anthropic.com/...').
var _cgOrigFetch = window._origFetch || null;

function resolveAeName(){
  try {
    var prof = JSON.parse(localStorage.getItem('stuflover_profile') || '{}');
    return prof.aesthetic || 'stylish';
  } catch(e){ return 'stylish'; }
}

function getFloveeName(){
  // Used by the DTI judge prompt. A friendly neutral default is fine —
  // the game doesn't branch on this name, only on its inclusion.
  return 'Flovee';
}

// Close affordance (X button on DTI / card-game view). Treat it like
// hitting End Game: save whatever score we have and head back to the
// listing.
function closeModalView(){ backToGames(); }

// ─── Score save (uses the real API base so rounds reach Railway) ───
function postGameScore(gameId, score){
  var token = localStorage.getItem('stuflover_token');
  if(!token || !gameId || typeof score !== 'number') return Promise.resolve();
  var base = (window.STUFLOVER_API_URL || '');
  var f = window._origFetch || window.fetch;
  return f.call(window, base + '/api/games/'+encodeURIComponent(gameId)+'/score', {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
    body:JSON.stringify({score: Math.max(0, Math.floor(score))}),
    keepalive:true
  }).catch(function(){});
}

function waitThenGo(promise, href){
  var done = false;
  var go = function(){ if(done) return; done = true; window.location.href = href; };
  setTimeout(go, 2000);
  if(promise && typeof promise.then === 'function') promise.then(go, go);
  else go();
}

// Save any in-flight score, then return to the canonical games listing.
function backToGames(){
  if(typeof dtiTimerInterval !== 'undefined' && dtiTimerInterval){ clearInterval(dtiTimerInterval); dtiTimerInterval = null; }
  var savePromise = Promise.resolve();
  if(typeof dtiState !== 'undefined' && dtiState && dtiState.totalScore > 0){
    savePromise = postGameScore('dti', dtiState.totalScore);
    dtiState.totalScore = 0;
  } else if(typeof cgState !== 'undefined' && cgState && !cgState.ended && cgState.score > 0){
    savePromise = postGameScore(cgState.game && cgState.game.id, cgState.score);
    cgState.ended = true;
  }
  if(typeof dti2DDestroy === 'function') dti2DDestroy();
  waitThenGo(savePromise, '/games.html');
}

var currentHubGame = null;
var TRIVIA_MAX_ROUNDS = 10;
var WYR_MAX_ROUNDS = 10;
var WYR_PRELOAD_AHEAD = 2;
var cgState = {game:null, round:1, score:0, correct:0, answered:false, data:null, ended:false, preload:[], preloading:0};

function cgIsCappedGame(){
  return cgState.game && (cgState.game.id === 'trivia' || cgState.game.id === 'wouldyourather');
}

function cgMaxRounds(){
  if(!cgState.game) return 0;
  if(cgState.game.id === 'trivia') return TRIVIA_MAX_ROUNDS;
  if(cgState.game.id === 'wouldyourather') return WYR_MAX_ROUNDS;
  return 0;
}

function cgRoundLabel(){
  if(cgState.game && cgState.game.id === 'trivia'){
    return 'Question '+cgState.round+' / '+TRIVIA_MAX_ROUNDS;
  }
  if(cgState.game && cgState.game.id === 'wouldyourather'){
    return 'Question '+cgState.round+' / '+WYR_MAX_ROUNDS;
  }
  return 'Round '+cgState.round;
}

function cgInit(game){

async function cgFetchQuestion(game){
  var res = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers:{},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,system:game.sysPrompt,messages:[{role:'user',content:(typeof game.userPromptFn==='function'?game.userPromptFn():game.userPrompt)}]})
  });
  var data = await res.json();
  var text = (data.content&&data.content[0]&&data.content[0].text)||'';
  var match = text.match(/\{[\s\S]*\}/);
  if(!match) throw new Error('No JSON');
  return JSON.parse(match[0]);
}

function cgPreloadFill(){
  if(!cgState.game || !cgState.game.id) return;
  if(cgState.game.id !== 'wouldyourather') return;
  if(cgState.ended) return;
  var maxRounds = cgMaxRounds();
  var roomLeft = maxRounds - cgState.round;
  var target = Math.min(WYR_PRELOAD_AHEAD, Math.max(0, roomLeft));
  var have = (cgState.preload ? cgState.preload.length : 0) + (cgState.preloading || 0);
  var need = target - have;
  var game = cgState.game;
  for(var i=0;i<need;i++){
    cgState.preloading = (cgState.preloading || 0) + 1;
    (function(){
      cgFetchQuestion(game).then(function(d){
        cgState.preloading = Math.max(0, (cgState.preloading || 1) - 1);
        if(cgState.game === game && !cgState.ended){
          cgState.preload.push(d);
        }
      }).catch(function(){
        cgState.preloading = Math.max(0, (cgState.preloading || 1) - 1);
      });
    })();
  }
}

async function cgLoadRound(){
  var pal = searchPal;
  var game = cgState.game;
  var cards = document.getElementById('cgCards');
  var question = document.getElementById('cgQuestion');
  question.classList.remove('bc');
  document.getElementById('cgNextBtn').style.display = 'none';
  document.getElementById('cgFeedback').style.display = 'none';
  cgState.answered = false;

  if(game.id === 'wouldyourather' && cgState.preload && cgState.preload.length > 0){
    var d = cgState.preload.shift();
    cgState.data = d;
    cgRender(d);
    cgPreloadFill();
    return;
  }

  cards.innerHTML = '<div class="cg-loading">Loading...</div>';
  question.textContent = '';

  try{
    var d = await cgFetchQuestion(game);
    if(cgState.game !== game || cgState.ended) return;
    cgState.data = d;
    cgRender(d);
    cgPreloadFill();
  }catch(e){
    cards.innerHTML = '<div class="cg-loading">Could not load — <a href="#" onclick="cgLoadRound();return false" style="color:'+pal.ac+'">try again</a></div>';
  }
}

function cgRender(d){

  var game = cgState.game;
  var cards = document.getElementById('cgCards');

  if(game.cardType === 'choice'){

    question.textContent = d.question || '';
    question.style.color = pal.tx;
    ['A','B'].forEach(function(letter){
      var text = letter==='A' ? d.optionA : d.optionB;
      var card = document.createElement('div');
      card.className = 'cg-card';
      card.style.background = pal.ac+(letter==='A'?'12':'08');
      card.style.color = pal.tx;
      card.innerHTML =
        '<div class="cg-card-label">Option '+letter+'</div>'+
        '<div class="cg-card-text">'+escHtml(text)+'</div>';
      card.onclick = function(){ cgPickChoice(letter, card); };
      cards.appendChild(card);
    });

  } else if(game.cardType === 'quiz'){
    // Aesthetic Quiz — 4 option cards
    question.textContent = d.question || '';
    question.style.color = pal.tx;
    (d.options||[]).forEach(function(opt, i){
      var card = document.createElement('div');
      card.className = 'cg-card';

      cards.appendChild(card);
    });

  } else if(game.cardType === 'trivia'){
    // Shuffle options so the correct answer isn't always in the same slot.
    var tOpts = (d.options||[]).slice();
    var tCorrect = typeof d.correct === 'number' ? d.correct : 0;
    var order = tOpts.map(function(_,i){return i;});
    for(var s=order.length-1; s>0; s--){
      var r = Math.floor(Math.random()*(s+1));
      var tmp = order[s]; order[s] = order[r]; order[r] = tmp;
    }
    d.options = order.map(function(i){return tOpts[i];});
    d.correct = order.indexOf(tCorrect);
    cgState.data = d;
    // Trivia — 4 option cards
    question.textContent = d.question || '';
    question.style.color = pal.tx;
    d.options.forEach(function(opt, i){

  } else if(game.cardType === 'rate'){

    question.textContent = 'Rate this outfit 1-10';
    question.style.color = pal.tx;

    rateCard.style.background = pal.ac+'0c';
    rateCard.style.color = pal.tx;
    rateCard.textContent = d.outfit || '';
    cards.appendChild(rateCard);
    // Stars
    var starsDiv = document.createElement('div');
    starsDiv.className = 'cg-rate-stars';
    for(var s=1;s<=10;s++){
      var star = document.createElement('div');
      star.className = 'cg-star';
      star.textContent = s;
      star.style.color = pal.tx;
      star.style.borderColor = pal.tx+'15';
      (function(rating){
        star.onclick = function(){ cgRate(rating); };
      })(s);
      starsDiv.appendChild(star);
    }
    cards.appendChild(starsDiv);

  } else if(game.cardType === 'challenge'){
    // Style Challenge — constraint card + text input
    question.textContent = 'Style Challenge';
    question.style.color = pal.tx;
    var ch = document.createElement('div');
    ch.className = 'cg-challenge-card';
    ch.style.background = pal.ac+'0c';
    ch.style.color = pal.tx;
    ch.innerHTML =
      '<div class="cg-challenge-title">'+escHtml(d.challenge||'')+'</div>'+
      '<div class="cg-challenge-diff" style="color:'+pal.ac+'">'+escHtml(d.difficulty||'medium')+'</div>';
    cards.appendChild(ch);

    inputRow.className = 'cg-input-row';

      '<button type="button" class="cg-submit bc" onclick="cgSubmitChallenge()" style="background:'+pal.ac+';color:'+pal.bg+'">Submit</button>';
    cards.appendChild(inputRow);
  }
}

function postGameScore(gameId, score){
  var token = localStorage.getItem('stuflover_token');
  if(!token || !gameId || typeof score !== 'number') return Promise.resolve();
  // Route through STUFLOVER_API_URL so scores reach the Railway backend
  // even when this page is served from stuflover.com.
  var base = (window.STUFLOVER_API_URL || '');
  var f = window._origFetch || window.fetch;
  return f.call(window, base + '/api/games/'+encodeURIComponent(gameId)+'/score', {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
    body:JSON.stringify({score: Math.max(0, Math.floor(score))}),
    keepalive:true
  }).catch(function(){});
}

// Wait for a score save to finish (with timeout) before navigating away,
// so the destination page's leaderboard/stats fetch sees the new row.
function waitThenGo(promise, href){
  var done = false;
  var go = function(){ if(done) return; done = true; window.location.href = href; };
  setTimeout(go, 2000);
  if(promise && typeof promise.then === 'function') promise.then(go, go);
  else go();
}

function cgShowFinal(earlyEnd){
  cgState.ended = true;
  if(cgState.autoAdvanceTimer){ clearTimeout(cgState.autoAdvanceTimer); cgState.autoAdvanceTimer = null; }
  var pal = searchPal;
  var isTrivia = cgState.game && cgState.game.id === 'trivia';
  var isWyr = cgState.game && cgState.game.id === 'wouldyourather';
  var total = cgIsCappedGame() ? cgMaxRounds() : TRIVIA_MAX_ROUNDS;
  var played = Math.min(cgState.round - (cgState.answered ? 0 : 1), total);
  if(played < 0) played = 0;
  var correct = cgState.correct || 0;
  var score = cgState.score;
  var msg;
  if(score >= 160) msg = isTrivia ? 'Trivia legend.' : (isWyr ? 'Decisive legend.' : 'Certified legend.');
  else if(score >= 100) msg = 'Solid run!';
  else if(score >= 40) msg = 'Nice try — level up next time.';
  else msg = 'Better luck next round.';
  var savePromise = postGameScore(cgState.game && cgState.game.id, score);
  var qEl = document.getElementById('cgQuestion');
  qEl.textContent = earlyEnd ? 'Game Ended' : 'Game Over!';
  qEl.classList.add('bc');
  qEl.style.color = pal.tx;
  document.getElementById('cgRound').textContent = earlyEnd ? 'Ended early' : 'Final';
  var cards = document.getElementById('cgCards');
  var subLine;
  if(isTrivia){
    subLine = '<div class="cg-final-correct">'+correct+' / '+(earlyEnd?played:total)+' correct</div>';
  } else if(isWyr){
    var answered = earlyEnd ? played : total;
    subLine = '<div class="cg-final-correct">'+answered+' / '+total+' answered</div>';
  } else {
    subLine = '<div class="cg-final-correct">'+(cgState.round||1)+' round'+((cgState.round||1)===1?'':'s')+' played</div>';
  }
  cards.innerHTML =
    '<div class="cg-final" style="color:'+pal.tx+';background:'+pal.ac+'12;">'+
      '<div class="cg-final-sub">Final Score</div>'+
      '<div class="cg-final-score" style="color:'+pal.ac+'">'+score+'</div>'+
      subLine+
      '<div class="cg-final-msg">'+msg+'</div>'+
    '</div>';
  var fb = document.getElementById('cgFeedback');
  fb.style.display = 'none';
  fb.classList.remove('visible');
  var nextBtn = document.getElementById('cgNextBtn');
  nextBtn.textContent = 'Play Again';
  nextBtn.style.display = 'inline-block';
  nextBtn.onclick = function(){ cgInit(cgState.game); };
  var endBtn = document.getElementById('cgEndBtn');
  if(endBtn){
    endBtn.textContent = 'Back to Games';
    endBtn.onclick = function(){ waitThenGo(savePromise, 'games.html'); };
    endBtn.style.display = 'inline-block';
  }
}

function cgConfetti(){
  var container = document.createElement('div');
  container.className = 'cg-confetti-container';
  document.body.appendChild(container);
  var colors = ['#ff5252','#ffd54f','#69f0ae','#40c4ff','#e040fb','#ffab40','#ff80ab','#b388ff'];
  var N = 90;
  for(var i=0;i<N;i++){
    var p = document.createElement('div');
    p.className = 'cg-confetti-piece';
    p.style.left = (Math.random()*100)+'vw';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDuration = (1.6 + Math.random()*1.8)+'s';
    p.style.animationDelay = (Math.random()*0.25)+'s';
    p.style.borderRadius = (Math.random()<0.5) ? '2px' : '50%';
    p.style.transform = 'rotate('+Math.floor(Math.random()*360)+'deg)';
    container.appendChild(p);
  }
  setTimeout(function(){ if(container.parentNode) container.parentNode.removeChild(container); }, 4200);
}

function dtiInit(continueGame){

  var round = continueGame ? (dtiState.round || 1) : 1;

  // Render skin picker and set skin
  dtiRenderSkinPicker();
  dtiSetSkin(dtiState.skinIdx);

  // Initialize 2D scene (creates canvas if first time, or clears clothing)
  if (!dti2D.initialized) {
    // Delay to ensure container is visible and has dimensions
    setTimeout(function(){
      dti2DInitScene();
      dtiSetSkin(dtiState.skinIdx);

  document.getElementById('dtiSubmitBtn').style.color = pal.bg;

function dtiPickTheme(){
  var t = DTI_THEMES[Math.floor(Math.random()*DTI_THEMES.length)];
  dtiState.theme = t;
  document.getElementById('dtiThemeName').textContent = t;
  document.getElementById('dtiThemeName').style.color = searchPal.tx;
}

function dtiStartTimer(){
  if(dtiTimerInterval) clearInterval(dtiTimerInterval);
  dtiState.timeLeft = DTI_TOTAL_TIME;
  var textEl = document.getElementById('dtiTimer');
  var fillEl = document.getElementById('dtiTimerFill');
  textEl.textContent = '1:30';
  textEl.style.color = searchPal.tx;
  fillEl.style.width = '100%';
  dtiTimerInterval = setInterval(function(){
    dtiState.timeLeft--;
    if(dtiState.timeLeft <= 0){
      clearInterval(dtiTimerInterval);
      dtiSubmit();
      return;
    }
    var m = Math.floor(dtiState.timeLeft/60);
    var s = dtiState.timeLeft%60;
    textEl.textContent = m+':'+(s<10?'0':'')+s;
    fillEl.style.width = ((dtiState.timeLeft/DTI_TOTAL_TIME)*100)+'%';
    if(dtiState.timeLeft <= 15){
      textEl.style.color = '#e04040';
      fillEl.style.background = '#e04040';
    }
  },1000);
}

function dtiRenderCats(){

    var on = c===dtiActiveCat ? ' on' : '';

  });

}

function dtiRenderItems(cat){
  dtiActiveCat = cat;
  dtiRenderCats();
  var pal = searchPal;
  var grid = document.getElementById('dtiItemsGrid');
  var items = DTI_WARDROBES[cat]||[];
  grid.innerHTML = '';
  items.forEach(function(item){
    var isPicked = dtiState.picks[cat] && dtiState.picks[cat].name === item.name;
    var div = document.createElement('div');
    div.className = 'dti-item'+(isPicked?' picked':'');
    div.style.background = isPicked ? pal.ac+'14' : pal.tx+'06';
    div.style.borderColor = isPicked ? pal.ac : 'transparent';
    div.style.color = pal.tx;
    // Build SVG silhouette preview with per-item viewBox
    var svgPreview = '';
    if(DTI_SVG[item.svg]){
      var vb = (DTI_VIEWBOXES && DTI_VIEWBOXES[item.svg]) || '15 55 130 135';
      svgPreview = '<svg viewBox="'+vb+'" xmlns="http://www.w3.org/2000/svg" style="opacity:0.85" preserveAspectRatio="xMidYMid meet">'+DTI_SVG[item.svg](item.color)+'</svg>';
    }
    div.innerHTML =
      '<div class="dti-item-swatch" style="border-color:'+pal.tx+'10">'+
        svgPreview+
        (svgPreview ? '' : '<div class="dti-item-swatch-inner" style="background:'+item.color+'"></div>')+
      '</div>'+
      '<div class="dti-item-name">'+item.name+'</div>'+
      '<div class="dti-item-style">'+item.style+'</div>';
    div.onclick = function(){
      // Toggle pick
      if(isPicked){ dtiState.picks[cat]=null; } else { dtiState.picks[cat]=item; }
      dtiRenderItems(cat);
      dtiUpdateFigure();
      dtiUpdateSummary();
    };
    grid.appendChild(div);
  });
}

function dtiUpdateFigure(){
  // 2D clothing update
  if (!dti2D.initialized) return;
  dti2DClearClothing();
  var cats = ['hair','tops','bottoms','shoes','accessories'];
  cats.forEach(function(cat){
    var pick = dtiState.picks[cat];
    if(pick && DTI_2D[pick.svg]){
      dti2DAddClothing(pick.svg, pick.color, pick.style);
    }
  });
}

function dtiUpdateSummary(){
  var pal = searchPal;
  var summary = document.getElementById('dtiOutfitSummary');
  var cats = ['hair','tops','bottoms','shoes','accessories'];
  var html = '';
  cats.forEach(function(cat){
    var pick = dtiState.picks[cat];
    if(pick){
      html += '<div class="dti-outfit-item" style="color:'+pal.tx+'">'+
        '<span class="dti-outfit-dot" style="background:'+pick.color+'"></span>'+
        pick.name+
        '<button type="button" class="dti-remove-btn" onclick="dtiRemoveItem(\''+cat+'\')" style="color:'+pal.tx+'">\u2715</button>'+
      '</div>';
    }
  });
  summary.innerHTML = html;
}

function dtiRemoveItem(cat){
  dtiState.picks[cat] = null;
  dtiUpdateFigure();
  dtiUpdateSummary();
  if(dtiActiveCat===cat) dtiRenderItems(cat);
  dtiRenderCats();
}

function dtiSkipTheme(){
  dtiPickTheme();
}

async function dtiSubmit(){
  if(dtiTimerInterval) clearInterval(dtiTimerInterval);
  var picks = dtiState.picks;
  var itemList = [];
  for(var cat in picks){
    if(picks[cat]) itemList.push(cat+': '+picks[cat].name+' ('+picks[cat].style+')');
  }
  if(itemList.length === 0){
    dtiShowResult(0, 'You walked out in nothing!', 'Maybe pick some clothes next time...', '');
    return;
  }

  var pal = searchPal;
  document.getElementById('dtiSubmitBtn').disabled = true;
  document.getElementById('dtiSubmitBtn').textContent = 'Judging...';

  // Trigger 2D runway sparkle animation
  if (typeof dti2DRunwaySpin === 'function') dti2DRunwaySpin();

  var fName = getFloveeName();
  var aeName = resolveAeName();
  var outfitStr = itemList.join('\n');

  try{
    var res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST', headers:{},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:300,
        system:'You are '+fName+', a fashion judge in a Dress To Impress game. You judge outfits based on how well they match the theme. The player has a '+aeName+' aesthetic.\n\nRules:\n- Give a score from 1 to 5 stars (be fair but fun)\n- 5 stars = perfect theme match with great styling\n- 3 stars = decent effort but missing something\n- 1 star = completely off theme\n- Give a short, fun 1-2 sentence reaction in your personality\n- Be specific about what worked and what did not\n- Keep it kid-friendly and encouraging even for low scores\n- Return ONLY a JSON object: {stars: number, title: "short title", message: "your reaction"}\n- No markdown, no code fences',
        messages:[{role:'user',content:'Theme: '+dtiState.theme+'\n\nMy outfit:\n'+outfitStr+'\n\nJudge my outfit!'}]
      })
    });
    var data = await res.json();
    var text = (data.content&&data.content[0]&&data.content[0].text)||'';
    var match = text.match(/\{[\s\S]*\}/);
    if(match){
      var result = JSON.parse(match[0]);
      var stars = Math.max(1,Math.min(5,Math.round(result.stars||3)));
      var pts = stars * 20;
      dtiState.totalScore += pts;
      dtiShowResult(stars, result.title||'Not bad!', result.message||'', outfitStr);
    } else {
      dtiState.totalScore += 60;
      dtiShowResult(3, 'Hmm let me think...', 'I could not quite judge this one. Let us say 3 stars!', outfitStr);
    }
  }catch(e){
    dtiState.totalScore += 60;
    dtiShowResult(3, 'Runway technical difficulties', 'Something went wrong but you looked great. 3 stars!', outfitStr);
  }

  document.getElementById('dtiSubmitBtn').disabled = false;
  document.getElementById('dtiSubmitBtn').textContent = 'Walk the Runway';
}

function dtiShowResult(stars, title, msg, outfit){
  var pal = searchPal;
  document.getElementById('dtiGame').style.display = 'none';
  document.getElementById('dtiBottomBar').style.display = 'none';
  var res = document.getElementById('dtiResult');
  res.style.display = 'flex';
  res.classList.add('active');
  res.style.background = pal.bg;
  res.style.color = pal.tx;

  var starsEl = document.getElementById('dtiStars');
  starsEl.innerHTML = '';
  for(var i=0;i<5;i++){
    var sp = document.createElement('span');
    sp.textContent = i<stars?'\u2605':'\u2606';
    sp.style.animationDelay = (i*0.15)+'s';
    sp.style.opacity = i<stars?'1':'0.2';
    starsEl.appendChild(sp);
  }
  document.getElementById('dtiStars').style.color = pal.ac;
  document.getElementById('dtiResultTitle').textContent = title;
  document.getElementById('dtiResultTitle').style.color = pal.tx;
  document.getElementById('dtiResultMsg').textContent = msg;
  document.getElementById('dtiResultMsg').style.color = pal.tx;
  document.getElementById('dtiResultOutfit').textContent = 'Theme: '+dtiState.theme+' — '+dtiState.totalScore+' total pts';
  document.getElementById('dtiResultOutfit').style.color = pal.tx;
}

function dtiNextRound(){
  dtiState.round++;
  dtiState.picks = {hair:null,tops:null,bottoms:null,shoes:null,accessories:null};
  dtiInit(true);
}

function dtiEndGame(){
  if(dtiTimerInterval){ clearInterval(dtiTimerInterval); dtiTimerInterval = null; }
  waitThenGo(postGameScore('dti', dtiState.totalScore), 'games.html');
}


// ─── Page boot ───
(function(){
  var params = new URLSearchParams(location.search);
  var gameId = params.get('game');
  var game = HUB_GAMES.find(function(g){ return g.id === gameId; });
  if(!game){
    window.location.replace('/games.html');
    return;
  }

  // Show one view, hide the other. Engine functions set up the interior.
  if(game.isDtiGame){
    var dv = document.getElementById('dtiView');
    dv.style.display = 'flex';
    dv.classList.add('active');
    document.getElementById('cardGameView').style.display = 'none';
    document.title = 'Dress To Impress — Stuflover';
    try { dtiInit(); } catch(e){ console.error('dtiInit failed', e); }
  } else if(game.isCardGame){
    var cv = document.getElementById('cardGameView');
    cv.style.display = 'flex';
    cv.classList.add('active');
    cv.style.background = searchPal.bg;
    cv.style.color = searchPal.tx;
    document.getElementById('dtiView').style.display = 'none';
    document.title = game.name + ' — Stuflover';
    try { cgInit(game); } catch(e){ console.error('cgInit failed', e); }
  } else {
    window.location.replace('/games.html');
  }

  // Esc closes the game and returns to the listing.
  document.addEventListener('keydown', function(e){
    if(e.key === 'Escape'){ e.preventDefault(); backToGames(); }
  });
})();
</script>
