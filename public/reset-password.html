<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <title>Stuflover - Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800;900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --pink-light:#f9c4c4; --pink-mid:#f5aaaa; --peach:#f7d4b0;
      --terracotta:#c4522a; --terracotta-dark:#a83e1e;
      --brown:#1e0c06; --white:#ffffff;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Nunito',sans-serif;background:var(--pink-light);color:var(--brown);min-height:100vh;display:flex;align-items:center;justify-content:center;
      background-image:repeating-linear-gradient(45deg,transparent,transparent 18px,rgba(30,12,6,0.018) 18px,rgba(30,12,6,0.018) 19px),
        repeating-linear-gradient(-45deg,transparent,transparent 18px,rgba(30,12,6,0.018) 18px,rgba(30,12,6,0.018) 19px),
        radial-gradient(circle at 30% 20%,rgba(245,170,170,0.4) 0%,transparent 50%),radial-gradient(circle at 70% 80%,rgba(247,212,176,0.3) 0%,transparent 50%);}
    h1,h2,h3,.logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;text-transform:uppercase;letter-spacing:1px;}

    .auth-container{width:90%;max-width:440px;animation:fadeUp 0.5s ease both;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
    @keyframes floatBob{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}

    .logo-top{text-align:center;margin-bottom:40px;}
    .logo-top h1{font-size:3.2rem;letter-spacing:5px;color:var(--brown);}
    .logo-top p{font-size:0.85rem;color:rgba(30,12,6,0.45);margin-top:4px;letter-spacing:1px;}

    .auth-card{background:var(--white);border-radius:24px;padding:40px;box-shadow:0 20px 60px rgba(30,12,6,0.1),0 0 0 1px rgba(30,12,6,0.03);backdrop-filter:blur(10px);animation:floatBob 4s ease-in-out infinite;}

    .card-title{font-size:1.3rem;letter-spacing:2px;margin-bottom:8px;color:var(--brown);}
    .card-subtitle{font-size:0.88rem;color:rgba(30,12,6,0.5);margin-bottom:24px;line-height:1.5;}

    .form-group{margin-bottom:16px;}
    .form-group label{display:block;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:0.8rem;letter-spacing:2px;text-transform:uppercase;color:rgba(30,12,6,0.45);margin-bottom:6px;}
    .form-group input{width:100%;padding:14px 18px;border:2px solid rgba(30,12,6,0.12);border-radius:12px;font-family:'Nunito',sans-serif;font-size:0.95rem;color:var(--brown);outline:none;transition:border-color 0.25s cubic-bezier(0.4,0,0.2,1),box-shadow 0.25s cubic-bezier(0.4,0,0.2,1);}
    .form-group input:focus{border-color:var(--terracotta);box-shadow:0 0 0 3px rgba(196,82,42,0.15),0 0 12px rgba(196,82,42,0.08);}
    .form-group input::placeholder{color:rgba(30,12,6,0.25);}

    @keyframes slideInError{from{opacity:0;transform:translateX(-12px);}to{opacity:1;transform:translateX(0);}}
    .error-msg{font-size:0.82rem;color:var(--terracotta);font-weight:700;min-height:22px;margin-bottom:8px;}
    .error-msg:not(:empty){animation:slideInError 0.3s cubic-bezier(0.4,0,0.2,1) both;}
    .success-msg{font-size:0.82rem;color:#2a8a4a;font-weight:700;min-height:22px;margin-bottom:8px;}
    .success-msg:not(:empty){animation:slideInError 0.3s cubic-bezier(0.4,0,0.2,1) both;}

    .submit-btn{width:100%;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.1rem;letter-spacing:3px;text-transform:uppercase;background:var(--terracotta);color:white;border:none;border-radius:12px;padding:16px;cursor:pointer;transition:background 0.25s cubic-bezier(0.4,0,0.2,1),transform 0.25s cubic-bezier(0.4,0,0.2,1),box-shadow 0.25s cubic-bezier(0.4,0,0.2,1);}
    .submit-btn:hover:not(:disabled){box-shadow:0 4px 16px rgba(196,82,42,0.35);}
    .submit-btn:hover{background:var(--terracotta-dark);transform:translateY(-1px);}
    .submit-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

    .hidden{display:none;}

    .back-link{display:block;text-align:center;margin-top:16px;font-size:0.85rem;color:var(--terracotta);text-decoration:none;font-weight:600;}
    .back-link:hover{text-decoration:underline;}

    @media(max-width:480px){
      .auth-card{padding:28px 20px;border-radius:18px;}
      .logo-top h1{font-size:2.4rem;}
      .logo-top{margin-bottom:28px;}
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="logo-top">
      <h1>Stuflover</h1>
      <p>your vibe, your world</p>
    </div>

    <div class="auth-card">
      <!-- Request Reset Form -->
      <div id="request-view">
        <h2 class="card-title">Forgot Password</h2>
        <p class="card-subtitle">Enter your email and we'll send you a link to reset your password.</p>
        <form onsubmit="handleForgot(event)" novalidate>
          <div class="form-group">
            <label>Email</label>
            <input type="text" id="forgot-email" placeholder="your@email.com"/>
          </div>
          <div id="forgot-error" class="error-msg"></div>
          <div id="forgot-success" class="success-msg"></div>
          <button type="submit" class="submit-btn" id="forgot-btn">Send Reset Link</button>
        </form>
        <a href="/auth.html" class="back-link">Back to Sign In</a>
      </div>

      <!-- Reset Password Form (shown when ?token= is in URL) -->
      <div id="reset-view" class="hidden">
        <h2 class="card-title">Reset Password</h2>
        <p class="card-subtitle">Choose a new password for your account.</p>
        <form onsubmit="handleReset(event)" novalidate>
          <div class="form-group">
            <label>New Password</label>
            <input type="password" id="reset-password" placeholder="6+ characters"/>
          </div>
          <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="reset-confirm" placeholder="same password again"/>
          </div>
          <div id="reset-error" class="error-msg"></div>
          <div id="reset-success" class="success-msg"></div>
          <button type="submit" class="submit-btn" id="reset-btn">Reset Password</button>
        </form>
        <a href="/auth.html" class="back-link">Back to Sign In</a>
      </div>
    </div>
  </div>

<script src="/stuflover-config.js"></script>
<script>
const API_BASE = window.STUFLOVER_API_URL || '';
const params = new URLSearchParams(window.location.search);
const resetToken = params.get('token');

if (resetToken) {
  document.getElementById('request-view').classList.add('hidden');
  document.getElementById('reset-view').classList.remove('hidden');
}

async function handleForgot(e) {
  e.preventDefault();
  const email = document.getElementById('forgot-email').value.trim();
  const errEl = document.getElementById('forgot-error');
  const successEl = document.getElementById('forgot-success');
  const btn = document.getElementById('forgot-btn');

  errEl.textContent = '';
  successEl.textContent = '';

  if (!email) {
    errEl.textContent = 'Please enter your email';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'SENDING...';

  try {
    const res = await fetch(API_BASE + '/api/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed to send reset email');

    successEl.textContent = 'If an account exists with that email, you will receive a reset link shortly.';
    btn.textContent = 'SENT';
  } catch (err) {
    errEl.textContent = err.message;
    btn.disabled = false;
    btn.textContent = 'SEND RESET LINK';
  }
}

async function handleReset(e) {
  e.preventDefault();
  const password = document.getElementById('reset-password').value;
  const confirm = document.getElementById('reset-confirm').value;
  const errEl = document.getElementById('reset-error');
  const successEl = document.getElementById('reset-success');
  const btn = document.getElementById('reset-btn');

  errEl.textContent = '';
  successEl.textContent = '';

  if (!password) {
    errEl.textContent = 'Please enter a new password';
    return;
  }
  if (password.length < 6) {
    errEl.textContent = 'Password must be at least 6 characters';
    return;
  }
  if (password !== confirm) {
    errEl.textContent = 'Passwords do not match';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'RESETTING...';

  try {
    const res = await fetch(API_BASE + '/api/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: resetToken, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed to reset password');

    successEl.textContent = 'Password reset successfully! Redirecting to sign in...';
    btn.textContent = 'DONE';
    setTimeout(() => { window.location.href = '/auth.html'; }, 2000);
  } catch (err) {
    errEl.textContent = err.message;
    btn.disabled = false;
    btn.textContent = 'RESET PASSWORD';
  }
}
</script>
<script src="/stuflover-theme.js"></script>
</body>
</html>
