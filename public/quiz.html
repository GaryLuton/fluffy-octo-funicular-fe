  <link rel="stylesheet" href="stuflover-design-system.css"/>
  <style>
    :root{--pink:#faf0f0;--pink-mid:#f0ddd6;--terra:#c87860;--brown:#2a1a14;--white:#fff;}
    html{-webkit-text-size-adjust:100%;-ms-text-size-adjust:100%;}
    *{margin:0;padding:0;box-sizing:border-box;}
    .skip-link{position:absolute;left:-9999px;top:0;z-index:1000;background:var(--brown);color:var(--white);padding:10px 16px;text-decoration:none;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.9rem;letter-spacing:2px;text-transform:uppercase;border-radius:0 0 6px 0;}
    .skip-link:focus{left:0;outline:3px solid var(--terra);outline-offset:2px;}
    input,button,select,textarea{font-size:16px;}
    body{font-family:'Space Grotesk',sans-serif;background:var(--pink);color:var(--brown);overflow-x:hidden;line-height:1.6;font-size:15px;}
    .bc{font-family:'Barlow Condensed',sans-serif;font-weight:900;text-transform:uppercase;letter-spacing:1px;}

    /* Hide legacy per-page nav — sl-top-nav (injected by stuflover-nav.js) replaces it. */
    nav#mainNav, nav.sl-nav, .top-bar{display:none !important;}

    nav{position:fixed;top:0;width:100%;z-index:400;display:flex;align-items:center;justify-content:space-between;padding:14px 40px;background:rgba(250,240,240,0.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(30,12,6,0.07);}
    .logo{font-size:1.7rem;letter-spacing:4px;text-decoration:none;}
    .nav-links{display:flex;align-items:center;gap:12px;}
    .nav-link{font-size:0.78rem;letter-spacing:3px;text-decoration:none;padding:9px 22px;border-radius:4px;border:1.5px solid rgba(30,12,6,0.18);font-family:'Barlow Condensed',sans-serif;font-weight:900;text-transform:uppercase;transition:opacity 0.2s;color:inherit;}
    .nav-link:hover{opacity:0.55;}

    /* LANDING */
    #heroSection{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:120px 40px 80px;text-align:center;position:relative;overflow:hidden;
      background:linear-gradient(180deg,var(--pink-mid) 0%,var(--pink) 40%,var(--white) 100%);}
    #heroSection::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 20%,rgba(200,120,96,0.06) 0%,transparent 50%),radial-gradient(circle at 70% 80%,rgba(200,120,96,0.04) 0%,transparent 50%);pointer-events:none;}
    #heroSection h1{font-size:clamp(5rem,16vw,12rem);line-height:0.82;color:var(--brown);letter-spacing:-4px;position:relative;}
    .hero-sub{font-size:1.1rem;color:rgba(30,12,6,0.45);margin-top:20px;max-width:380px;line-height:1.9;position:relative;}
    .hero-hook{font-size:0.72rem;letter-spacing:4px;text-transform:uppercase;color:var(--terra);margin-top:10px;opacity:0.6;font-family:'Barlow Condensed',sans-serif;font-weight:900;position:relative;}
    .start-btn{margin-top:36px;font-size:1.4rem;letter-spacing:4px;background:var(--terra);color:white;border:none;border-radius:50px;padding:20px 60px;cursor:pointer;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);font-family:'Barlow Condensed',sans-serif;font-weight:900;text-transform:uppercase;box-shadow:0 6px 24px rgba(200,120,96,0.3);position:relative;}
    .start-btn:hover{background:#a8644a;transform:translateY(-4px) scale(1.03);box-shadow:0 10px 36px rgba(200,120,96,0.4);}

    /* QUIZ */
    #quizWrap{display:none;min-height:100vh;background:var(--white);padding:110px 40px 80px;flex-direction:column;align-items:center;}
    #quizWrap.active{display:flex;animation:sectionFadeIn 0.4s ease both;}
    .quiz-inner{width:100%;max-width:700px;margin:0 auto;}
    .progress-track{width:100%;height:4px;background:rgba(30,12,6,0.05);margin-bottom:12px;overflow:hidden;border-radius:2px;}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--terra),var(--pink-mid));transition:width 0.5s cubic-bezier(0.34,1.56,0.64,1);border-radius:2px;}
    .progress-label{font-size:0.68rem;letter-spacing:3px;text-transform:uppercase;color:rgba(30,12,6,0.25);margin-bottom:44px;font-family:'Barlow Condensed',sans-serif;font-weight:900;}
    .q-anim{animation:fadeSlide 0.35s cubic-bezier(0.34,1.56,0.64,1) both;}
    @keyframes fadeSlide{from{opacity:0;transform:translateY(20px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}
    @keyframes sectionFadeIn{from{opacity:0;}to{opacity:1;}}
    .q-cat{font-size:0.62rem;letter-spacing:5px;text-transform:uppercase;color:var(--terra);margin-bottom:10px;font-family:'Barlow Condensed',sans-serif;font-weight:900;}
    .q-text{font-size:clamp(1.8rem,4vw,2.8rem);color:var(--brown);line-height:1.1;margin-bottom:10px;letter-spacing:-0.5px;}
    .q-hint{font-size:0.82rem;color:rgba(30,12,6,0.3);margin-bottom:28px;font-style:italic;font-family:'Caveat',cursive;font-size:1rem;}
    .opts-single{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .opt{padding:18px 22px;border-radius:14px;border:2px solid rgba(30,12,6,0.06);background:var(--white);font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:0.95rem;color:var(--brown);text-align:left;cursor:pointer;transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);line-height:1.5;}
    .opt:hover{border-color:var(--terra);background:var(--pink-mid);transform:translateY(-2px);box-shadow:0 4px 16px rgba(200,120,96,0.12);}
    .opt:active{transform:scale(0.97);}
    .opts-multi{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
    .opt-check{padding:16px 20px;border-radius:14px;border:2px solid rgba(30,12,6,0.06);background:var(--white);font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:0.93rem;color:var(--brown);text-align:left;cursor:pointer;transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);line-height:1.5;position:relative;}
    .opt-check:hover{border-color:rgba(200,120,96,0.3);transform:translateY(-2px);}
    .opt-check:active{transform:scale(0.97);}
    .opt-check.on{border-color:var(--terra);background:linear-gradient(135deg,var(--pink),rgba(240,221,214,0.5));box-shadow:0 2px 12px rgba(200,120,96,0.1);}
    .opt-check.on::after{content:"";position:absolute;top:12px;right:14px;width:18px;height:18px;border-radius:50%;background:var(--terra);display:flex;align-items:center;justify-content:center;}
    .next-btn{width:100%;padding:18px;background:var(--terra);color:white;border:none;border-radius:14px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.05rem;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all 0.25s;margin-top:8px;box-shadow:0 4px 16px rgba(200,120,96,0.2);}
    .next-btn:hover{background:#a8644a;transform:translateY(-2px);box-shadow:0 6px 20px rgba(200,120,96,0.3);}
    .next-btn:disabled{opacity:0.2;cursor:not-allowed;transform:none;box-shadow:none;}

    @media(max-width:768px){
      #heroSection{padding:100px 20px 60px;}
      #heroSection h1{font-size:clamp(3rem,11vw,5rem);letter-spacing:-2px;}
      .hero-sub{font-size:0.98rem;}
      .start-btn{padding:16px 40px;font-size:1.2rem;}
      .opts-single,.opts-multi{grid-template-columns:1fr;}
      .q-text{font-size:clamp(1.5rem,4vw,1.9rem);}
      #quizWrap{padding:90px 20px 60px;}
    }
    @media(max-width:480px){
      #heroSection h1{font-size:clamp(2.4rem,12vw,3.8rem);letter-spacing:-1.5px;}
      .hero-sub{font-size:0.92rem;}
      #quizWrap{padding:80px 16px 60px;}
      .q-text{font-size:clamp(1.3rem,4vw,1.7rem);}
      .opt,.opt-check{padding:14px 16px;min-height:44px;}
      .next-btn{min-height:44px;}
      .start-btn{min-height:44px;padding:16px 36px;font-size:1.1rem;}
    }
  </style>
</head>

// ─── ENGINE ──────────────────────────────────────────────
let queue=[], multiSel=[], qCount=0;
Object.keys(AE).forEach(k=>P.aesthetics[k]=0);

function initQ(){ queue=[...CORE_IDS]; }
function getQ(id){ return QS.find(q=>q.id===id); }

function shouldContinue(){
  // Quiz is always exactly 10 questions — no more, no less.
  return qCount < 10;
}

function nextId(){
  while(queue.length>0){ const id=queue.shift(); if(!P.answered.has(id)) return id; }
  return null;
}

function startQuiz(){
  // Reset all state for fresh quiz
  qCount=0;
  Object.keys(AE).forEach(k=>P.aesthetics[k]=0);
  P.music=[]; P.interests=[]; P.social=null;
  P.age=null; P.gender=null;
  P.faveColour=null; P.faveShop=null; P.friendGroup=null;
  P.energyWord=null; P.moodToday=null; P.phoneScreen=null;
  P.saturdayMorning=null; P.coffeeOrder=null; P.notesApp=null;
  P.lastBought=null; P.dreamJob=null; P.weekendPlan=null; P.wallpaper=null;
  P.extraTags=[]; P.answered=new Set();
  queue=[];
  document.getElementById('heroSection').style.display='none';
  document.getElementById('quizWrap').classList.add('active');
  initQ(); renderNext();
}

function renderNext(){
  if(!shouldContinue()){ buildPage(); return; }
  const id=nextId();
  if(!id){ buildPage(); return; }
  renderQ(id);
}

function renderQ(id){
  const q=getQ(id); if(!q){renderNext();return;}
  P.answered.add(id); qCount++;
  document.getElementById('pFill').style.width=((qCount/10)*100)+'%';
  document.getElementById('pLabel').textContent=`Question ${qCount} of 10`;
  multiSel=[];
  const area=document.getElementById('qArea');
  area.className='q-anim';
  if(q.multi){
    const hintHtml = q.hint ? '<div class="q-hint">'+q.hint+'</div>' : '';
    const optsHtml = q.opts.map((o,i)=>{
      if(o.isCustom){
        return '<button class="opt-check" id="mc'+i+'" onclick="togCustom('+i+',\''+id+'\')">'+o.t+'</button>';
      }
      return '<button class="opt-check" id="mc'+i+'" onclick="tog('+i+')">'+o.t+'</button>';
    }).join('');
    area.innerHTML = '<div class="q-cat bc">'+q.cat+'</div><div class="q-text bc">'+q.text+'</div>'+hintHtml+'<div class="opts-multi" id="mGrid">'+optsHtml+'</div><div id="customInputWrap" style="display:none;margin-bottom:12px;"><input type="text" id="customArtistInput" placeholder="Type your artist name..." style="width:100%;padding:14px 18px;border-radius:4px;border:1.5px solid rgba(30,12,6,0.12);font-family:Space Grotesk,sans-serif;font-size:0.95rem;outline:none;background:transparent;color:inherit;"/></div><button class="next-btn bc" id="nBtn" onclick="submitMulti(\''+id+'\')">Continue</button>';
    document.getElementById('nBtn').disabled = true;
  } else {
    const hintHtml2 = q.hint ? '<div class="q-hint">'+q.hint+'</div>' : '';
    const optsHtml2 = q.opts.map((o,i)=>'<button class="opt" onclick="pickSingle(\''+id+'\','+i+')">'+o.t+'</button>').join('');
    area.innerHTML = '<div class="q-cat bc">'+q.cat+'</div><div class="q-text bc">'+q.text+'</div>'+hintHtml2+'<div class="opts-single">'+optsHtml2+'</div>';
  }
}

function tog(i){
  const btn=document.getElementById('mc'+i);
  if(multiSel.includes(i)){multiSel=multiSel.filter(x=>x!==i);btn.classList.remove('on');}
  else{multiSel.push(i);btn.classList.add('on');}
  document.getElementById('nBtn').disabled=multiSel.length===0;
}

function togCustom(i, qid){
  tog(i);
  var wrap = document.getElementById('customInputWrap');
  if(multiSel.includes(i)){
    wrap.style.display='block';
    document.getElementById('customArtistInput').focus();
  } else {
    wrap.style.display='none';
  }
}

function submitMulti(qid){
  const q=getQ(qid);
  multiSel.forEach(function(i){
    var opt = q.opts[i];
    if(opt.isCustom){
      var customName = (document.getElementById('customArtistInput')||{}).value||'';
      customName = customName.trim();
      if(customName){
        P.music.push('custom');
        if(!P.customArtists) P.customArtists = [];
        P.customArtists.push(customName);
        if(typeof ARTISTS !== 'undefined') ARTISTS['custom'] = {name:customName};
      }
    } else {
      applyOpt(opt);
    }
  });
  renderNext();
}

function pickSingle(qid,i){
  const q=getQ(qid); const opt=q.opts[i]; applyOpt(opt);
  renderNext();
}

function applyOpt(opt){
  if(opt.ae) Object.entries(opt.ae).forEach(([k,v])=>{P.aesthetics[k]=(P.aesthetics[k]||0)+v;});
  if(opt.mu&&!P.music.includes(opt.mu)) P.music.push(opt.mu);
  if(opt.in&&!P.interests.includes(opt.in)) P.interests.push(opt.in);
  if(opt.so&&!P.social) P.social=opt.so;
  if(opt.et) opt.et.forEach(t=>{if(!P.extraTags.includes(t)) P.extraTags.push(t);});
  if(opt.ag) P.age=opt.ag;
  if(opt.gn) P.gender=opt.gn;
  if(opt.md) P.moodToday=opt.md;
  if(opt.col) P.faveColour=COLOURS[opt.col]||null;
  if(opt.shop) P.faveShop=opt.shop;
  if(opt.fg) P.friendGroup=opt.fg;
  if(opt.ew) P.energyWord=opt.ew;
  if(opt.ph) P.phoneScreen=opt.ph;
  if(opt.sm) P.saturdayMorning=opt.sm;
  if(opt.co) P.coffeeOrder=opt.co;
  if(opt.na) P.notesApp=opt.na;
  if(opt.lb) P.lastBought=opt.lb;
  if(opt.dj) P.dreamJob=opt.dj;
  if(opt.wp) P.weekendPlan=opt.wp;
  if(opt.wp2) P.wallpaper=opt.wp2;
}

// ─── RESOLVE AESTHETIC NAME (lightweight, mirrors lifestyle.html) ──
function resolveAeName(){
  const ae=P.aesthetics; const et=P.extraTags;
  const sorted=Object.entries(ae).sort((a,b)=>b[1]-a[1]);
  const top=sorted[0]?.[0]; const sec=sorted[1]?.[0];
  const nm=k=>AE[k]?.name||k;
  if(et.includes('pastel_goth')) return "Pastel Goth";
  if(et.includes('dark_fem')) return "Dark Feminine";
  if(et.includes('emo_core')) return "Emo";
  if(et.includes('quiet_luxury')) return "Quiet Luxury";
  if(et.includes('that_girl')) return "That Girl";
  if(et.includes('full_preppy')) return "Preppy";
  if(et.includes('full_grunge')) return "Grunge";
  if(et.includes('full_indie')) return "Indie Alt";
  if(et.includes('y2k_chaos')) return "Y2K";
  if(et.includes('full_cottage')) return "Cottagecore";
  if(et.includes('dark_academic')) return "Dark Academia";
  if(et.includes('full_goth')) return "Goth";
  if(et.includes('kawaii_full')) return "Kawaii";
  if(sec&&(ae[sec]||0)>=(ae[top]||0)*0.62&&nm(top)!==nm(sec)){
    return nm(top)+' × '+nm(sec);
  }
  return nm(top)||'Soft Girl';
}

// ─── FINISH QUIZ ──────────────────────────────────────────
// Snapshot the quiz, then route based on auth state:
//  - logged in  → save profile, go to lifestyle.html (the result page)
//  - anonymous  → park snapshot, go to /auth.html?quiz=1 to sign in
function buildPage(){
  document.getElementById('pFill').style.width='100%';

  const aeName = resolveAeName();
  const sorted = Object.entries(P.aesthetics).sort((a,b)=>b[1]-a[1]);
  const topK = sorted[0]?.[0] || 'softgirl';

  var quizSnapshot = {
    aesthetics:P.aesthetics,music:P.music,interests:P.interests,
    social:P.social,age:P.age,gender:P.gender,
    faveColour:P.faveColour,faveShop:P.faveShop,
    friendGroup:P.friendGroup,energyWord:P.energyWord,moodToday:P.moodToday,
    phoneScreen:P.phoneScreen,saturdayMorning:P.saturdayMorning,
    coffeeOrder:P.coffeeOrder,notesApp:P.notesApp,lastBought:P.lastBought,
    dreamJob:P.dreamJob,weekendPlan:P.weekendPlan,wallpaper:P.wallpaper,
    customArtists:P.customArtists||[],
    extraTags:P.extraTags,
    aesthetic:aeName,aestheticKey:topK
  };

  if(!localStorage.getItem('stuflover_token')){
    try{ localStorage.setItem('stuflover_pending_quiz', JSON.stringify(quizSnapshot)); }catch(e){}
    window.location.href = '/auth.html?quiz=1';
    return;
  }

  try{ localStorage.setItem('stuflover_profile', JSON.stringify(quizSnapshot)); }catch(e){}
  window.location.href = '/lifestyle.html';
}
