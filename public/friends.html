<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>stuflover &mdash; friends</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Comfortaa:wght@400;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  :root {
    --cream: #FEF9F5; --soft-white: #FFFCFA; --pink: #F4C4D8; --rose: #E8A0BD;
    --peach: #F5D4C2; --mint: #D4EAE0; --lavender: #E4D9F0; --sky: #D9E8F5;
    --yellow: #F5E8C8; --ink: #4A3F50;
  }
  html, body { margin: 0; padding: 0; font-family: 'Quicksand', sans-serif;
    background: linear-gradient(135deg, var(--cream) 0%, var(--soft-white) 50%, var(--sky) 100%);
    color: var(--ink); min-height: 100vh;
  }
  .wrap { width: 100%; max-width: 1200px; margin: 0 auto; padding: 40px 30px 80px; }
  header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 50px;
    padding: 20px 30px; background: rgba(255, 252, 250, 0.7); border-radius: 32px;
    backdrop-filter: blur(10px); border: 1px solid rgba(232, 160, 189, 0.2);
  }
  .logo { display: flex; align-items: center; gap: 12px; font-family: 'Comfortaa', sans-serif;
    font-size: 32px; font-weight: 700; color: var(--ink); text-decoration: none;
  }
  .logo-icon {
    width: 48px; height: 48px; background: linear-gradient(135deg, var(--pink), var(--rose));
    border-radius: 16px; display: grid; place-items: center; font-size: 24px; transform: rotate(-8deg);
    color: white;
  }
  nav { display: flex; gap: 8px; flex-wrap: wrap; }
  nav a {
    padding: 8px 16px; border-radius: 20px; text-decoration: none; color: var(--ink);
    font-weight: 600; font-size: 14px; border: 1px solid transparent; transition: all 0.3s ease;
  }
  nav a:hover { background: var(--pink); border-color: var(--rose); }
  nav a.active { background: var(--rose); color: white; }

  .section { margin-bottom: 60px; }
  .section-title {
    font-family: 'Comfortaa', sans-serif; font-size: 40px; font-weight: 700;
    margin: 0 0 40px; color: var(--ink); text-align: center;
  }

  .friends-container {
    display: grid; grid-template-columns: 300px 1fr; gap: 24px; max-width: 1000px; margin: 0 auto;
  }

  .friends-sidebar {
    background: white; border-radius: 28px; padding: 20px; box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
    border: 1px solid rgba(232, 160, 189, 0.1); max-height: 600px; overflow-y: auto;
  }

  .friends-sidebar h3 {
    font-family: 'Comfortaa', sans-serif; font-size: 16px; font-weight: 700;
    margin: 0 0 16px; color: var(--ink);
  }

  .friend-list-item {
    padding: 12px; border-radius: 16px; cursor: pointer; margin-bottom: 8px;
    display: flex; align-items: center; gap: 12px; transition: all 0.3s ease;
    border: 1px solid transparent;
  }

  .friend-list-item:hover { background: var(--cream); border-color: var(--pink); }
  .friend-list-item.active { background: var(--rose); border-color: var(--rose); }
  .friend-list-item.active * { color: white; }

  .friend-avatar {
    width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
  }

  .friend-list-item:nth-child(2) .friend-avatar { background: linear-gradient(135deg, var(--pink), var(--rose)); }
  .friend-list-item:nth-child(3) .friend-avatar { background: linear-gradient(135deg, var(--peach), var(--yellow)); }
  .friend-list-item:nth-child(4) .friend-avatar { background: linear-gradient(135deg, var(--mint), var(--sky)); }
  .friend-list-item:nth-child(5) .friend-avatar { background: linear-gradient(135deg, var(--lavender), var(--sky)); }

  .friend-list-name {
    font-family: 'Comfortaa', sans-serif; font-size: 14px; font-weight: 700;
    margin: 0; color: var(--ink);
  }

  .friend-list-status {
    font-size: 12px; margin: 0; color: rgba(74, 63, 80, 0.6);
  }

  .chat-window {
    background: white; border-radius: 28px; padding: 32px; box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
    border: 1px solid rgba(232, 160, 189, 0.1); display: flex; flex-direction: column; min-height: 600px;
  }

  .chat-header {
    display: flex; align-items: center; gap: 16px; margin-bottom: 24px; padding-bottom: 16px;
    border-bottom: 1px solid rgba(232, 160, 189, 0.2);
  }

  .chat-avatar {
    width: 50px; height: 50px; border-radius: 50%;
    background: linear-gradient(135deg, var(--pink), var(--rose));
  }

  .chat-info h3 {
    margin: 0; font-size: 18px; font-weight: 700; color: var(--ink); font-family: 'Comfortaa', sans-serif;
  }

  .chat-info p {
    margin: 4px 0 0; font-size: 12px; color: rgba(74, 63, 80, 0.6);
  }

  .messages {
    flex: 1; overflow-y: auto; margin-bottom: 20px; display: flex; flex-direction: column; gap: 12px;
  }

  .message {
    display: flex; gap: 8px; align-items: flex-start; font-size: 14px; line-height: 1.5;
  }

  .message.bot { justify-content: flex-start; }
  .message.user { justify-content: flex-end; }

  .message-bubble {
    max-width: 70%; padding: 12px 16px; border-radius: 18px; word-wrap: break-word;
  }

  .message.bot .message-bubble {
    background: var(--cream); color: var(--ink); border: 1px solid var(--pink);
  }

  .message.user .message-bubble {
    background: var(--rose); color: white;
  }

  .chat-input { display: flex; gap: 8px; }

  .chat-input input {
    flex: 1; padding: 12px 16px; border: 1px solid var(--pink);
    border-radius: 20px; font-family: 'Quicksand', sans-serif;
    font-size: 14px; background: white; outline: none;
    transition: border-color 0.3s ease;
  }

  .chat-input input:focus { border-color: var(--rose); }

  .chat-input button {
    width: 40px; height: 40px; background: var(--rose);
    color: white; border: none; border-radius: 50%;
    cursor: pointer; display: grid; place-items: center;
    transition: transform 0.3s ease; font-size: 18px;
  }

  .chat-input button:hover { transform: scale(1.05); }

  footer { text-align: center; padding: 40px 30px; margin-top: 80px;
    border-top: 1px solid rgba(232, 160, 189, 0.2);
  }
  footer p { font-size: 14px; color: rgba(74, 63, 80, 0.6); margin: 0; }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

  @media (max-width: 768px) { .friends-container { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <a href="/" class="logo">
      <div class="logo-icon">&#9825;</div>
      <span>stuflover</span>
    </a>
    <nav>
      <a href="/">home</a>
      <a href="lifestyle.html">my page</a>
      <a href="catalog.html">closet</a>
      <a href="games.html">games</a>
      <a href="friends.html" class="active">friends</a>
      <a href="beyou.html">mindful</a>
      <a href="account.html">account</a>
    </nav>
  </header>

  <section class="section">
    <div class="friends-container">

      <div class="friends-sidebar">
        <h3>friends</h3>

        <div class="friend-list-item active">
          <div class="friend-avatar"></div>
          <div>
            <p class="friend-list-name">mika</p>
            <p class="friend-list-status">online</p>
          </div>
        </div>

        <div class="friend-list-item">
          <div class="friend-avatar"></div>
          <div>
            <p class="friend-list-name">lily</p>
            <p class="friend-list-status">online</p>
          </div>
        </div>

        <div class="friend-list-item">
          <div class="friend-avatar"></div>
          <div>
            <p class="friend-list-name">rory</p>
            <p class="friend-list-status">online</p>
          </div>
        </div>

        <div class="friend-list-item">
          <div class="friend-avatar"></div>
          <div>
            <p class="friend-list-name">jade</p>
            <p class="friend-list-status">last seen 2h ago</p>
          </div>
        </div>

      </div>

      <div class="chat-window">
        <div class="chat-header">
          <div class="chat-avatar"></div>
          <div class="chat-info">
            <h3>mika</h3>
            <p>online now</p>
          </div>
        </div>

        <div class="messages">
          <div class="message bot"><div class="message-bubble">hey!! what's up</div></div>
          <div class="message user"><div class="message-bubble">hiiii! just vibing, u?</div></div>
          <div class="message bot"><div class="message-bubble">same same. wanna do a fit check later?</div></div>
          <div class="message user"><div class="message-bubble">omg yes!! i got a new top</div></div>
          <div class="message bot"><div class="message-bubble">ooooh i need to seee</div></div>
        </div>

        <form class="chat-input" onsubmit="event.preventDefault();">
          <input type="text" placeholder="send a message..." />
          <button type="submit" aria-label="send">&#10148;</button>
        </form>
      </div>

    </div>
  </section>
</div>

<footer>
  <p>made w/ <span style="display: inline-block; animation: pulse 2s ease-in-out infinite;">&#9825;</span> for u</p>
</footer>
</body>
</html>
