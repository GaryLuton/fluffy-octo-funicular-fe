<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Collab — Stuflover</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800;900&family=Space+Grotesk:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    input,button,select,textarea{font-size:16px;}
    body{font-family:'Space Grotesk',sans-serif;background:#0c0c0f;color:#e0ddd8;min-height:100vh;overflow-x:hidden;}
    .bc{font-family:'Barlow Condensed',sans-serif;font-weight:900;text-transform:uppercase;letter-spacing:1px;}
    .mono{font-family:'JetBrains Mono',monospace;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

    /* NAV */
    nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(12,12,15,0.9);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,0.04);}
    .nav-logo{font-size:1.4rem;letter-spacing:4px;text-decoration:none;color:#e0ddd8;}
    .nav-tag{font-size:0.55rem;letter-spacing:3px;padding:3px 8px;border-radius:4px;background:rgba(200,120,96,0.2);color:#c87860;margin-left:8px;vertical-align:middle;}
    .nav-right{display:flex;gap:8px;align-items:center;}
    .nav-btn{font-size:0.7rem;letter-spacing:2px;text-decoration:none;padding:8px 16px;border-radius:6px;border:1px solid rgba(255,255,255,0.08);color:#e0ddd8;background:transparent;font-family:'Barlow Condensed',sans-serif;font-weight:900;text-transform:uppercase;cursor:pointer;transition:all 0.2s;}
    .nav-btn:hover{background:rgba(255,255,255,0.05);}
    .nav-user{font-size:0.72rem;opacity:0.4;}

    /* ACCESS GATE */
    #gate{display:flex;align-items:center;justify-content:center;min-height:80vh;text-align:center;padding:40px;}
    #gate h1{font-size:2rem;margin-bottom:8px;}
    #gate p{font-size:0.88rem;opacity:0.35;line-height:1.6;max-width:360px;margin:0 auto;}

    /* TABS */
    .tabs{display:flex;gap:4px;padding:12px 24px;border-bottom:1px solid rgba(255,255,255,0.04);background:rgba(255,255,255,0.01);}
    .tab{padding:10px 20px;border-radius:8px;font-size:0.68rem;letter-spacing:2px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;font-weight:900;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,0.3);transition:all 0.2s;}
    .tab.on{background:rgba(255,255,255,0.06);color:#e0ddd8;}
    .tab:hover{color:#e0ddd8;}

    /* MAIN AREA */
    #mainArea{display:none;}
    .pane{display:none;padding:24px;max-width:900px;margin:0 auto;}
    .pane.active{display:block;animation:fadeIn 0.3s ease both;}

    /* CHAT */
    .chat-box{height:calc(100vh - 240px);display:flex;flex-direction:column;}
    .chat-msgs{flex:1;overflow-y:auto;padding:16px 0;display:flex;flex-direction:column;gap:8px;}
    .chat-msgs::-webkit-scrollbar{width:4px;}
    .chat-msgs::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px;}
    .chat-msg{max-width:80%;padding:12px 16px;border-radius:16px;font-size:0.88rem;line-height:1.6;animation:fadeIn 0.2s ease;}
    .chat-msg.them{align-self:flex-start;background:rgba(255,255,255,0.06);border-bottom-left-radius:4px;}
    .chat-msg.me{align-self:flex-end;background:rgba(200,120,96,0.15);border-bottom-right-radius:4px;}
    .chat-msg-user{font-size:0.6rem;letter-spacing:1.5px;text-transform:uppercase;opacity:0.3;margin-bottom:4px;font-family:'Barlow Condensed',sans-serif;font-weight:900;}
    .chat-msg-time{font-size:0.55rem;opacity:0.2;margin-top:4px;}
    .chat-input-row{display:flex;gap:8px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.04);}
    .chat-input{flex:1;padding:12px 16px;border-radius:12px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:#e0ddd8;font-family:'Space Grotesk',sans-serif;font-size:0.9rem;outline:none;resize:none;min-height:46px;max-height:100px;}
    .chat-input:focus{border-color:rgba(200,120,96,0.3);}
    .chat-send{padding:12px 24px;border:none;border-radius:12px;background:#c87860;color:#0c0c0f;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.8rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;}
    .chat-send:hover{opacity:0.85;}

    /* DESIGNS */
    .design-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-top:16px;}
    .design-card{border-radius:14px;overflow:hidden;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);transition:all 0.2s;}
    .design-card:hover{border-color:rgba(255,255,255,0.1);transform:translateY(-2px);}
    .design-img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;background:rgba(255,255,255,0.02);}
    .design-info{padding:14px 16px;}
    .design-title{font-weight:600;margin-bottom:4px;}
    .design-meta{font-size:0.72rem;opacity:0.3;margin-bottom:8px;}
    .design-notes{font-size:0.82rem;opacity:0.5;line-height:1.6;margin-bottom:8px;}
    .design-status{display:inline-block;font-size:0.55rem;letter-spacing:1.5px;text-transform:uppercase;padding:3px 10px;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-weight:900;}
    .design-link{font-size:0.72rem;color:#c87860;text-decoration:none;opacity:0.7;display:inline-block;margin-top:6px;}
    .design-link:hover{opacity:1;}
    .design-actions{display:flex;gap:6px;margin-top:10px;}
    .design-btn{padding:6px 12px;border-radius:6px;border:1px solid rgba(255,255,255,0.08);background:transparent;color:#e0ddd8;font-size:0.6rem;font-family:'Barlow Condensed',sans-serif;font-weight:900;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all 0.15s;}
    .design-btn:hover{background:rgba(255,255,255,0.05);}
    .design-btn.del{border-color:rgba(200,60,60,0.2);color:rgba(200,60,60,0.6);}
    .status-idea{background:rgba(100,150,255,0.1);color:rgba(100,150,255,0.7);}
    .status-progress{background:rgba(255,180,50,0.1);color:rgba(255,180,50,0.7);}
    .status-review{background:rgba(200,120,96,0.15);color:#c87860;}
    .status-done{background:rgba(80,200,100,0.1);color:rgba(80,200,100,0.7);}

    /* SANDBOX */
    .sb-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-top:16px;}
    .sb-card{padding:18px;border-radius:12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);cursor:pointer;transition:all 0.2s;}
    .sb-card:hover{border-color:rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);}
    .sb-card-name{font-weight:600;margin-bottom:4px;}
    .sb-card-meta{font-size:0.68rem;opacity:0.25;}
    .sb-editor{display:none;}
    .sb-editor.active{display:block;}
    .sb-editor-tabs{display:flex;gap:2px;margin-bottom:0;}
    .sb-etab{padding:8px 18px;font-size:0.62rem;letter-spacing:2px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;font-weight:900;cursor:pointer;border:none;background:rgba(255,255,255,0.03);color:rgba(255,255,255,0.3);border-radius:8px 8px 0 0;transition:all 0.15s;}
    .sb-etab.on{background:rgba(255,255,255,0.06);color:#e0ddd8;}
    .sb-code{width:100%;min-height:200px;padding:16px;border:1px solid rgba(255,255,255,0.06);border-top:none;background:rgba(0,0,0,0.3);color:#c8e6c9;font-family:'JetBrains Mono',monospace;font-size:0.82rem;line-height:1.7;outline:none;resize:vertical;border-radius:0 0 8px 8px;tab-size:2;}
    .sb-preview{width:100%;min-height:300px;border:1px solid rgba(255,255,255,0.06);border-radius:8px;margin-top:12px;background:white;}
    .sb-bar{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap;}
    .sb-bar-btn{padding:8px 18px;border-radius:8px;border:none;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.72rem;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;}

    /* MEMBERS */
    .member-row{display:flex;align-items:center;gap:14px;padding:12px 16px;border-radius:10px;background:rgba(255,255,255,0.02);margin-bottom:6px;}
    .member-email{flex:1;font-size:0.88rem;}
    .member-role{font-size:0.58rem;letter-spacing:2px;text-transform:uppercase;opacity:0.3;font-family:'Barlow Condensed',sans-serif;font-weight:900;}
    .member-remove{padding:6px 12px;border-radius:6px;border:1px solid rgba(200,60,60,0.2);background:transparent;color:rgba(200,60,60,0.5);font-size:0.58rem;font-family:'Barlow Condensed',sans-serif;font-weight:900;letter-spacing:1px;text-transform:uppercase;cursor:pointer;}

    /* FORMS */
    .form-row{display:flex;gap:8px;margin-bottom:12px;}
    .form-input{flex:1;padding:10px 14px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:#e0ddd8;font-family:'Space Grotesk',sans-serif;font-size:0.85rem;outline:none;}
    .form-input:focus{border-color:rgba(200,120,96,0.3);}
    .form-btn{padding:10px 20px;border:none;border-radius:8px;background:#c87860;color:#0c0c0f;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.72rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;}
    .section-title{font-size:0.6rem;letter-spacing:4px;text-transform:uppercase;opacity:0.2;margin-bottom:12px;}
    .empty-state{text-align:center;padding:60px 20px;opacity:0.2;font-size:0.9rem;line-height:1.7;}

    @media(max-width:600px){
      .tabs{padding:10px 16px;overflow-x:auto;}
      .pane{padding:16px;}
      .design-grid{grid-template-columns:1fr;}
      .sb-list{grid-template-columns:1fr;}
      .chat-msg{max-width:90%;}
    }
  </style>
</head>
<body>

<nav>
  <div>
    <a class="nav-logo bc" href="index.html">Stuflover</a>
    <span class="nav-tag bc">Collab</span>
  </div>
  <div class="nav-right">
    <span class="nav-user" id="navUser"></span>
    <a class="nav-btn" href="lifestyle.html">Site</a>
  </div>
</nav>

<!-- ACCESS GATE -->
<div id="gate">
  <div style="width:90%;max-width:400px;">
    <h1 class="bc" id="gateTitle" style="font-size:2.4rem;margin-bottom:6px;">Collab</h1>
    <p id="gateMsg" style="margin-bottom:24px;">checking access...</p>

    <!-- Built-in login form -->
    <div id="gateLogin" style="display:none;">
      <div style="padding:28px;border-radius:16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);">
        <div id="gateLoginTabs" style="display:flex;gap:0;margin-bottom:20px;border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,0.08);">
          <button class="bc" onclick="gateShowLogin()" id="gateTabLogin" style="flex:1;padding:10px;border:none;background:rgba(200,120,96,0.3);color:white;font-size:0.72rem;letter-spacing:2px;cursor:pointer;">Sign In</button>
          <button class="bc" onclick="gateShowRegister()" id="gateTabReg" style="flex:1;padding:10px;border:none;background:transparent;color:rgba(255,255,255,0.3);font-size:0.72rem;letter-spacing:2px;cursor:pointer;">Create Account</button>
        </div>

        <!-- Login -->
        <div id="gateLoginForm">
          <input class="form-input" id="glEmail" placeholder="email" style="width:100%;margin-bottom:8px;background:rgba(255,255,255,0.04);"/>
          <input class="form-input" id="glPassword" type="password" placeholder="password" style="width:100%;margin-bottom:8px;background:rgba(255,255,255,0.04);"
            onkeydown="if(event.key==='Enter')gateLogin();"/>
          <div id="glErr" style="font-size:0.78rem;color:#ff8a80;min-height:18px;margin-bottom:8px;"></div>
          <button class="form-btn" onclick="gateLogin()" id="glBtn" style="width:100%;">Sign In</button>
        </div>

        <!-- Register -->
        <div id="gateRegForm" style="display:none;">
          <input class="form-input" id="grUsername" placeholder="username" style="width:100%;margin-bottom:8px;background:rgba(255,255,255,0.04);"/>
          <input class="form-input" id="grEmail" placeholder="email" style="width:100%;margin-bottom:8px;background:rgba(255,255,255,0.04);"/>
          <input class="form-input" id="grPassword" type="password" placeholder="password (6+ chars)" style="width:100%;margin-bottom:8px;background:rgba(255,255,255,0.04);"/>
          <input class="form-input" id="grConfirm" type="password" placeholder="confirm password" style="width:100%;margin-bottom:8px;background:rgba(255,255,255,0.04);"
            onkeydown="if(event.key==='Enter')gateRegister();"/>
          <div id="grErr" style="font-size:0.78rem;color:#ff8a80;min-height:18px;margin-bottom:8px;"></div>
          <button class="form-btn" onclick="gateRegister()" id="grBtn" style="width:100%;">Create Account</button>
        </div>
      </div>
    </div>

    <!-- No access message (shown after login if email not whitelisted) -->
    <div id="gateNoAccess" style="display:none;">
      <div style="padding:20px;border-radius:12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);margin-top:16px;">
        <div style="font-size:0.82rem;opacity:0.5;line-height:1.6;">You are signed in but don't have access to this workspace. Ask the owner to add your email.</div>
        <button class="nav-btn" onclick="stufloverLogout();location.reload();" style="margin-top:12px;">Sign out and try another account</button>
      </div>
    </div>
  </div>
</div>

<!-- MAIN AREA (hidden until access confirmed) -->
<div id="mainArea">
  <div class="tabs">
    <button class="tab on bc" onclick="switchPane('chat')">Chat</button>
    <button class="tab bc" onclick="switchPane('designs')">Designs</button>
    <button class="tab bc" onclick="switchPane('sandbox')">Sandbox</button>
    <button class="tab bc" onclick="switchPane('team')">Team</button>
  </div>

  <div class="pane active" id="paneChat">
    <div class="chat-box">
      <div class="chat-msgs" id="chatMsgs"></div>
      <div class="chat-input-row">
        <textarea class="chat-input" id="chatInput" placeholder="type something..." rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChatMsg();}"
          oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px';"></textarea>
        <button class="chat-send" onclick="sendChatMsg()">Send</button>
      </div>
    </div>
  </div>

  <div class="pane" id="paneDesigns">
    <div class="section-title bc">Printify Designs & Ideas</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;">
      <button class="form-btn" onclick="openDesignForm()">+ Add Design</button>
    </div>
    <div id="designForm" style="display:none;padding:18px;border-radius:12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);margin-bottom:16px;">
      <input class="form-input" id="dfTitle" placeholder="Design name" style="margin-bottom:8px;width:100%;"/>
      <input class="form-input" id="dfImage" placeholder="Image URL (paste Printify preview link)" style="margin-bottom:8px;width:100%;"/>
      <input class="form-input" id="dfLink" placeholder="Printify link (optional)" style="margin-bottom:8px;width:100%;"/>
      <textarea class="form-input" id="dfNotes" placeholder="Notes..." style="margin-bottom:8px;width:100%;min-height:60px;resize:vertical;"></textarea>
      <select class="form-input" id="dfStatus" style="margin-bottom:10px;width:100%;">
        <option value="idea">Idea</option>
        <option value="progress">In Progress</option>
        <option value="review">Ready for Review</option>
        <option value="done">Done</option>
      </select>
      <div style="display:flex;gap:8px;">
        <button class="form-btn" onclick="saveDesign()">Save</button>
        <button class="nav-btn" onclick="closeDesignForm()">Cancel</button>
      </div>
    </div>
    <div class="design-grid" id="designGrid"></div>
  </div>

  <div class="pane" id="paneSandbox">
    <div class="section-title bc">Sandbox — Test Updates</div>
    <div id="sbListView">
      <button class="form-btn" onclick="newSandbox()" style="margin-bottom:16px;">+ New Sandbox</button>
      <div class="sb-list" id="sbList"></div>
    </div>
    <div class="sb-editor" id="sbEditor">
      <div class="sb-bar">
        <button class="sb-bar-btn" style="background:#c87860;color:#0c0c0f;" onclick="runSandbox()">Run</button>
        <button class="sb-bar-btn" style="background:rgba(255,255,255,0.06);color:#e0ddd8;" onclick="saveSandbox()">Save</button>
        <button class="sb-bar-btn" style="background:transparent;border:1px solid rgba(255,255,255,0.08);color:#e0ddd8;" onclick="closeSandbox()">Back</button>
        <span style="flex:1;"></span>
        <span class="mono" style="font-size:0.72rem;opacity:0.3;" id="sbName"></span>
      </div>
      <div class="sb-editor-tabs">
        <button class="sb-etab on" onclick="switchCodeTab('html',this)">HTML</button>
        <button class="sb-etab" onclick="switchCodeTab('css',this)">CSS</button>
        <button class="sb-etab" onclick="switchCodeTab('js',this)">JS</button>
      </div>
      <textarea class="sb-code" id="sbCodeHtml" placeholder="<!-- Write HTML here -->"></textarea>
      <textarea class="sb-code" id="sbCodeCss" style="display:none;color:#90caf9;" placeholder="/* Write CSS here */"></textarea>
      <textarea class="sb-code" id="sbCodeJs" style="display:none;color:#ffe082;" placeholder="// Write JS here"></textarea>
      <div class="section-title bc" style="margin-top:16px;">Preview</div>
      <iframe class="sb-preview" id="sbPreview" sandbox="allow-scripts"></iframe>
    </div>
  </div>

  <div class="pane" id="paneTeam">
    <div class="section-title bc">Team Members</div>
    <div id="teamOwnerControls" style="display:none;">
      <div class="form-row" style="margin-bottom:20px;">
        <input class="form-input" id="grantEmail" placeholder="email to grant access"/>
        <button class="form-btn" onclick="grantAccess()">Grant</button>
      </div>
    </div>
    <div id="teamList"></div>
  </div>
</div>

<script src="/stuflover-config.js"></script>
<script src="/stuflover-backend.js"></script>
<script>
var myUsername = '';
var myRole = '';
var currentPane = 'chat';
var chatPollInterval = null;
var editingDesignId = null;
var currentSandboxId = null;
var currentCodeTab = 'html';

async function apiFetch(url, opts) {
  var base = window.STUFLOVER_API_URL || '';
  var token = localStorage.getItem('stuflover_token');
  var headers = Object.assign({'Content-Type':'application/json'}, opts && opts.headers || {});
  if (token) headers['Authorization'] = 'Bearer ' + token;
  var res = await (window._origFetch || fetch).call(window, base + url, Object.assign({}, opts, {headers: headers}));
  return res.json();
}

// ─── INIT ─────────────────────────────────────────
async function init() {
  var token = localStorage.getItem('stuflover_token');
  if (!token) {
    showLoginGate();
    return;
  }
  try {
    var me = await apiFetch('/api/auth/me');
    if (!me.user) { showLoginGate(); return; }
    myUsername = me.user.username;
    document.getElementById('navUser').textContent = myUsername;

    var check = await apiFetch('/api/collab/check');
    if (!check.access) {
      showNoAccess(me.user.email);
      return;
    }
    myRole = check.role;

    // Show main area
    document.getElementById('gate').style.display = 'none';
    document.getElementById('mainArea').style.display = 'block';

    // Show owner controls
    if (myRole === 'owner') {
      document.getElementById('teamOwnerControls').style.display = 'block';
    }

    loadChat();
    chatPollInterval = setInterval(loadChat, 5000);
  } catch (e) {
    showLoginGate();
    document.getElementById('gateMsg').textContent = 'Could not reach the server. Try refreshing.';
  }
}

function showLoginGate() {
  document.getElementById('gateTitle').textContent = 'Collab';
  document.getElementById('gateMsg').textContent = 'Sign in to access the workspace.';
  document.getElementById('gateLogin').style.display = 'block';
  document.getElementById('gateNoAccess').style.display = 'none';
}

function showNoAccess(email) {
  document.getElementById('gateTitle').textContent = 'No Access';
  document.getElementById('gateMsg').textContent = 'Signed in as ' + email;
  document.getElementById('gateLogin').style.display = 'none';
  document.getElementById('gateNoAccess').style.display = 'block';
}

function gateShowLogin() {
  document.getElementById('gateLoginForm').style.display = 'block';
  document.getElementById('gateRegForm').style.display = 'none';
  document.getElementById('gateTabLogin').style.background = 'rgba(200,120,96,0.3)';
  document.getElementById('gateTabLogin').style.color = 'white';
  document.getElementById('gateTabReg').style.background = 'transparent';
  document.getElementById('gateTabReg').style.color = 'rgba(255,255,255,0.3)';
}

function gateShowRegister() {
  document.getElementById('gateLoginForm').style.display = 'none';
  document.getElementById('gateRegForm').style.display = 'block';
  document.getElementById('gateTabReg').style.background = 'rgba(200,120,96,0.3)';
  document.getElementById('gateTabReg').style.color = 'white';
  document.getElementById('gateTabLogin').style.background = 'transparent';
  document.getElementById('gateTabLogin').style.color = 'rgba(255,255,255,0.3)';
}

async function gateLogin() {
  var email = document.getElementById('glEmail').value.trim();
  var password = document.getElementById('glPassword').value;
  var err = document.getElementById('glErr');
  var btn = document.getElementById('glBtn');
  if (!email || !password) { err.textContent = 'enter email and password'; return; }
  err.textContent = '';
  btn.disabled = true; btn.textContent = 'Signing in...';

  try {
    var base = window.STUFLOVER_API_URL || '';
    var res = await (window._origFetch || fetch).call(window, base + '/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, password: password })
    });
    var data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Login failed');

    localStorage.setItem('stuflover_token', data.token);
    localStorage.setItem('stuflover_user', JSON.stringify(data.user));
    init(); // Re-run init with token
  } catch (e) {
    err.textContent = e.message;
  }
  btn.disabled = false; btn.textContent = 'Sign In';
}

async function gateRegister() {
  var username = document.getElementById('grUsername').value.trim();
  var email = document.getElementById('grEmail').value.trim();
  var password = document.getElementById('grPassword').value;
  var confirm = document.getElementById('grConfirm').value;
  var err = document.getElementById('grErr');
  var btn = document.getElementById('grBtn');
  if (!username || !email || !password) { err.textContent = 'all fields required'; return; }
  if (password.length < 6) { err.textContent = 'password must be 6+ characters'; return; }
  if (password !== confirm) { err.textContent = 'passwords don\'t match'; return; }
  err.textContent = '';
  btn.disabled = true; btn.textContent = 'Creating...';

  try {
    var base = window.STUFLOVER_API_URL || '';
    var res = await (window._origFetch || fetch).call(window, base + '/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: username, email: email, password: password })
    });
    var data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Registration failed');

    localStorage.setItem('stuflover_token', data.token);
    localStorage.setItem('stuflover_user', JSON.stringify(data.user));
    init(); // Re-run init with token
  } catch (e) {
    err.textContent = e.message;
  }
  btn.disabled = false; btn.textContent = 'Create Account';
}

function switchPane(pane) {
  currentPane = pane;
  document.querySelectorAll('.tab').forEach(function(t, i) {
    t.classList.toggle('on', ['chat','designs','sandbox','team'][i] === pane);
  });
  document.querySelectorAll('.pane').forEach(function(p) { p.classList.remove('active'); });
  document.getElementById('pane' + pane.charAt(0).toUpperCase() + pane.slice(1)).classList.add('active');

  if (pane === 'designs') loadDesigns();
  if (pane === 'sandbox') loadSandboxList();
  if (pane === 'team') loadTeam();
}

// ─── CHAT ─────────────────────────────────────────
var lastMsgCount = 0;
async function loadChat() {
  try {
    var data = await apiFetch('/api/collab/messages');
    var msgs = data.messages || [];
    if (msgs.length === lastMsgCount) return;
    lastMsgCount = msgs.length;

    var el = document.getElementById('chatMsgs');
    el.innerHTML = msgs.map(function(m) {
      var isMe = m.username === myUsername;
      var d = new Date(m.created_at + 'Z');
      var time = d.toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});
      return '<div class="chat-msg ' + (isMe ? 'me' : 'them') + '">' +
        (!isMe ? '<div class="chat-msg-user">' + esc(m.username) + '</div>' : '') +
        esc(m.text) +
        '<div class="chat-msg-time">' + time + '</div>' +
      '</div>';
    }).join('');
    el.scrollTop = el.scrollHeight;
  } catch (e) {}
}

async function sendChatMsg() {
  var input = document.getElementById('chatInput');
  var text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  await apiFetch('/api/collab/messages', {method:'POST', body: JSON.stringify({text: text})});
  loadChat();
}

// ─── DESIGNS ──────────────────────────────────────
async function loadDesigns() {
  try {
    var data = await apiFetch('/api/collab/designs');
    var grid = document.getElementById('designGrid');
    if (!data.designs || !data.designs.length) {
      grid.innerHTML = '<div class="empty-state">no designs yet — add your first one</div>';
      return;
    }
    grid.innerHTML = data.designs.map(function(d) {
      var statusClass = {idea:'status-idea',progress:'status-progress',review:'status-review',done:'status-done'}[d.status] || 'status-idea';
      var statusLabel = {idea:'Idea',progress:'In Progress',review:'Review',done:'Done'}[d.status] || d.status;
      return '<div class="design-card">' +
        (d.image ? '<img class="design-img" src="' + esc(d.image) + '" onerror="this.style.display=\'none\'"/>' : '') +
        '<div class="design-info">' +
          '<div class="design-title">' + esc(d.title) + '</div>' +
          '<div class="design-meta">' + esc(d.username) + ' · ' + new Date(d.created_at + 'Z').toLocaleDateString() + '</div>' +
          (d.notes ? '<div class="design-notes">' + esc(d.notes) + '</div>' : '') +
          '<span class="design-status ' + statusClass + '">' + statusLabel + '</span>' +
          (d.link ? '<br/><a class="design-link" href="' + esc(d.link) + '" target="_blank" rel="noopener">Open in Printify</a>' : '') +
          '<div class="design-actions">' +
            '<button class="design-btn" onclick="editDesign(' + d.id + ')">Edit</button>' +
            '<button class="design-btn del" onclick="deleteDesign(' + d.id + ')">Delete</button>' +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  } catch (e) {}
}

function openDesignForm() {
  editingDesignId = null;
  document.getElementById('dfTitle').value = '';
  document.getElementById('dfImage').value = '';
  document.getElementById('dfLink').value = '';
  document.getElementById('dfNotes').value = '';
  document.getElementById('dfStatus').value = 'idea';
  document.getElementById('designForm').style.display = 'block';
}

function closeDesignForm() {
  document.getElementById('designForm').style.display = 'none';
  editingDesignId = null;
}

async function saveDesign() {
  var title = document.getElementById('dfTitle').value.trim();
  if (!title) return;
  var body = {
    title: title,
    image: document.getElementById('dfImage').value.trim(),
    link: document.getElementById('dfLink').value.trim(),
    notes: document.getElementById('dfNotes').value.trim(),
    status: document.getElementById('dfStatus').value
  };
  if (editingDesignId) {
    await apiFetch('/api/collab/designs/' + editingDesignId, {method:'PUT', body: JSON.stringify(body)});
  } else {
    await apiFetch('/api/collab/designs', {method:'POST', body: JSON.stringify(body)});
  }
  closeDesignForm();
  loadDesigns();
}

async function editDesign(id) {
  try {
    var data = await apiFetch('/api/collab/designs');
    var d = (data.designs || []).find(function(x) { return x.id === id; });
    if (!d) return;
    editingDesignId = id;
    document.getElementById('dfTitle').value = d.title;
    document.getElementById('dfImage').value = d.image || '';
    document.getElementById('dfLink').value = d.link || '';
    document.getElementById('dfNotes').value = d.notes || '';
    document.getElementById('dfStatus').value = d.status || 'idea';
    document.getElementById('designForm').style.display = 'block';
  } catch (e) {}
}

async function deleteDesign(id) {
  if (!confirm('Delete this design?')) return;
  await apiFetch('/api/collab/designs/' + id, {method:'DELETE'});
  loadDesigns();
}

// ─── SANDBOX ──────────────────────────────────────
async function loadSandboxList() {
  document.getElementById('sbListView').style.display = 'block';
  document.getElementById('sbEditor').classList.remove('active');
  try {
    var data = await apiFetch('/api/collab/sandbox');
    var list = document.getElementById('sbList');
    if (!data.sandboxes || !data.sandboxes.length) {
      list.innerHTML = '<div class="empty-state">no sandboxes yet — create one to start testing</div>';
      return;
    }
    list.innerHTML = data.sandboxes.map(function(s) {
      return '<div class="sb-card" onclick="openSandbox(' + s.id + ')">' +
        '<div class="sb-card-name">' + esc(s.name) + '</div>' +
        '<div class="sb-card-meta">' + esc(s.username) + ' · ' + new Date(s.updated_at + 'Z').toLocaleDateString() + '</div>' +
      '</div>';
    }).join('');
  } catch (e) {}
}

async function newSandbox() {
  var name = prompt('Sandbox name (e.g. "new homepage test")');
  if (!name || !name.trim()) return;
  var data = await apiFetch('/api/collab/sandbox', {method:'POST', body: JSON.stringify({name: name.trim()})});
  if (data.id) openSandbox(data.id);
  else loadSandboxList();
}

async function openSandbox(id) {
  currentSandboxId = id;
  try {
    var data = await apiFetch('/api/collab/sandbox/' + id);
    var sb = data.sandbox;
    document.getElementById('sbListView').style.display = 'none';
    document.getElementById('sbEditor').classList.add('active');
    document.getElementById('sbName').textContent = sb.name;
    document.getElementById('sbCodeHtml').value = sb.html || '';
    document.getElementById('sbCodeCss').value = sb.css || '';
    document.getElementById('sbCodeJs').value = sb.js || '';
    switchCodeTab('html', document.querySelector('.sb-etab'));
    runSandbox();
  } catch (e) {}
}

function closeSandbox() {
  currentSandboxId = null;
  loadSandboxList();
}

function switchCodeTab(tab, btn) {
  currentCodeTab = tab;
  document.querySelectorAll('.sb-etab').forEach(function(t) { t.classList.remove('on'); });
  btn.classList.add('on');
  document.getElementById('sbCodeHtml').style.display = tab === 'html' ? 'block' : 'none';
  document.getElementById('sbCodeCss').style.display = tab === 'css' ? 'block' : 'none';
  document.getElementById('sbCodeJs').style.display = tab === 'js' ? 'block' : 'none';
}

function runSandbox() {
  var html = document.getElementById('sbCodeHtml').value;
  var css = document.getElementById('sbCodeCss').value;
  var js = document.getElementById('sbCodeJs').value;
  var iframe = document.getElementById('sbPreview');
  var doc = '<!DOCTYPE html><html><head><style>' + css + '</style></head><body>' + html + '<script>' + js + '<\/script></body></html>';
  iframe.srcdoc = doc;
}

async function saveSandbox() {
  if (!currentSandboxId) return;
  await apiFetch('/api/collab/sandbox/' + currentSandboxId, {
    method: 'PUT',
    body: JSON.stringify({
      name: document.getElementById('sbName').textContent,
      html: document.getElementById('sbCodeHtml').value,
      css: document.getElementById('sbCodeCss').value,
      js: document.getElementById('sbCodeJs').value
    })
  });
  var btn = document.querySelector('.sb-bar-btn:nth-child(2)');
  if (btn) { btn.textContent = 'Saved!'; setTimeout(function(){ btn.textContent = 'Save'; }, 1200); }
}

// ─── TEAM ─────────────────────────────────────────
async function loadTeam() {
  try {
    var data = await apiFetch('/api/collab/members');
    var list = document.getElementById('teamList');
    list.innerHTML = (data.members || []).map(function(m) {
      var isOwner = m.role === 'owner';
      return '<div class="member-row">' +
        '<div class="member-email">' + esc(m.email) + '</div>' +
        '<div class="member-role">' + m.role + '</div>' +
        (!isOwner && myRole === 'owner' ? '<button class="member-remove" onclick="removeMember(' + m.id + ')">Remove</button>' : '') +
      '</div>';
    }).join('');
  } catch (e) {}
}

async function grantAccess() {
  var email = document.getElementById('grantEmail').value.trim();
  if (!email) return;
  await apiFetch('/api/collab/grant', {method:'POST', body: JSON.stringify({email: email})});
  document.getElementById('grantEmail').value = '';
  loadTeam();
}

async function removeMember(id) {
  if (!confirm('Remove this member?')) return;
  await apiFetch('/api/collab/revoke/' + id, {method:'DELETE'});
  loadTeam();
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

init();
</script>
</body>
</html>
