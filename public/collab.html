<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Collab — Stuflover</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800;900&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    input,button,select,textarea{font-size:16px;}
    body{font-family:'Space Grotesk',sans-serif;background:#f5f0ed;color:#2a1a14;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
    .bc{font-family:'Barlow Condensed',sans-serif;font-weight:900;text-transform:uppercase;letter-spacing:1px;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

    /* NAV */
    .top-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid rgba(42,26,20,0.06);flex-shrink:0;background:rgba(245,240,237,0.95);backdrop-filter:blur(12px);}
    .top-left{display:flex;align-items:center;gap:8px;}
    .top-logo{font-size:1.2rem;letter-spacing:3px;text-decoration:none;color:#2a1a14;}
    .top-tag{font-size:0.5rem;letter-spacing:2px;padding:3px 8px;border-radius:4px;background:rgba(200,120,96,0.1);color:#c87860;}
    .top-user{font-size:0.72rem;opacity:0.35;}
    .top-btn{font-size:0.65rem;letter-spacing:2px;padding:6px 14px;border-radius:6px;border:1px solid rgba(42,26,20,0.1);background:transparent;color:#2a1a14;font-family:'Barlow Condensed',sans-serif;font-weight:900;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:all 0.15s;}
    .top-btn:hover{background:rgba(42,26,20,0.04);}

    /* LAYOUT */
    .main{flex:1;display:flex;overflow:hidden;}
    .sidebar{width:220px;border-right:1px solid rgba(42,26,20,0.06);display:flex;flex-direction:column;flex-shrink:0;background:rgba(42,26,20,0.015);}
    .sidebar-section{padding:12px 16px;font-size:0.55rem;letter-spacing:3px;text-transform:uppercase;opacity:0.2;font-family:'Barlow Condensed',sans-serif;font-weight:900;}
    .sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;transition:all 0.15s;font-size:0.88rem;border-left:3px solid transparent;}
    .sidebar-item:hover{background:rgba(42,26,20,0.03);}
    .sidebar-item.on{background:rgba(200,120,96,0.06);border-left-color:#c87860;font-weight:600;}
    .sidebar-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .sidebar-team{padding:8px 16px;}
    .sidebar-add{width:100%;padding:8px;border:1px dashed rgba(42,26,20,0.1);border-radius:8px;background:transparent;color:#2a1a14;font-size:0.75rem;cursor:pointer;transition:all 0.15s;margin-top:4px;}
    .sidebar-add:hover{background:rgba(42,26,20,0.03);}

    /* CHAT PANEL */
    .chat-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
    .chat-header{padding:14px 20px;border-bottom:1px solid rgba(42,26,20,0.05);display:flex;align-items:center;gap:10px;flex-shrink:0;}
    .chat-header-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
    .chat-header-name{font-weight:700;font-size:1rem;}
    .chat-header-desc{font-size:0.72rem;opacity:0.3;margin-left:auto;}
    .msgs{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:8px;}
    .msgs::-webkit-scrollbar{width:3px;}
    .msgs::-webkit-scrollbar-thumb{background:rgba(42,26,20,0.08);border-radius:2px;}
    .msg{max-width:78%;padding:12px 16px;border-radius:18px;font-size:0.9rem;line-height:1.65;animation:fadeIn 0.2s ease;}
    .msg.them{align-self:flex-start;background:white;border:1px solid rgba(42,26,20,0.04);border-bottom-left-radius:4px;}
    .msg.me{align-self:flex-end;background:rgba(200,120,96,0.1);border-bottom-right-radius:4px;}
    .msg.ai{align-self:flex-start;background:linear-gradient(135deg,rgba(120,100,200,0.08),rgba(200,120,96,0.06));border:1px solid rgba(120,100,200,0.08);border-bottom-left-radius:4px;}
    .msg-user{font-size:0.58rem;letter-spacing:1.5px;text-transform:uppercase;opacity:0.3;margin-bottom:3px;font-family:'Barlow Condensed',sans-serif;font-weight:900;}
    .msg-time{font-size:0.52rem;opacity:0.18;margin-top:3px;}
    .input-row{display:flex;gap:8px;padding:12px 20px;border-top:1px solid rgba(42,26,20,0.05);flex-shrink:0;align-items:flex-end;}
    .input-box{flex:1;padding:11px 16px;border-radius:20px;border:1px solid rgba(42,26,20,0.08);background:white;color:#2a1a14;font-family:'Space Grotesk',sans-serif;font-size:0.9rem;outline:none;resize:none;min-height:44px;max-height:100px;line-height:1.5;}
    .input-box:focus{border-color:rgba(200,120,96,0.35);}
    .send-btn{padding:11px 22px;border:none;border-radius:20px;background:#c87860;color:white;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.78rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all 0.15s;flex-shrink:0;}
    .send-btn:hover{opacity:0.85;}

    /* GATE */
    #gate{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px;}
    #gate h1{font-size:2rem;margin-bottom:6px;}
    #gate p{font-size:0.85rem;opacity:0.35;line-height:1.6;max-width:340px;margin:0 auto;}
    .gate-card{padding:28px;border-radius:16px;background:white;border:1px solid rgba(42,26,20,0.06);box-shadow:0 4px 20px rgba(42,26,20,0.05);margin-top:20px;text-align:left;}
    .gate-tabs{display:flex;gap:0;margin-bottom:18px;border-radius:8px;overflow:hidden;border:1px solid rgba(42,26,20,0.1);}
    .gate-tab{flex:1;padding:10px;border:none;font-size:0.7rem;letter-spacing:2px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:900;text-transform:uppercase;transition:all 0.2s;}
    .gate-tab.on{background:#c87860;color:white;}
    .gate-tab:not(.on){background:transparent;color:rgba(42,26,20,0.3);}
    .g-input{width:100%;padding:11px 14px;border-radius:10px;border:1px solid rgba(42,26,20,0.1);background:rgba(42,26,20,0.02);color:#2a1a14;font-family:'Space Grotesk',sans-serif;font-size:0.88rem;outline:none;margin-bottom:8px;}
    .g-input:focus{border-color:rgba(200,120,96,0.4);}
    .g-err{font-size:0.75rem;color:#c44;min-height:16px;margin-bottom:6px;}
    .g-btn{width:100%;padding:12px;border:none;border-radius:10px;background:#c87860;color:white;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.82rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;}

    /* MOBILE */
    @media(max-width:640px){
      .sidebar{display:none;}
      .top-bar{padding:10px 14px;}
      .msgs{padding:12px 14px;}
      .input-row{padding:10px 14px;}
      .msg{max-width:88%;}
    }
  </style>
</head>
<body>

<div class="top-bar">
  <div class="top-left">
    <a class="top-logo bc" href="index.html">Stuflover</a>
    <span class="top-tag bc">Collab</span>
  </div>
  <div style="display:flex;gap:8px;align-items:center;">
    <span class="top-user" id="navUser"></span>
    <a class="top-btn" href="lifestyle.html">Site</a>
  </div>
</div>

<!-- GATE (shown when not logged in or no access) -->
<div id="gate">
  <div style="width:90%;max-width:380px;">
    <h1 class="bc" id="gateTitle">Collab</h1>
    <p id="gateMsg">checking...</p>
    <div id="gateLogin" style="display:none;">
      <div class="gate-card">
        <div class="gate-tabs">
          <button class="gate-tab on bc" onclick="gateTab('login')">Sign In</button>
          <button class="gate-tab bc" onclick="gateTab('register')">New Account</button>
        </div>
        <div id="gateLoginForm">
          <input class="g-input" id="glEmail" placeholder="email" onkeydown="if(event.key==='Enter')gateLogin()"/>
          <input class="g-input" id="glPass" type="password" placeholder="password" onkeydown="if(event.key==='Enter')gateLogin()"/>
          <div class="g-err" id="glErr"></div>
          <button class="g-btn" onclick="gateLogin()" id="glBtn">Sign In</button>
        </div>
        <div id="gateRegForm" style="display:none;">
          <input class="g-input" id="grUser" placeholder="username"/>
          <input class="g-input" id="grEmail" placeholder="email"/>
          <input class="g-input" id="grPass" type="password" placeholder="password (6+)"/>
          <input class="g-input" id="grConf" type="password" placeholder="confirm password" onkeydown="if(event.key==='Enter')gateRegister()"/>
          <div class="g-err" id="grErr"></div>
          <button class="g-btn" onclick="gateRegister()" id="grBtn">Create Account</button>
        </div>
      </div>
    </div>
    <div id="gateNoAccess" style="display:none;margin-top:16px;">
      <div class="gate-card" style="text-align:center;">
        <div style="font-size:0.85rem;opacity:0.45;line-height:1.6;">You're signed in but don't have access. Ask the owner to add your email.</div>
        <button class="top-btn" onclick="stufloverLogout();location.reload();" style="margin-top:12px;">Try another account</button>
      </div>
    </div>
  </div>
</div>

<!-- MAIN (hidden until access confirmed) -->
<div class="main" id="mainArea" style="display:none;">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-section">channels</div>
    <div class="sidebar-item on" onclick="openChannel('general')" id="ch_general">
      <div class="dot" style="background:#c87860;"></div> General
    </div>
    <div class="sidebar-item" onclick="openChannel('designs')" id="ch_designs">
      <div class="dot" style="background:#7986cb;"></div> Designs
    </div>
    <div class="sidebar-item" onclick="openChannel('ideas')" id="ch_ideas">
      <div class="dot" style="background:#81c784;"></div> Ideas
    </div>

    <div class="sidebar-section" style="margin-top:16px;">tools</div>
    <div class="sidebar-item" onclick="openChannel('claude')" id="ch_claude">
      <div class="dot" style="background:#b39ddb;"></div> Ask Claude
    </div>

    <div class="sidebar-section" style="margin-top:16px;">team</div>
    <div class="sidebar-team" id="sidebarTeam"></div>
    <div class="sidebar-team" id="sidebarOwnerAdd" style="display:none;">
      <input class="g-input" id="addEmail" placeholder="add email..." style="font-size:0.78rem;padding:8px 10px;margin-bottom:0;"/>
      <button class="sidebar-add" onclick="grantAccess()">+ Add member</button>
    </div>
  </div>

  <!-- CHAT PANEL -->
  <div class="chat-panel">
    <div class="chat-header">
      <div class="chat-header-dot" id="chDot" style="background:#c87860;"></div>
      <div class="chat-header-name" id="chName">General</div>
      <div class="chat-header-desc" id="chDesc">team chat</div>
    </div>
    <div class="msgs" id="chatMsgs"></div>
    <div class="input-row">
      <textarea class="input-box" id="chatInput" placeholder="message..." rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"
        oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px';"></textarea>
      <button class="send-btn" onclick="sendMsg()">Send</button>
    </div>
  </div>
</div>

<script src="/stuflover-config.js"></script>
<script src="/stuflover-backend.js"></script>
<script>
var myUsername='', myRole='', currentChannel='general', chatPoll=null;

async function api(url,opts){
  var base=window.STUFLOVER_API_URL||'';
  var token=localStorage.getItem('stuflover_token');
  var h=Object.assign({'Content-Type':'application/json'},opts&&opts.headers||{});
  if(token) h['Authorization']='Bearer '+token;
  var r=await(window._origFetch||fetch).call(window,base+url,Object.assign({},opts,{headers:h}));
  return r.json();
}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ─── INIT ───
async function init(){
  var token=localStorage.getItem('stuflover_token');
  if(!token){showLogin();return;}
  try{
    var me=await api('/api/auth/me');
    if(!me.user){showLogin();return;}
    myUsername=me.user.username;
    document.getElementById('navUser').textContent=myUsername;
    var check=await api('/api/collab/check');
    if(!check.access){showNoAccess(me.user.email);return;}
    myRole=check.role;
    document.getElementById('gate').style.display='none';
    document.getElementById('mainArea').style.display='flex';
    if(myRole==='owner') document.getElementById('sidebarOwnerAdd').style.display='block';
    loadTeamSidebar();
    openChannel('general');
  }catch(e){showLogin();document.getElementById('gateMsg').textContent='Could not connect. Refresh to retry.';}
}

function showLogin(){
  document.getElementById('gateTitle').textContent='Collab';
  document.getElementById('gateMsg').textContent='Sign in to your team workspace.';
  document.getElementById('gateLogin').style.display='block';
  document.getElementById('gateNoAccess').style.display='none';
}
function showNoAccess(email){
  document.getElementById('gateTitle').textContent='No Access';
  document.getElementById('gateMsg').textContent='Signed in as '+email;
  document.getElementById('gateLogin').style.display='none';
  document.getElementById('gateNoAccess').style.display='block';
}

function gateTab(t){
  document.getElementById('gateLoginForm').style.display=t==='login'?'block':'none';
  document.getElementById('gateRegForm').style.display=t==='register'?'block':'none';
  document.querySelectorAll('.gate-tab').forEach(function(b,i){b.classList.toggle('on',(t==='login'&&i===0)||(t==='register'&&i===1));});
}

async function gateLogin(){
  var e=document.getElementById('glEmail').value.trim(),p=document.getElementById('glPass').value,err=document.getElementById('glErr'),btn=document.getElementById('glBtn');
  if(!e||!p){err.textContent='enter email and password';return;}
  err.textContent='';btn.disabled=true;btn.textContent='...';
  try{
    var base=window.STUFLOVER_API_URL||'';
    var r=await(window._origFetch||fetch).call(window,base+'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:e,password:p})});
    var d=await r.json();if(!r.ok)throw new Error(d.error||'Failed');
    localStorage.setItem('stuflover_token',d.token);localStorage.setItem('stuflover_user',JSON.stringify(d.user));
    init();
  }catch(x){err.textContent=x.message;}
  btn.disabled=false;btn.textContent='Sign In';
}

async function gateRegister(){
  var u=document.getElementById('grUser').value.trim(),e=document.getElementById('grEmail').value.trim(),p=document.getElementById('grPass').value,c=document.getElementById('grConf').value,err=document.getElementById('grErr'),btn=document.getElementById('grBtn');
  if(!u||!e||!p){err.textContent='all fields required';return;}
  if(p.length<6){err.textContent='password 6+ chars';return;}
  if(p!==c){err.textContent='passwords don\'t match';return;}
  err.textContent='';btn.disabled=true;btn.textContent='...';
  try{
    var base=window.STUFLOVER_API_URL||'';
    var r=await(window._origFetch||fetch).call(window,base+'/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,email:e,password:p})});
    var d=await r.json();if(!r.ok)throw new Error(d.error||'Failed');
    localStorage.setItem('stuflover_token',d.token);localStorage.setItem('stuflover_user',JSON.stringify(d.user));
    init();
  }catch(x){err.textContent=x.message;}
  btn.disabled=false;btn.textContent='Create Account';
}

// ─── CHANNELS ───
var channelInfo={
  general:{name:'General',desc:'team chat',color:'#c87860'},
  designs:{name:'Designs',desc:'share printify designs + ideas',color:'#7986cb'},
  ideas:{name:'Ideas',desc:'brainstorm anything',color:'#81c784'},
  claude:{name:'Ask Claude',desc:'AI assistant for the team',color:'#b39ddb'}
};

function openChannel(ch){
  if(chatPoll){clearInterval(chatPoll);chatPoll=null;}
  currentChannel=ch;
  var info=channelInfo[ch]||channelInfo.general;
  document.getElementById('chName').textContent=info.name;
  document.getElementById('chDesc').textContent=info.desc;
  document.getElementById('chDot').style.background=info.color;
  document.querySelectorAll('.sidebar-item').forEach(function(el){el.classList.remove('on');});
  var el=document.getElementById('ch_'+ch);if(el)el.classList.add('on');

  if(ch==='claude'){
    document.getElementById('chatInput').placeholder='ask claude anything about stuflover...';
    loadClaudeChat();
  }else{
    document.getElementById('chatInput').placeholder='message #'+info.name.toLowerCase()+'...';
    loadChat();
    chatPoll=setInterval(loadChat,4000);
  }
}

// ─── TEAM CHAT ───
var lastMsgCount={};
async function loadChat(){
  try{
    var data=await api('/api/collab/messages?channel='+currentChannel);
    var msgs=data.messages||[];
    var key=currentChannel;
    if(msgs.length===lastMsgCount[key])return;
    lastMsgCount[key]=msgs.length;
    renderMsgs(msgs);
  }catch(e){}
}

function renderMsgs(msgs){
  var el=document.getElementById('chatMsgs');
  el.innerHTML=msgs.map(function(m){
    var isMe=m.username===myUsername;
    var d=new Date(m.created_at+'Z');
    var time=d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
    return '<div class="msg '+(isMe?'me':'them')+'">'+
      (!isMe?'<div class="msg-user">'+esc(m.username)+'</div>':'')+
      esc(m.text)+
      '<div class="msg-time">'+time+'</div>'+
    '</div>';
  }).join('');
  el.scrollTop=el.scrollHeight;
}

async function sendMsg(){
  var input=document.getElementById('chatInput');
  var text=input.value.trim();if(!text)return;
  input.value='';input.style.height='auto';

  if(currentChannel==='claude'){
    sendClaude(text);return;
  }

  await api('/api/collab/messages',{method:'POST',body:JSON.stringify({text:text,channel:currentChannel})});
  loadChat();
}

// ─── CLAUDE AI ───
var claudeHistory=[];

function loadClaudeChat(){
  var saved=JSON.parse(localStorage.getItem('collab_claude')||'[]');
  claudeHistory=saved;
  var el=document.getElementById('chatMsgs');
  if(!saved.length){
    el.innerHTML='<div style="text-align:center;padding:40px 20px;opacity:0.25;font-size:0.88rem;line-height:1.7;">Ask Claude anything — ideas for Stuflover, help with designs, marketing copy, code questions, whatever you need.</div>';
    return;
  }
  el.innerHTML=saved.map(function(m){
    var cls=m.role==='user'?'me':'ai';
    return '<div class="msg '+cls+'">'+
      (m.role!=='user'?'<div class="msg-user">Claude</div>':'')+
      esc(m.content).replace(/\n/g,'<br/>')+
    '</div>';
  }).join('');
  el.scrollTop=el.scrollHeight;
}

async function sendClaude(text){
  var el=document.getElementById('chatMsgs');
  // Add user msg
  claudeHistory.push({role:'user',content:text});
  el.innerHTML+='<div class="msg me">'+esc(text)+'</div>';
  el.scrollTop=el.scrollHeight;

  // Typing indicator
  var typing=document.createElement('div');
  typing.className='msg ai';
  typing.style.opacity='0.4';
  typing.style.fontStyle='italic';
  typing.innerHTML='<div class="msg-user">Claude</div>thinking...';
  el.appendChild(typing);
  el.scrollTop=el.scrollHeight;

  try{
    var apiMsgs=claudeHistory.map(function(m){return{role:m.role==='user'?'user':'assistant',content:m.content};});
    var res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:'You are Claude, an AI assistant helping a small teen lifestyle brand called Stuflover. The team uses you for brainstorming, writing copy, planning features, design feedback, marketing ideas, and code help. Be helpful, creative, and concise. The brand aesthetic is warm, feminine, gen-z, fun. Keep responses practical and actionable.',
        messages:apiMsgs
      })
    });
    var data=await res.json();
    var reply=data.content&&data.content[0]?data.content[0].text:'hmm, try again?';
    typing.remove();
    claudeHistory.push({role:'assistant',content:reply});
    localStorage.setItem('collab_claude',JSON.stringify(claudeHistory.slice(-40)));
    el.innerHTML+='<div class="msg ai"><div class="msg-user">Claude</div>'+esc(reply).replace(/\n/g,'<br/>')+'</div>';
    el.scrollTop=el.scrollHeight;
  }catch(e){
    typing.remove();
    el.innerHTML+='<div class="msg ai" style="opacity:0.4;"><div class="msg-user">Claude</div>could not connect — try again</div>';
  }
}

// ─── TEAM SIDEBAR ───
async function loadTeamSidebar(){
  try{
    var data=await api('/api/collab/members');
    var el=document.getElementById('sidebarTeam');
    el.innerHTML=(data.members||[]).map(function(m){
      return '<div style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:0.78rem;">'+
        '<div style="width:6px;height:6px;border-radius:50%;background:#81c784;flex-shrink:0;"></div>'+
        '<span style="flex:1;opacity:0.6;">'+esc(m.email.split('@')[0])+'</span>'+
        (m.role==='owner'?'<span style="font-size:0.5rem;opacity:0.25;font-family:Barlow Condensed,sans-serif;font-weight:900;letter-spacing:1px;text-transform:uppercase;">owner</span>':
        (myRole==='owner'?'<button onclick="removeMember('+m.id+')" style="font-size:0.5rem;opacity:0.2;background:none;border:none;cursor:pointer;color:#c44;">x</button>':''))+
      '</div>';
    }).join('');
  }catch(e){}
}

async function grantAccess(){
  var email=document.getElementById('addEmail').value.trim();
  if(!email)return;
  await api('/api/collab/grant',{method:'POST',body:JSON.stringify({email:email})});
  document.getElementById('addEmail').value='';
  loadTeamSidebar();
}

async function removeMember(id){
  if(!confirm('Remove this member?'))return;
  await api('/api/collab/revoke/'+id,{method:'DELETE'});
  loadTeamSidebar();
}

init();
</script>
</body>
</html>
