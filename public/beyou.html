<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BeYou — Stuflover</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800;900&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Space Grotesk',sans-serif;overflow:hidden;height:100vh;transition:background 1.2s,color 1.2s;display:flex;flex-direction:column;}
    .bc{font-family:'Barlow Condensed',sans-serif;font-weight:900;text-transform:uppercase;letter-spacing:1px;}

    nav{position:fixed;top:0;width:100%;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 40px;backdrop-filter:blur(16px);border-bottom:1px solid rgba(128,128,128,0.06);transition:opacity 0.8s;}
    nav.hidden{opacity:0;pointer-events:none;}
    .nav-logo{font-size:1.6rem;letter-spacing:4px;text-decoration:none;}
    .nav-links{display:flex;gap:8px;}
    .nav-btn{font-size:0.75rem;letter-spacing:2px;text-decoration:none;padding:8px 16px;border-radius:4px;border:1.5px solid rgba(128,128,128,0.2);font-family:'Barlow Condensed',sans-serif;font-weight:900;text-transform:uppercase;transition:opacity 0.2s;background:transparent;color:inherit;}
    .nav-btn:hover{opacity:0.6;}

    /* ── MODE SELECTOR ── */
    .mode-bar{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);z-index:100;display:flex;gap:4px;padding:4px;border-radius:30px;backdrop-filter:blur(20px);transition:opacity 0.8s;}
    .mode-bar.hidden{opacity:0;pointer-events:none;}
    .mode-pill{padding:10px 24px;border-radius:26px;font-size:0.72rem;letter-spacing:2.5px;font-family:'Barlow Condensed',sans-serif;font-weight:900;text-transform:uppercase;cursor:pointer;border:none;background:transparent;color:inherit;transition:all 0.3s;opacity:0.5;}
    .mode-pill.on{opacity:1;}

    /* ── FULL SCREEN VIEWS ── */
    .view{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.8s;}
    .view.active{opacity:1;pointer-events:auto;}

    /* ── BREATHE VIEW ── */
    .breathe-container{display:flex;flex-direction:column;align-items:center;gap:40px;}
    .petal-wrap{position:relative;width:220px;height:220px;}
    .petal{position:absolute;width:70px;height:70px;border-radius:50%;opacity:0.55;transition:transform 4s cubic-bezier(0.4,0,0.2,1),opacity 4s ease;}
    .petal-wrap.inhale .petal{opacity:0.7;}
    .petal-wrap.exhale .petal{opacity:0.4;}
    .breathe-label{font-size:0.68rem;letter-spacing:5px;text-transform:uppercase;opacity:0.4;text-align:center;}
    .breathe-instruction{font-size:1.3rem;font-weight:300;text-align:center;min-height:40px;letter-spacing:0.5px;transition:opacity 0.6s;}
    .breathe-timer{font-size:0.78rem;opacity:0.3;letter-spacing:2px;text-align:center;}
    .breathe-start{padding:14px 44px;border:none;border-radius:30px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.88rem;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all 0.3s;opacity:0.9;}
    .breathe-start:hover{opacity:1;transform:scale(1.03);}
    .duration-row{display:flex;gap:8px;align-items:center;}
    .dur-btn{padding:8px 16px;border-radius:20px;font-size:0.68rem;letter-spacing:2px;font-family:'Barlow Condensed',sans-serif;font-weight:900;text-transform:uppercase;cursor:pointer;border:1.5px solid rgba(128,128,128,0.15);background:transparent;color:inherit;transition:all 0.2s;opacity:0.4;}
    .dur-btn.on{opacity:1;}

    /* ── REFLECT VIEW ── */
    .reflect-container{display:flex;flex-direction:column;align-items:center;gap:36px;padding:0 40px;max-width:520px;}
    .reflect-orb{width:120px;height:120px;border-radius:50%;opacity:0.25;animation:orbPulse 6s ease-in-out infinite;}
    @keyframes orbPulse{0%,100%{transform:scale(1);opacity:0.2;}50%{transform:scale(1.15);opacity:0.35;}}
    .reflect-prompt{font-size:clamp(1.4rem,3.5vw,2rem);font-weight:300;text-align:center;line-height:1.55;letter-spacing:0.3px;transition:opacity 0.6s;}
    .reflect-prompt.fade{opacity:0;}
    .reflect-sub{font-size:0.78rem;opacity:0.3;text-align:center;letter-spacing:1px;line-height:1.8;}
    .reflect-next{padding:12px 36px;border:none;border-radius:26px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.8rem;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all 0.3s;opacity:0.7;}
    .reflect-next:hover{opacity:1;}

    /* ── COMPLETE VIEW (after breathing session) ── */
    .complete-container{display:flex;flex-direction:column;align-items:center;gap:24px;padding:0 40px;text-align:center;}
    .complete-check{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;opacity:0.6;}
    .complete-title{font-size:1.6rem;font-weight:300;letter-spacing:0.5px;}
    .complete-stat{font-size:0.82rem;opacity:0.35;letter-spacing:1px;}
    .complete-btn{padding:12px 36px;border:none;border-radius:26px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.8rem;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:opacity 0.3s;opacity:0.7;margin-top:10px;}
    .complete-btn:hover{opacity:1;}

    @media(max-width:680px){
      nav{padding:13px 20px;}
      .petal-wrap{width:180px;height:180px;}
      .petal{width:56px;height:56px;}
    }
  </style>
</head>
<body>

<nav id="mainNav">
  <a class="nav-logo bc" href="lifestyle.html">Stuflover</a>
  <div class="nav-links">
    <a class="nav-btn bc" href="lifestyle.html">My Page</a>
    <a class="nav-btn bc" href="fitforit.html">FitforIt</a>
  </div>
</nav>

<!-- BREATHE -->
<div class="view active" id="breatheView">
  <div class="breathe-container">
    <div class="breathe-label bc" id="breatheLabel">Breathe</div>
    <div class="petal-wrap" id="petalWrap"></div>
    <div class="breathe-instruction" id="breatheInstruction">Take a moment for yourself</div>
    <div class="breathe-timer" id="breatheTimer"></div>
    <div class="duration-row" id="durationRow">
      <button class="dur-btn bc" data-dur="64" onclick="setDuration(64,this)">1 min</button>
      <button class="dur-btn bc on" data-dur="176" onclick="setDuration(176,this)">3 min</button>
      <button class="dur-btn bc" data-dur="304" onclick="setDuration(304,this)">5 min</button>
    </div>
    <button class="breathe-start bc" id="breatheStartBtn" onclick="startBreathe()">Begin</button>
  </div>
</div>

<!-- REFLECT -->
<div class="view" id="reflectView">
  <div class="reflect-container">
    <div class="reflect-orb" id="reflectOrb"></div>
    <div class="reflect-prompt" id="reflectPrompt"></div>
    <div class="reflect-sub">sit with this for a moment</div>
    <button class="reflect-next bc" id="reflectNextBtn" onclick="nextReflect()">Next</button>
  </div>
</div>

<!-- COMPLETE -->
<div class="view" id="completeView">
  <div class="complete-container">
    <div class="complete-check" id="completeCheck"></div>
    <div class="complete-title" id="completeTitle">Well done</div>
    <div class="complete-stat" id="completeStat"></div>
    <button class="complete-btn bc" onclick="resetBreathe()">Again</button>
    <button class="complete-btn bc" onclick="switchMode('reflect')" style="background:transparent !important;border:1.5px solid rgba(128,128,128,0.15)">Reflect</button>
  </div>
</div>

<!-- MODE BAR -->
<div class="mode-bar" id="modeBar">
  <button class="mode-pill bc on" id="pillBreathe" onclick="switchMode('breathe')">Breathe</button>
  <button class="mode-pill bc" id="pillReflect" onclick="switchMode('reflect')">Reflect</button>
</div>

<script src="/stuflover-config.js"></script>
<script src="/stuflover-backend.js"></script>
<script>

// ─── PROFILE ─────────────────────────────────────────────
var profile = (function(){ try{ return JSON.parse(localStorage.getItem('stuflover_profile')||'null'); }catch(e){return null;} })();

function resolvePalette(){
  var fc=profile&&profile.faveColour; var ae=(profile&&profile.aesthetics)||{};
  var top=Object.entries(ae).sort(function(a,b){return b[1]-a[1];})[0];
  top=top?top[0]:'softgirl';
  if(fc&&!fc.dark) return {bg:lightenH(fc.hex,0.92),tx:darkenH(fc.hex,0.6),ac:fc.hex};
  if(fc&&fc.dark) return {bg:darkenH(fc.hex,0.45),tx:lightenH(fc.hex,0.8),ac:fc.hex};
  var m={kawaii:{bg:'#fdf0f5',tx:'#3d0020',ac:'#ff80ab'},softgirl:{bg:'#fce4ec',tx:'#2d0814',ac:'#e8829a'},cleangirl:{bg:'#f5f0ea',tx:'#1a1408',ac:'#8a7a5a'},coquette:{bg:'#fdf0f5',tx:'#280010',ac:'#e06080'},goth:{bg:'#0e060e',tx:'#e8d0f0',ac:'#9040c0'},darkacad:{bg:'#100e08',tx:'#e8d8a8',ac:'#c4a438'},grunge:{bg:'#1a1008',tx:'#f0d4a0',ac:'#c4943a'},y2k:{bg:'#f0c8ec',tx:'#1a0028',ac:'#c03ab0'},street:{bg:'#111111',tx:'#f4c8a0',ac:'#e08040'},cottage:{bg:'#d8ecc4',tx:'#0e2008',ac:'#4a8a2a'},hippie:{bg:'#d8cc88',tx:'#1a1400',ac:'#8a7000'},oldmoney:{bg:'#e8e0d0',tx:'#1a140a',ac:'#7a6840'},preppy:{bg:'#e8f0fc',tx:'#0a1840',ac:'#3060c0'},tomato:{bg:'#e8c498',tx:'#1e0800',ac:'#c46418'},indie:{bg:'#1a1030',tx:'#d8ccf8',ac:'#9070e0'},emo:{bg:'#0a0810',tx:'#e0d0f8',ac:'#7858d0'}};
  return m[top]||{bg:'#f9c4c4',tx:'#1e0c06',ac:'#c4522a'};
}
function toHex(v){var h=Math.round(Math.max(0,Math.min(255,v))).toString(16);return h.length<2?'0'+h:h;}
function lightenH(hex,a){try{var c=hex.slice(1).match(/.{2}/g).map(function(x){return parseInt(x,16);});return'#'+toHex(c[0]+(255-c[0])*a)+toHex(c[1]+(255-c[1])*a)+toHex(c[2]+(255-c[2])*a);}catch(e){return hex;}}
function darkenH(hex,a){try{var c=hex.slice(1).match(/.{2}/g).map(function(x){return parseInt(x,16);});return'#'+toHex(c[0]*(1-a))+toHex(c[1]*(1-a))+toHex(c[2]*(1-a));}catch(e){return hex;}}

function resolveAeName(){
  if(!profile) return 'You';
  var ae=profile.aesthetics||{};
  var top=Object.entries(ae).sort(function(a,b){return b[1]-a[1];})[0];
  top=top?top[0]:'';
  var m={kawaii:'Kawaii',softgirl:'Soft Girl',cleangirl:'Clean Girl',coquette:'Coquette',goth:'Goth',darkacad:'Dark Academia',grunge:'Grunge',y2k:'Y2K',street:'Streetwear',cottage:'Cottagecore',hippie:'Hippie',oldmoney:'Old Money',preppy:'Preppy',tomato:'Tomato Girl',indie:'Indie Alt',emo:'Emo'};
  return m[top]||'You';
}

var PAL = resolvePalette();
var aeName = resolveAeName();

// ─── PETALS ──────────────────────────────────────────────
var PETAL_COUNT = 7;
var petalEls = [];

function createPetals(){
  var wrap = document.getElementById('petalWrap');
  var cx = wrap.offsetWidth/2;
  var cy = wrap.offsetHeight/2;
  var petalW = wrap.offsetWidth < 200 ? 56 : 70;
  for(var i=0; i<PETAL_COUNT; i++){
    var el = document.createElement('div');
    el.className = 'petal';
    el.style.width = petalW+'px';
    el.style.height = petalW+'px';
    el.style.background = PAL.ac;
    el.style.left = (cx - petalW/2) + 'px';
    el.style.top = (cy - petalW/2) + 'px';
    el.style.transform = 'translate(0,0) scale(0.6)';
    wrap.appendChild(el);
    petalEls.push(el);
  }
  // Add center circle
  var center = document.createElement('div');
  center.style.cssText = 'position:absolute;width:'+Math.round(petalW*0.7)+'px;height:'+Math.round(petalW*0.7)+'px;border-radius:50%;background:'+PAL.ac+';opacity:0.5;left:'+(cx-petalW*0.35)+'px;top:'+(cy-petalW*0.35)+'px;transition:transform 4s cubic-bezier(0.4,0,0.2,1),opacity 4s ease;z-index:2;';
  center.id = 'petalCenter';
  wrap.appendChild(center);
  petalEls.push(center);
}

function setPetalState(state){
  var wrap = document.getElementById('petalWrap');
  var cx = wrap.offsetWidth/2;
  var cy = wrap.offsetHeight/2;
  var radius = state==='expand' ? (wrap.offsetWidth*0.34) : 0;
  var scale = state==='expand' ? 1 : 0.6;
  var centerScale = state==='expand' ? 1.15 : 0.8;

  wrap.className = 'petal-wrap ' + (state==='expand'?'inhale':'exhale');

  for(var i=0; i<PETAL_COUNT; i++){
    var angle = (i / PETAL_COUNT) * Math.PI * 2 - Math.PI/2;
    var tx = Math.cos(angle) * radius;
    var ty = Math.sin(angle) * radius;
    petalEls[i].style.transform = 'translate('+tx+'px,'+ty+'px) scale('+scale+')';
  }
  // Center circle
  var center = document.getElementById('petalCenter');
  if(center) center.style.transform = 'scale('+centerScale+')';
}

// ─── BREATHING SESSION ───────────────────────────────────
var breatheDuration = 176; // seconds (11 cycles of 16s)
var breatheRunning = false;
var breatheTimeout = null;
var breatheElapsed = 0;

function setDuration(sec, el){
  breatheDuration = sec;
  document.querySelectorAll('.dur-btn').forEach(function(b){b.classList.remove('on');});
  el.classList.add('on');
}

function startBreathe(){
  breatheRunning = true;
  breatheElapsed = 0;
  document.getElementById('breatheStartBtn').style.display = 'none';
  document.getElementById('durationRow').style.display = 'none';
  document.getElementById('breatheTimer').textContent = formatTime(breatheDuration);
  document.getElementById('modeBar').classList.add('hidden');
  document.getElementById('mainNav').classList.add('hidden');
  breatheCycle();
}

function breatheCycle(){
  if(!breatheRunning) return;
  if(breatheElapsed >= breatheDuration){ finishBreathe(); return; }

  // Inhale (4s)
  var inst = document.getElementById('breatheInstruction');
  inst.textContent = 'Breathe In';
  setPetalState('expand');

  breatheTimeout = setTimeout(function(){
    if(!breatheRunning) return;
    // Hold (4s at top)
    inst.textContent = 'Hold';
    breatheTimeout = setTimeout(function(){
      if(!breatheRunning) return;
      // Exhale (4s)
      inst.textContent = 'Breathe Out';
      setPetalState('contract');
      breatheTimeout = setTimeout(function(){
        if(!breatheRunning) return;
        // Hold (4s at bottom)
        inst.textContent = 'Hold';
        breatheTimeout = setTimeout(function(){
          breatheElapsed += 16;
          var remaining = Math.max(0, breatheDuration - breatheElapsed);
          var timerEl = document.getElementById('breatheTimer');
          if(timerEl) timerEl.textContent = formatTime(remaining);
          breatheCycle();
        }, 4000);
      }, 4000);
    }, 4000);
  }, 4000);
}

function finishBreathe(){
  breatheRunning = false;
  var mins = Math.round(breatheDuration/60);
  document.getElementById('completeTitle').textContent = 'Well done';
  document.getElementById('completeStat').textContent = mins + ' minute' + (mins>1?'s':'') + ' of mindful breathing';
  document.getElementById('completeCheck').textContent = '\u2713';
  document.getElementById('completeCheck').style.background = PAL.ac + '30';
  document.getElementById('completeCheck').style.color = PAL.ac;
  var btns = document.querySelectorAll('.complete-btn');
  btns[0].style.background = PAL.ac;
  btns[0].style.color = PAL.bg;
  btns[1].style.color = PAL.tx;

  showView('completeView');
  document.getElementById('modeBar').classList.remove('hidden');
  document.getElementById('mainNav').classList.remove('hidden');
}

function resetBreathe(){
  breatheRunning = false;
  clearTimeout(breatheTimeout);
  breatheElapsed = 0;
  setPetalState('contract');
  document.getElementById('breatheInstruction').textContent = 'Take a moment for yourself';
  document.getElementById('breatheTimer').textContent = '';
  document.getElementById('breatheStartBtn').style.display = '';
  document.getElementById('durationRow').style.display = '';
  document.getElementById('modeBar').classList.remove('hidden');
  document.getElementById('mainNav').classList.remove('hidden');
  showView('breatheView');
}

function formatTime(s){
  var m = Math.floor(s/60);
  var sec = s%60;
  return m + ':' + (sec<10?'0':'') + sec;
}

// ─── REFLECT ─────────────────────────────────────────────
var REFLECT_BASE = [
  'What is one thing you are grateful for right now?',
  'Think of someone who made you smile recently.',
  'What is something about yourself that you appreciate?',
  'Recall a moment today when you felt at peace.',
  'What is one kind thing you did for yourself recently?',
  'Think of a place where you feel completely safe.',
  'What is a quality in yourself that you are proud of?',
  'Remember a time you overcame something difficult.',
  'What is one thing you are looking forward to?',
  'Think about what makes you feel most like yourself.',
  'What would you tell your younger self right now?',
  'What does rest look like for you?',
  'Name something beautiful you noticed today.',
  'What is a boundary you are glad you set?',
  'Think of a song that makes you feel understood.',
];

var REFLECT_AE = {
  kawaii: ['What small, cute thing brought you joy today?','Think about what makes you feel soft and safe.','What is something sweet you could do for yourself right now?'],
  softgirl: ['What makes you feel gentle and at ease?','Think of a colour or texture that calms you.','What does your softest, most peaceful day look like?'],
  cleangirl: ['What does your ideal morning feel like?','Think of a routine that makes you feel grounded.','What is one thing you did today that was just for you?'],
  coquette: ['What makes you feel beautiful without trying?','Think of a moment you felt effortlessly confident.','What is something romantic about your everyday life?'],
  goth: ['What is something dark or intense that actually brings you comfort?','Think about the beauty in something others might overlook.','What does your inner world look like right now?'],
  darkacad: ['What is something you learned recently that changed how you think?','Think of a book, idea, or conversation that moved you.','What does intellectual peace feel like to you?'],
  grunge: ['What is something raw and honest you have been avoiding?','Think of a song that captures exactly how you feel.','When do you feel most authentically yourself?'],
  y2k: ['What is something playful or fun you did recently?','Think of a memory that makes you feel nostalgic in a good way.','What does your most vibrant, alive self look like?'],
  street: ['What gives you confidence without you having to try?','Think of a time you trusted your instincts and it paid off.','What does freedom feel like to you?'],
  cottage: ['What is a simple pleasure you enjoyed today?','Think of a natural thing — a tree, the sky, rain — that grounded you.','What does your most peaceful, slow life look like?'],
  hippie: ['What is something you believe in deeply?','Think of a time you felt truly connected to the world around you.','What does inner peace mean to you today?'],
  oldmoney: ['What is a tradition or habit that brings you comfort?','Think of something timeless that you value about yourself.','What does elegance in rest look like for you?'],
  preppy: ['What is something you accomplished that you have not celebrated yet?','Think of a goal you are quietly working toward.','What does success feel like beyond achievement?'],
  tomato: ['What is something warm and vibrant about your life right now?','Think of a moment you felt truly alive today.','What does joy without effort look like for you?'],
  indie: ['What is something only you would notice or appreciate?','Think of an artist, song, or film that feels like your inner world.','When do you feel most creatively alive?'],
  emo: ['What is a feeling you have been sitting with lately?','Think of something that hurt but also taught you something real.','What does emotional honesty look like for you right now?'],
};

var reflectPrompts = [];
var reflectIdx = 0;

function initReflect(){
  var topAe = Object.entries((profile&&profile.aesthetics)||{}).sort(function(a,b){return b[1]-a[1];})[0];
  topAe = topAe ? topAe[0] : '';
  var aePrompts = REFLECT_AE[topAe] || [];
  reflectPrompts = aePrompts.concat(REFLECT_BASE);
  // Shuffle
  for(var i=reflectPrompts.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var tmp=reflectPrompts[i]; reflectPrompts[i]=reflectPrompts[j]; reflectPrompts[j]=tmp;
  }
  reflectIdx = 0;
  showReflectPrompt();
}

function showReflectPrompt(){
  var el = document.getElementById('reflectPrompt');
  el.classList.add('fade');
  setTimeout(function(){
    el.textContent = reflectPrompts[reflectIdx % reflectPrompts.length];
    el.classList.remove('fade');
  }, 300);
}

function nextReflect(){
  reflectIdx++;
  showReflectPrompt();
}

// ─── VIEW SWITCHING ──────────────────────────────────────
function showView(id){
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active');});
  document.getElementById(id).classList.add('active');
}

function switchMode(mode){
  // Stop any running breathing
  if(mode !== 'breathe' && breatheRunning){
    breatheRunning = false;
    clearTimeout(breatheTimeout);
  }

  document.getElementById('pillBreathe').classList.toggle('on', mode==='breathe');
  document.getElementById('pillReflect').classList.toggle('on', mode==='reflect');

  if(mode==='breathe'){
    resetBreathe();
  } else {
    showView('reflectView');
  }

  document.getElementById('modeBar').classList.remove('hidden');
  document.getElementById('mainNav').classList.remove('hidden');
}

// ─── APPLY STYLES ────────────────────────────────────────
function applyStyles(){
  document.body.style.background = PAL.bg;
  document.body.style.color = PAL.tx;

  var nav = document.getElementById('mainNav');
  nav.style.background = PAL.bg + 'f0';
  nav.style.borderColor = PAL.tx + '08';
  document.querySelectorAll('.nav-logo,.nav-btn').forEach(function(el){
    el.style.color = PAL.tx;
    el.style.borderColor = PAL.tx + '18';
  });

  // Breathe
  document.getElementById('breatheStartBtn').style.background = PAL.ac;
  document.getElementById('breatheStartBtn').style.color = PAL.bg;
  document.querySelectorAll('.dur-btn').forEach(function(b){
    b.style.borderColor = PAL.tx + '18';
    b.style.color = PAL.tx;
  });

  // Mode bar
  var modeBar = document.getElementById('modeBar');
  modeBar.style.background = PAL.tx + '10';
  document.querySelectorAll('.mode-pill').forEach(function(p){ p.style.color = PAL.tx; });

  // Reflect
  document.getElementById('reflectOrb').style.background = PAL.ac;
  document.getElementById('reflectNextBtn').style.background = PAL.ac + '25';
  document.getElementById('reflectNextBtn').style.color = PAL.tx;
}

// ─── INIT ────────────────────────────────────────────────
applyStyles();
createPetals();
setPetalState('contract');
initReflect();

</script>

</body>
</html>
