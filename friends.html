<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Friends — Stuflover</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800;900&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Space Grotesk',sans-serif;overflow:hidden;height:100vh;transition:background 0.5s,color 0.5s;}
    .bc{font-family:'Barlow Condensed',sans-serif;font-weight:900;text-transform:uppercase;letter-spacing:1px;}

    /* ── LAYOUT ── */
    .app{display:grid;grid-template-columns:280px 1fr 320px;height:100vh;}

    /* ── LEFT: CONTACTS ── */
    .contacts-panel{display:flex;flex-direction:column;border-right:1px solid rgba(128,128,128,0.1);overflow:hidden;}
    .contacts-header{padding:18px 20px 14px;border-bottom:1px solid rgba(128,128,128,0.08);display:flex;align-items:center;justify-content:space-between;}
    .contacts-title{font-size:1rem;font-weight:700;letter-spacing:-0.2px;}
    .new-chat-btn{width:30px;height:30px;border-radius:50%;border:1.5px solid rgba(128,128,128,0.2);background:transparent;color:inherit;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity 0.15s;}
    .new-chat-btn:hover{opacity:0.6;}
    .contacts-search{padding:10px 16px;border-bottom:1px solid rgba(128,128,128,0.06);}
    .contacts-search input{width:100%;padding:8px 12px;border-radius:20px;border:1.5px solid rgba(128,128,128,0.14);background:rgba(128,128,128,0.06);color:inherit;font-family:'Space Grotesk',sans-serif;font-size:0.82rem;outline:none;}
    .contacts-search input::placeholder{opacity:0.35;}
    .contacts-list{flex:1;overflow-y:auto;}
    .contact-item{padding:12px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background 0.12s;border-bottom:1px solid rgba(128,128,128,0.04);}
    .contact-item:hover,.contact-item.active{background:rgba(128,128,128,0.08);}
    .contact-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1rem;flex-shrink:0;color:white;}
    .contact-info{flex:1;min-width:0;}
    .contact-name{font-size:0.9rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .contact-preview{font-size:0.75rem;opacity:0.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
    .contact-time{font-size:0.68rem;opacity:0.3;flex-shrink:0;}
    .contact-unread{width:18px;height:18px;border-radius:50%;font-size:0.65rem;font-family:'Barlow Condensed',sans-serif;font-weight:900;display:flex;align-items:center;justify-content:center;color:white;flex-shrink:0;}

    /* ── MIDDLE: CHAT ── */
    .chat-panel{display:flex;flex-direction:column;overflow:hidden;}
    .chat-header{padding:16px 20px;border-bottom:1px solid rgba(128,128,128,0.08);display:flex;align-items:center;gap:12px;}
    .chat-header-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.9rem;flex-shrink:0;color:white;}
    .chat-header-name{font-size:0.95rem;font-weight:700;}
    .chat-header-status{font-size:0.72rem;opacity:0.4;margin-top:1px;}
    .chat-header-actions{margin-left:auto;display:flex;gap:6px;}
    .header-action-btn{padding:7px 14px;border-radius:4px;border:1.5px solid rgba(128,128,128,0.18);background:transparent;color:inherit;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.68rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:opacity 0.15s;}
    .header-action-btn:hover{opacity:0.6;}

    .chat-msgs{flex:1;overflow-y:auto;padding:20px 20px 12px;display:flex;flex-direction:column;gap:8px;}
    .chat-date{font-size:0.68rem;opacity:0.3;text-align:center;margin:8px 0;letter-spacing:1px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;font-weight:900;}

    .bubble-wrap{display:flex;flex-direction:column;max-width:72%;}
    .bubble-wrap.me{align-self:flex-end;align-items:flex-end;}
    .bubble-wrap.them{align-self:flex-start;align-items:flex-start;}
    .bubble{padding:10px 14px;border-radius:18px;font-size:0.9rem;line-height:1.55;word-break:break-word;}
    .bubble-wrap.me .bubble{border-bottom-right-radius:4px;}
    .bubble-wrap.them .bubble{border-bottom-left-radius:4px;}
    .bubble-time{font-size:0.65rem;opacity:0.28;margin-top:3px;}

    /* Flovee suggestion bubble */
    .flovee-suggestion{align-self:stretch;border-radius:10px;padding:12px 14px;margin:4px 0;border:1.5px dashed rgba(128,128,128,0.2);display:flex;align-items:flex-start;gap:10px;}
    .flovee-suggestion-label{font-size:0.58rem;letter-spacing:3px;text-transform:uppercase;opacity:0.35;margin-bottom:4px;font-family:'Barlow Condensed',sans-serif;font-weight:900;}
    .flovee-suggestion-text{font-size:0.85rem;line-height:1.6;flex:1;}
    .flovee-suggestion-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
    .sug-btn{padding:6px 14px;border-radius:4px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.68rem;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;border:none;transition:opacity 0.15s;}
    .sug-btn:hover{opacity:0.75;}
    .sug-btn.use{color:white;}
    .sug-btn.skip{background:transparent;border:1.5px solid rgba(128,128,128,0.2);}

    .chat-input-area{border-top:1px solid rgba(128,128,128,0.08);padding:12px 16px;}
    .draft-row{display:flex;align-items:flex-end;gap:8px;}
    .chat-textarea{flex:1;padding:11px 16px;font-size:0.92rem;font-family:'Space Grotesk',sans-serif;border:1.5px solid rgba(128,128,128,0.14);border-radius:22px;background:rgba(128,128,128,0.04);color:inherit;outline:none;resize:none;min-height:44px;max-height:120px;line-height:1.5;transition:border-color 0.2s;}
    .chat-textarea:focus{border-color:rgba(128,128,128,0.32);}
    .send-btn{width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;transition:opacity 0.15s;}
    .send-btn:hover{opacity:0.75;}
    .flovee-help-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
    .help-chip{padding:5px 12px;border-radius:20px;font-size:0.7rem;letter-spacing:1px;font-family:'Barlow Condensed',sans-serif;font-weight:900;text-transform:uppercase;cursor:pointer;border:1.5px solid rgba(128,128,128,0.16);background:transparent;color:inherit;transition:all 0.12s;}
    .help-chip:hover{background:rgba(128,128,128,0.1);}

    .no-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0.25;gap:12px;text-align:center;padding:40px;}
    .no-chat-icon{font-size:3rem;opacity:0.4;}
    .no-chat-title{font-size:1.2rem;font-weight:700;}
    .no-chat-sub{font-size:0.85rem;line-height:1.7;}

    /* ── RIGHT: FLOVEE PANEL ── */
    .flovee-panel{border-left:1px solid rgba(128,128,128,0.1);display:flex;flex-direction:column;overflow:hidden;}
    .flovee-header{padding:16px 20px 14px;border-bottom:1px solid rgba(128,128,128,0.08);}
    .flovee-header-name{font-size:0.95rem;font-weight:700;display:flex;align-items:center;gap:8px;}
    .flovee-pulse{width:7px;height:7px;border-radius:50%;animation:pulse 2s ease-in-out infinite;flex-shrink:0;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
    .flovee-header-sub{font-size:0.72rem;opacity:0.38;margin-top:2px;}
    .flovee-body{flex:1;overflow-y:auto;padding:16px;}
    .flovee-section{margin-bottom:20px;}
    .flovee-section-label{font-size:0.58rem;letter-spacing:4px;text-transform:uppercase;opacity:0.28;margin-bottom:10px;font-family:'Barlow Condensed',sans-serif;font-weight:900;}
    .flovee-card{border-radius:8px;padding:14px 16px;border:1.5px solid rgba(128,128,128,0.1);margin-bottom:8px;}
    .flovee-card-title{font-size:0.82rem;font-weight:700;margin-bottom:4px;}
    .flovee-card-text{font-size:0.78rem;opacity:0.55;line-height:1.65;}
    .flovee-advice{font-size:0.85rem;line-height:1.72;opacity:0.7;font-style:italic;padding:12px 14px;border-radius:8px;border-left:3px solid rgba(128,128,128,0.2);}
    .vibe-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
    .vibe-chip{padding:5px 12px;border-radius:20px;font-size:0.7rem;letter-spacing:1px;font-family:'Barlow Condensed',sans-serif;font-weight:900;text-transform:uppercase;cursor:pointer;border:1.5px solid rgba(128,128,128,0.16);background:transparent;color:inherit;transition:all 0.12s;}
    .vibe-chip:hover{background:rgba(128,128,128,0.08);}
    .vibe-chip.on{border-color:currentColor;}

    /* ── ADD CONTACT MODAL ── */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);backdrop-filter:blur(4px);z-index:500;display:none;align-items:center;justify-content:center;}
    .modal-overlay.open{display:flex;}
    .modal{width:360px;border-radius:12px;padding:28px;display:flex;flex-direction:column;gap:16px;}
    .modal-title{font-size:1.2rem;font-weight:700;margin-bottom:4px;}
    .modal-input{width:100%;padding:11px 14px;font-size:0.92rem;font-family:'Space Grotesk',sans-serif;border:1.5px solid rgba(128,128,128,0.18);border-radius:8px;background:rgba(128,128,128,0.04);color:inherit;outline:none;transition:border-color 0.2s;}
    .modal-input:focus{border-color:rgba(128,128,128,0.38);}
    .modal-actions{display:flex;gap:8px;}
    .modal-btn{flex:1;padding:11px;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.85rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border:none;transition:opacity 0.15s;}
    .modal-btn:hover{opacity:0.75;}
    .modal-btn.cancel{background:transparent;border:1.5px solid rgba(128,128,128,0.2);}

    /* emoji colours for avatars */
    @media(max-width:900px){
      .app{grid-template-columns:60px 1fr;}
      .contacts-panel .contacts-header .contacts-title,
      .contacts-panel .contacts-search,
      .contact-info,.contact-time,.contact-unread{display:none;}
      .contact-item{padding:10px;justify-content:center;}
      .flovee-panel{display:none;}
    }
    @media(max-width:600px){
      .app{grid-template-columns:1fr;}
      .contacts-panel{display:none;}
    }
  </style>
</head>
<body>

<div class="app" id="app">

  <!-- CONTACTS -->
  <div class="contacts-panel" id="contactsPanel">
    <div class="contacts-header">
      <div class="contacts-title">Friends</div>
      <button class="new-chat-btn bc" onclick="openAddModal()" title="Add friend">+</button>
    </div>
    <div class="contacts-search">
      <input id="searchInput" placeholder="Search..." oninput="filterContacts(this.value)"/>
    </div>
    <div class="contacts-list" id="contactsList"></div>
  </div>

  <!-- CHAT -->
  <div class="chat-panel" id="chatPanel">
    <div class="no-chat" id="noChatState">
      <div class="no-chat-icon">...</div>
      <div class="no-chat-title bc">Select a conversation</div>
      <div class="no-chat-sub">Pick a friend from the left or add a new one to start chatting</div>
    </div>
    <div id="activeChatState" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
      <div class="chat-header" id="chatHeader"></div>
      <div class="chat-msgs" id="chatMsgs"></div>
      <div class="chat-input-area">
        <div class="draft-row">
          <textarea class="chat-textarea" id="chatInput" placeholder="Message..." rows="1"
            oninput="autoResize(this);onTyping()"
            onkeydown="handleMsgKey(event)"></textarea>
          <button class="send-btn bc" id="sendBtn" onclick="sendMessage()">-></button>
        </div>
        <div class="flovee-help-row" id="helpChips"></div>
      </div>
    </div>
  </div>

  <!-- FLOVEE PANEL -->
  <div class="flovee-panel" id="floveePanel">
    <div class="flovee-header">
      <div class="flovee-header-name">
        <div class="flovee-pulse" id="floveePulse"></div>
        <span id="floveeNameEl">Flovee</span>
      </div>
      <div class="flovee-header-sub">helping you stay cool</div>
    </div>
    <div class="flovee-body" id="floveeBody">
      <div class="flovee-advice" id="floveeWelcome" style="border-left-color:rgba(128,128,128,0.2)">
        Select a conversation and start chatting. I will help you respond.
      </div>
    </div>
  </div>
</div>

<!-- ADD CONTACT MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal" id="modalBox">
    <div class="modal-title bc">Add a Friend</div>
    <input class="modal-input" id="nameInput" placeholder="Their name..." maxlength="30"
      onkeydown="if(event.key==='Enter') saveContact()"/>
    <div style="display:flex;flex-direction:column;gap:6px;">
      <div style="font-size:0.62rem;letter-spacing:4px;text-transform:uppercase;opacity:0.3;font-family:Barlow Condensed,sans-serif;font-weight:900;">Relationship</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;" id="relChips">
        <button class="help-chip on" data-rel="bestie" onclick="pickRel(this)">Bestie</button>
        <button class="help-chip" data-rel="close friend" onclick="pickRel(this)">Close friend</button>
        <button class="help-chip" data-rel="group friend" onclick="pickRel(this)">Group friend</button>
        <button class="help-chip" data-rel="situationship" onclick="pickRel(this)">Situationship</button>
        <button class="help-chip" data-rel="acquaintance" onclick="pickRel(this)">Acquaintance</button>
        <button class="help-chip" data-rel="complicated" onclick="pickRel(this)">Complicated</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn bc cancel" id="cancelBtn" onclick="closeAddModal()">Cancel</button>
      <button class="modal-btn bc" id="saveBtn" onclick="saveContact()">Add</button>
    </div>
  </div>
</div>

<!-- API KEY BANNER -->
<div id="apiBanner" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:9999;padding:14px 24px;align-items:center;gap:12px;backdrop-filter:blur(16px);border-top:1px solid rgba(128,128,128,0.12);">
  <span style="font-size:0.72rem;letter-spacing:2px;text-transform:uppercase;font-family:Barlow Condensed,sans-serif;font-weight:900;opacity:0.5;white-space:nowrap">Anthropic Key</span>
  <input id="apiKeyInput" type="password" placeholder="sk-ant-..." style="flex:1;padding:8px 14px;font-size:0.85rem;font-family:Space Grotesk,sans-serif;border:1.5px solid rgba(128,128,128,0.2);border-radius:6px;background:rgba(128,128,128,0.06);color:inherit;outline:none;"/>
  <button onclick="saveApiKey()" style="padding:8px 20px;border:none;border-radius:6px;font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:0.8rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;background:#c4522a;color:white;">Save</button>
  <a href="https://console.anthropic.com" target="_blank" style="font-size:0.7rem;opacity:0.4;white-space:nowrap;color:inherit;text-decoration:none;">Get a key</a>
</div>

<script>
// ─── API KEY ──────────────────────────────────────────────
function getApiKey(){ return localStorage.getItem('stuflover_api_key')||''; }
function saveApiKey(){
  const val=document.getElementById('apiKeyInput')?.value.trim();
  if(!val) return;
  localStorage.setItem('stuflover_api_key',val);
  document.getElementById('apiBanner').style.display='none';
  window.location.reload();
}
const _origFetch=window.fetch;
window.fetch=function(url,opts){
  if(typeof url==='string'&&url.includes('anthropic.com')){
    opts=opts||{}; opts.headers=Object.assign({},opts.headers,{'x-api-key':getApiKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true','Content-Type':'application/json'});
  }
  return _origFetch.call(this,url,opts);
};

// ─── PROFILE + PALETTE ────────────────────────────────────
const profile=(()=>{try{return JSON.parse(localStorage.getItem('stuflover_profile')||'null');}catch(e){return null;}})();
function lightenH(hex,a){try{const[r,g,b]=hex.slice(1).match(/.{2}/g).map(x=>parseInt(x,16));const l=v=>Math.round(v+(255-v)*a);return`rgb(${l(r)},${l(g)},${l(b)})`;}catch(e){return hex;}}
function darkenH(hex,a){try{const[r,g,b]=hex.slice(1).match(/.{2}/g).map(x=>parseInt(x,16));const d=v=>Math.round(v*(1-a));return`rgb(${d(r)},${d(g)},${d(b)})`;}catch(e){return hex;}}
function resolvePalette(){
  const fc=profile?.faveColour;const ae=profile?.aesthetics||{};
  const top=Object.entries(ae).sort((a,b)=>b[1]-a[1])[0]?.[0]||'softgirl';
  if(fc&&!fc.dark)return{bg:lightenH(fc.hex,0.88),tx:darkenH(fc.hex,0.55),ac:fc.hex};
  if(fc&&fc.dark)return{bg:darkenH(fc.hex,0.35),tx:lightenH(fc.hex,0.75),ac:fc.hex};
  const m={kawaii:{bg:'#fff0f5',tx:'#3d0020',ac:'#ff80ab'},softgirl:{bg:'#fce4ec',tx:'#2d0814',ac:'#e8829a'},cleangirl:{bg:'#f5f0ea',tx:'#1a1408',ac:'#8a7a5a'},coquette:{bg:'#fdf0f5',tx:'#280010',ac:'#e06080'},goth:{bg:'#0e060e',tx:'#e8d0f0',ac:'#9040c0'},darkacad:{bg:'#100e08',tx:'#e8d8a8',ac:'#c4a438'},grunge:{bg:'#1a1008',tx:'#f0d4a0',ac:'#c4943a'},y2k:{bg:'#f0c8ec',tx:'#1a0028',ac:'#c03ab0'},street:{bg:'#111111',tx:'#f4c8a0',ac:'#e08040'},cottage:{bg:'#d8ecc4',tx:'#0e2008',ac:'#4a8a2a'},hippie:{bg:'#d8cc88',tx:'#1a1400',ac:'#8a7000'},oldmoney:{bg:'#e8e0d0',tx:'#1a140a',ac:'#7a6840'},preppy:{bg:'#e8f0fc',tx:'#0a1840',ac:'#3060c0'},tomato:{bg:'#e8c498',tx:'#1e0800',ac:'#c46418'},indie:{bg:'#1a1030',tx:'#d8ccf8',ac:'#9070e0'},emo:{bg:'#0a0810',tx:'#e0d0f8',ac:'#7858d0'}};
  return m[top]||{bg:'#f9c4c4',tx:'#1e0c06',ac:'#c4522a'};
}
const PAL=resolvePalette();

const FLOVEE_NAMES={kawaii:'Luna',softgirl:'Rosie',cleangirl:'Nora',coquette:'Coco',goth:'Raven',darkacad:'Lyra',grunge:'Sid',y2k:'Stacy',street:'Ace',cottage:'Wren',hippie:'Sage',oldmoney:'Eloise',preppy:'Blair',tomato:'Bea',indie:'Wren',emo:'Ember'};
const top=Object.entries(profile?.aesthetics||{}).sort((a,b)=>b[1]-a[1])[0]?.[0]||'softgirl';
const floveeName=FLOVEE_NAMES[top]||'Flo';
const aeName=(()=>{const m={kawaii:'Kawaii',softgirl:'Soft Girl',cleangirl:'Clean Girl',coquette:'Coquette',goth:'Goth',darkacad:'Dark Academia',grunge:'Grunge',y2k:'Y2K',street:'Streetwear',cottage:'Cottagecore',hippie:'Hippie',oldmoney:'Old Money',preppy:'Preppy',tomato:'Tomato Girl',indie:'Indie Alt',emo:'Emo'};return m[top]||'Your Style';})();
const social=profile?.social||'ambivert';
const mood=profile?.moodToday||'okay';

// ─── DATA ─────────────────────────────────────────────────
let contacts=(()=>{try{return JSON.parse(localStorage.getItem('stuflover_contacts')||'[]');}catch(e){return[];}})();
let conversations=(()=>{try{return JSON.parse(localStorage.getItem('stuflover_convos')||'{}');}catch(e){return{};}})();
let activeContactId=null;
let selectedRel='bestie';
let typingTimer=null;

function saveData(){
  try{localStorage.setItem('stuflover_contacts',JSON.stringify(contacts));}catch(e){}
  try{localStorage.setItem('stuflover_convos',JSON.stringify(conversations));}catch(e){}
}

// ─── AVATAR COLOURS ───────────────────────────────────────
const AVATAR_COLS=['#e06080','#9040c0','#c4943a','#4a8a2a','#3060c0','#e08040','#8a7a5a','#c03ab0','#c4a438','#7858d0'];
function getAvatarCol(id){ return AVATAR_COLS[parseInt(id,36)%AVATAR_COLS.length]||PAL.ac; }
function getInitials(name){ return name.trim().split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }

// ─── APPLY STYLES ─────────────────────────────────────────
function applyStyles(){
  document.body.style.background=PAL.bg; document.body.style.color=PAL.tx;
  document.getElementById('app').style.background=PAL.bg;
  document.getElementById('floveePulse').style.background=PAL.ac;
  document.getElementById('floveeNameEl').textContent=floveeName;
  document.getElementById('sendBtn').style.background=PAL.ac;
  document.getElementById('sendBtn').style.color=PAL.bg;
  document.getElementById('modalBox').style.background=PAL.bg;
  document.getElementById('modalBox').style.borderColor=PAL.tx+'18';
  document.getElementById('saveBtn').style.background=PAL.ac;
  document.getElementById('saveBtn').style.color=PAL.bg;
  document.getElementById('cancelBtn').style.color=PAL.tx;
  document.getElementById('cancelBtn').style.borderColor=PAL.tx+'22';
  document.getElementById('searchInput').style.borderColor=PAL.tx+'18';
  document.getElementById('searchInput').style.color=PAL.tx;
  // Flovee welcome
  const w=document.getElementById('floveeWelcome');
  if(w){ w.style.color=PAL.tx; w.style.background=PAL.ac+'0c'; w.style.borderLeftColor=PAL.ac+'50'; }
  if(!getApiKey()){ const b=document.getElementById('apiBanner'); b.style.display='flex'; b.style.background=PAL.bg; b.style.color=PAL.tx; }
  // Help chips default
  buildHelpChips();
}

// ─── CONTACTS LIST ────────────────────────────────────────
function renderContacts(filter=''){
  const list=document.getElementById('contactsList');
  const filtered=contacts.filter(c=>c.name.toLowerCase().includes(filter.toLowerCase()));
  if(filtered.length===0){
    list.innerHTML=`<div style="padding:32px 20px;text-align:center;opacity:0.3;font-size:0.85rem;line-height:1.7">${contacts.length===0?'Add a friend to get started':'No matches'}</div>`;
    return;
  }
  list.innerHTML=filtered.map(c=>{
    const msgs=conversations[c.id]||[];
    const last=msgs[msgs.length-1];
    const preview=last?(last.from==='me'?'You: ':'')+last.text:'Start a conversation';
    const time=last?formatTime(last.ts):'';
    const isActive=c.id===activeContactId;
    return `<div class="contact-item ${isActive?'active':''}" onclick="openChat('${c.id}')"
      style="${isActive?'background:'+PAL.ac+'18':''}" id="ci-${c.id}">
      <div class="contact-avatar" style="background:${getAvatarCol(c.id)}">${getInitials(c.name)}</div>
      <div class="contact-info">
        <div class="contact-name" style="color:${PAL.tx}">${c.name}</div>
        <div class="contact-preview" style="color:${PAL.tx}">${preview}</div>
      </div>
      <div class="contact-time" style="color:${PAL.tx}">${time}</div>
    </div>`;
  }).join('');
}

function filterContacts(val){ renderContacts(val); }

function formatTime(ts){
  const d=new Date(ts),now=new Date();
  const diffDays=Math.floor((now-d)/(1000*60*60*24));
  if(diffDays===0) return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  if(diffDays===1) return 'Yesterday';
  if(diffDays<7) return d.toLocaleDateString([],{weekday:'short'});
  return d.toLocaleDateString([],{month:'short',day:'numeric'});
}

// ─── OPEN CHAT ────────────────────────────────────────────
function openChat(id){
  activeContactId=id;
  const contact=contacts.find(c=>c.id===id);
  if(!contact) return;

  // Show chat state
  document.getElementById('noChatState').style.display='none';
  const acs=document.getElementById('activeChatState');
  acs.style.display='flex';

  // Header
  document.getElementById('chatHeader').innerHTML=`
    <div class="chat-header-avatar" style="background:${getAvatarCol(id)}">${getInitials(contact.name)}</div>
    <div>
      <div class="chat-header-name" style="color:${PAL.tx}">${contact.name}</div>
      <div class="chat-header-status" style="color:${PAL.tx}">${contact.rel||'friend'}</div>
    </div>
    <div class="chat-header-actions">
      <button class="header-action-btn bc" onclick="askFloveeAdvice()" style="color:${PAL.tx};border-color:${PAL.tx}22">Ask Flovee</button>
      <button class="header-action-btn bc" onclick="clearChat('${id}')" style="color:${PAL.tx};border-color:${PAL.tx}22">Clear</button>
    </div>`;

  renderMessages();
  updateFloveePanel(contact);
  renderContacts();

  // Focus input
  setTimeout(()=>document.getElementById('chatInput')?.focus(),100);
}

// ─── RENDER MESSAGES ─────────────────────────────────────
function renderMessages(){
  const msgs=conversations[activeContactId]||[];
  const contact=contacts.find(c=>c.id===activeContactId);
  const container=document.getElementById('chatMsgs');

  container.innerHTML=msgs.map((m,i)=>{
    const isMe=m.from==='me';
    const showDate=i===0||new Date(m.ts).toDateString()!==new Date(msgs[i-1].ts).toDateString();
    const date=showDate?`<div class="chat-date" style="color:${PAL.tx}">${new Date(m.ts).toLocaleDateString([],{weekday:'long',month:'short',day:'numeric'})}</div>`:'';
    const bubbleBg=isMe?PAL.ac:PAL.tx+'14';
    const bubbleTx=isMe?PAL.bg:PAL.tx;

    if(m.type==='flovee_suggestion'){
      return `${date}<div class="flovee-suggestion" style="background:${PAL.ac}0a;border-color:${PAL.ac}30">
        <div style="flex:1">
          <div class="flovee-suggestion-label" style="color:${PAL.tx}">${floveeName} suggests</div>
          <div class="flovee-suggestion-text" style="color:${PAL.tx}">${m.text}</div>
          <div class="flovee-suggestion-actions">
            <button class="sug-btn use bc" onclick="useSuggestion(${i})" style="background:${PAL.ac};color:${PAL.bg}">Use this</button>
            <button class="sug-btn skip bc" onclick="dismissSuggestion(${i})" style="border-color:${PAL.tx}20;color:${PAL.tx}">Skip</button>
            <button class="sug-btn skip bc" onclick="rewriteSuggestion('${m.original||''}',${i})" style="border-color:${PAL.tx}20;color:${PAL.tx}">Rewrite</button>
          </div>
        </div>
      </div>`;
    }

    return `${date}<div class="bubble-wrap ${isMe?'me':'them'}">
      <div class="bubble" style="background:${bubbleBg};color:${bubbleTx}">${m.text}</div>
      <div class="bubble-time" style="color:${PAL.tx}">${formatTime(m.ts)}</div>
    </div>`;
  }).join('');

  container.scrollTop=container.scrollHeight;
}

// ─── SEND MESSAGE ─────────────────────────────────────────
function sendMessage(){
  const input=document.getElementById('chatInput');
  const text=input.value.trim();
  if(!text||!activeContactId) return;
  input.value=''; input.style.height='auto';

  if(!conversations[activeContactId]) conversations[activeContactId]=[];
  conversations[activeContactId].push({from:'me',text,ts:Date.now()});
  saveData();
  renderMessages();
  renderContacts();
  clearTypingTimer();
}

function handleMsgKey(e){
  if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMessage(); }
}

// ─── RECEIVE THEIR MESSAGE ────────────────────────────────
// User types what the friend said — shown as their bubble
function addTheirMessage(){
  const text=prompt('What did they say?');
  if(!text||!activeContactId) return;
  if(!conversations[activeContactId]) conversations[activeContactId]=[];
  const contact=contacts.find(c=>c.id===activeContactId);
  conversations[activeContactId].push({from:'them',text,ts:Date.now()});
  saveData();
  renderMessages();
  renderContacts();
  // Auto-trigger Flovee suggestion after they say something
  setTimeout(()=>getFloveeReply(text, contact),600);
}

// ─── HELP CHIPS ───────────────────────────────────────────
const HELP_MODES=[
  {id:'cool',label:'Keep it cool'},
  {id:'reply',label:'Write my reply'},
  {id:'check',label:'Check my vibe'},
  {id:'them',label:'They texted me'},
  {id:'vent',label:'Vent to Flovee'},
];
let activeHelpMode='cool';

function buildHelpChips(){
  const row=document.getElementById('helpChips');
  if(!row) return;
  row.innerHTML=HELP_MODES.map(m=>`
    <button class="help-chip ${m.id===activeHelpMode?'on':''}" onclick="setHelpMode('${m.id}')"
      style="${m.id===activeHelpMode?'border-color:'+PAL.ac+';background:'+PAL.ac+'14':''};color:${PAL.tx}">${m.label}</button>`).join('');
}

function setHelpMode(id){
  activeHelpMode=id;
  buildHelpChips();
  const input=document.getElementById('chatInput');
  const placeholders={cool:'Type what you want to say — Flovee will keep it cool...',reply:'Tell Flovee what happened — get a reply...',check:'Type your draft — Flovee will check the vibe...',them:'Paste what they said — Flovee will help you respond...',vent:'Vent here — stays between you and Flovee...'};
  if(input) input.placeholder=placeholders[id]||'Message...';

  if(id==='them'){
    // Shortcut: open prompt for their message
    addTheirMessage();
  }
}

// ─── TYPING DETECTION ─────────────────────────────────────
function onTyping(){
  clearTypingTimer();
  typingTimer=setTimeout(()=>{
    const text=document.getElementById('chatInput')?.value.trim();
    if(text && text.length>8 && activeHelpMode==='check') analyseMyDraft(text);
  },1400);
}

function clearTypingTimer(){ if(typingTimer){ clearTimeout(typingTimer); typingTimer=null; } }

// ─── FLOVEE FUNCTIONS ─────────────────────────────────────
async function getFloveeReply(theirMessage, contact){
  if(!contact) return;
  const history=(conversations[activeContactId]||[]).filter(m=>m.from!=='flovee_suggestion').slice(-8);
  const historyStr=history.map(m=>`${m.from==='me'?'Me':contact.name}: ${m.text}`).join('\n');

  const typingDiv=document.createElement('div');
  typingDiv.className='flovee-suggestion';
  typingDiv.style.cssText=`background:${PAL.ac}0a;border-color:${PAL.ac}30`;
  typingDiv.innerHTML=`<div style="flex:1"><div class="flovee-suggestion-label" style="color:${PAL.tx}">${floveeName} is thinking...</div><div style="font-size:0.82rem;opacity:0.4;font-style:italic;color:${PAL.tx}">coming up with a reply...</div></div>`;
  document.getElementById('chatMsgs')?.appendChild(typingDiv);
  document.getElementById('chatMsgs').scrollTop=99999;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:200,
        system:`You are ${floveeName}, helping someone with ${aeName} aesthetic reply to their ${contact.rel||'friend'} called ${contact.name}. Your job is to suggest a reply that sounds natural and fits their vibe. Keep it to 1-3 sentences max. Casual texting style. Never suggest anything aggressive. Help them sound cool and genuine.`,
        messages:[{role:'user',content:`Conversation so far:\n${historyStr}\n\n${contact.name} just said: "${theirMessage}"\n\nSuggest a reply for me. Just the reply text, nothing else.`}]
      })
    });
    const data=await res.json();
    const reply=data.content?.[0]?.text?.trim()||'';
    typingDiv.remove();
    if(reply){
      conversations[activeContactId].push({from:'flovee_suggestion',text:reply,original:theirMessage,ts:Date.now()});
      saveData();
      renderMessages();
    }
  }catch(e){ typingDiv.remove(); }
}

async function analyseMyDraft(draft){
  const contact=contacts.find(c=>c.id===activeContactId);
  if(!contact) return;

  // Show a quick vibe check in the flovee panel
  const body=document.getElementById('floveeBody');
  const checking=document.createElement('div');
  checking.className='flovee-advice';
  checking.style.cssText=`border-left-color:${PAL.ac}50;color:${PAL.tx};background:${PAL.ac}0c;margin-bottom:12px`;
  checking.textContent='checking your vibe...';
  body.insertBefore(checking,body.firstChild);

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:180,
        system:`You are ${floveeName}, a cool honest friend helping someone with ${aeName} aesthetic. Check the vibe of their message before they send it. Be brief and real. Tell them if it sounds good, if it might come across wrong, or if they should reword anything. Max 2 sentences. Casual.`,
        messages:[{role:'user',content:`I'm about to send this to my ${contact.rel||'friend'} ${contact.name}: "${draft}"\n\nQuick vibe check — does this sound right?`}]
      })
    });
    const data=await res.json();
    checking.textContent=data.content?.[0]?.text||'Looks good to send.';
    setTimeout(()=>checking.remove(),8000);
  }catch(e){ checking.remove(); }
}

async function askFloveeAdvice(){
  const contact=contacts.find(c=>c.id===activeContactId);
  if(!contact) return;
  const situation=prompt(`What do you want ${floveeName} to know about the situation with ${contact.name}?`);
  if(!situation) return;

  const body=document.getElementById('floveeBody');
  const card=document.createElement('div');
  card.className='flovee-card';
  card.style.cssText=`background:${PAL.ac}0c;border-color:${PAL.ac}30;color:${PAL.tx}`;
  card.innerHTML=`<div class="flovee-card-title" style="color:${PAL.tx}">${floveeName} says</div><div class="flovee-card-text" style="color:${PAL.tx}">thinking...</div>`;
  body.insertBefore(card,body.firstChild);

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:250,
        system:`You are ${floveeName}, an honest and caring friend for someone with ${aeName} aesthetic, social energy: ${social}. Give genuine advice about a friend situation. Be real, not preachy. Take their side while being honest. Short and direct. Max 3 sentences.`,
        messages:[{role:'user',content:`Situation with my ${contact.rel||'friend'} ${contact.name}: ${situation}\n\nWhat should I do?`}]
      })
    });
    const data=await res.json();
    card.querySelector('.flovee-card-text').textContent=data.content?.[0]?.text||'Trust your gut on this one.';
  }catch(e){ card.querySelector('.flovee-card-text').textContent='Try talking to them directly.'; }
}

async function rewriteSuggestion(original,idx){
  const contact=contacts.find(c=>c.id===activeContactId);
  if(!contact) return;
  const msgs=conversations[activeContactId]||[];
  const sug=msgs[idx];
  if(!sug) return;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:150,
        system:`You are ${floveeName}. Write a different version of the suggested reply. Different tone or approach. Keep it natural and casual. Just the reply text.`,
        messages:[{role:'user',content:`Original suggestion: "${sug.text}"\n\nWrite a different version.`}]
      })
    });
    const data=await res.json();
    const newText=data.content?.[0]?.text?.trim();
    if(newText){ sug.text=newText; saveData(); renderMessages(); }
  }catch(e){}
}

function useSuggestion(idx){
  const msgs=conversations[activeContactId]||[];
  const sug=msgs[idx];
  if(!sug) return;
  // Put suggestion text into input for user to review before sending
  const input=document.getElementById('chatInput');
  if(input){ input.value=sug.text; input.focus(); autoResize(input); }
  // Remove the suggestion bubble
  msgs.splice(idx,1);
  saveData();
  renderMessages();
}

function dismissSuggestion(idx){
  const msgs=conversations[activeContactId]||[];
  msgs.splice(idx,1);
  saveData();
  renderMessages();
}

// ─── FLOVEE PANEL ─────────────────────────────────────────
function updateFloveePanel(contact){
  const body=document.getElementById('floveeBody');
  const vibeMap={
    bestie:'Your bestie. Be yourself completely.',
    'close friend':'A close one — be real with them.',
    'group friend':'Group dynamic — watch the group energy.',
    situationship:'Complicated energy. Think before you send.',
    acquaintance:'Keep it light and friendly.',
    complicated:'Handle with care. Choose words carefully.',
  };
  const vibe=vibeMap[contact.rel]||'Be yourself.';

  body.innerHTML=`
    <div class="flovee-section">
      <div class="flovee-section-label bc" style="color:${PAL.tx}">About this chat</div>
      <div class="flovee-advice" style="border-left-color:${PAL.ac}50;color:${PAL.tx};background:${PAL.ac}0c">${vibe}</div>
    </div>
    <div class="flovee-section">
      <div class="flovee-section-label bc" style="color:${PAL.tx}">Flovee tools</div>
      <div class="flovee-card" style="border-color:${PAL.tx}12;background:transparent;cursor:pointer;" onclick="addTheirMessage()">
        <div class="flovee-card-title" style="color:${PAL.tx}">They texted me</div>
        <div class="flovee-card-text" style="color:${PAL.tx}">Paste what they said and get a reply suggestion</div>
      </div>
      <div class="flovee-card" style="border-color:${PAL.tx}12;background:transparent;cursor:pointer;" onclick="askFloveeAdvice()">
        <div class="flovee-card-title" style="color:${PAL.tx}">Ask Flovee</div>
        <div class="flovee-card-text" style="color:${PAL.tx}">Get advice on the whole situation</div>
      </div>
      <div class="flovee-card" style="border-color:${PAL.tx}12;background:transparent;cursor:pointer;" onclick="setHelpMode('check');document.getElementById('chatInput').focus()">
        <div class="flovee-card-title" style="color:${PAL.tx}">Check my vibe</div>
        <div class="flovee-card-text" style="color:${PAL.tx}">Type your message — Flovee checks it before you send</div>
      </div>
    </div>
    <div class="flovee-section">
      <div class="flovee-section-label bc" style="color:${PAL.tx}">Vibe mode</div>
      <div class="vibe-chips" id="vibeChips">
        ${['Keep it cool','Be direct','Stay warm','Set a boundary','Be low-key','No drama'].map(v=>`<button class="vibe-chip bc" onclick="setVibe('${v}')" style="color:${PAL.tx};border-color:${PAL.tx}18">${v}</button>`).join('')}
      </div>
    </div>`;
}

let activeVibe='Keep it cool';
function setVibe(v){
  activeVibe=v;
  document.querySelectorAll('.vibe-chip').forEach(c=>{ c.classList.remove('on'); c.style.borderColor=PAL.tx+'18'; c.style.background='transparent'; });
  event.target.classList.add('on'); event.target.style.borderColor=PAL.ac; event.target.style.background=PAL.ac+'14';
}

// ─── ADD CONTACT ──────────────────────────────────────────
function openAddModal(){ document.getElementById('addModal').classList.add('open'); setTimeout(()=>document.getElementById('nameInput')?.focus(),100); }
function closeAddModal(){ document.getElementById('addModal').classList.remove('open'); document.getElementById('nameInput').value=''; }

function pickRel(el){
  document.querySelectorAll('#relChips .help-chip').forEach(c=>{ c.classList.remove('on'); c.style.borderColor=''; c.style.background='transparent'; });
  el.classList.add('on'); el.style.borderColor=PAL.ac; el.style.background=PAL.ac+'14';
  selectedRel=el.dataset.rel;
}

function saveContact(){
  const name=document.getElementById('nameInput')?.value.trim();
  if(!name) return;
  const id=Date.now().toString(36)+Math.random().toString(36).slice(2,5);
  contacts.push({id,name,rel:selectedRel,createdAt:Date.now()});
  saveData();
  closeAddModal();
  renderContacts();
  openChat(id);
}

function clearChat(id){
  if(!confirm('Clear this conversation?')) return;
  conversations[id]=[];
  saveData();
  renderMessages();
}

// ─── UTILS ────────────────────────────────────────────────
function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }

// ─── INIT ─────────────────────────────────────────────────
applyStyles();
renderContacts();

// Add default contacts if none
if(contacts.length===0){
  const defaults=[{name:'Best Friend',rel:'bestie'},{name:'Group Chat',rel:'group friend'},{name:'That Person',rel:'complicated'}];
  defaults.forEach(d=>{
    const id=Date.now().toString(36)+Math.random().toString(36).slice(2,5);
    contacts.push({id,name:d.name,rel:d.rel,createdAt:Date.now()});
  });
  saveData();
  renderContacts();
}
</script>
